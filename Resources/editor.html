      let block = sel.getRangeAt(0).startContainer;
      while (block && block !== this.element && block.nodeType !== Node.ELEMENT_NODE) block = block.parentNode;
      while (block && block.parentNode !== this.element) block = block.parentNode;
      if (block && block.tagName === 'PRE') {
        const p = document.createElement('p'); p.textContent = block.textContent;
        block.parentNode.replaceChild(p, block); return;
      }
      const pre = document.createElement('pre');
      const code = document.createElement('code');
      code.textContent = block ? block.textContent || '\n' : '\n';
      pre.appendChild(code);
      if (block && block !== this.element) block.parentNode.replaceChild(pre, block);
      else this.element.appendChild(pre);
      const range = document.createRange(); range.selectNodeContents(code); range.collapse(false);
      sel.removeAllRanges(); sel.addRange(range);
    },

    insertTaskList() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      let block = sel.getRangeAt(0).startContainer;
      while (block && block !== this.element && block.nodeType !== Node.ELEMENT_NODE) block = block.parentNode;
      while (block && block.parentNode !== this.element) block = block.parentNode;
      const ul = document.createElement('ul'); ul.setAttribute('data-type', 'taskList');
      const li = document.createElement('li'); li.setAttribute('data-type', 'taskItem'); li.setAttribute('data-checked', 'false');
      const cb = document.createElement('input'); cb.type = 'checkbox';
      cb.addEventListener('change', () => this.onContentChange());
      const span = document.createElement('span'); span.textContent = block ? block.textContent || '' : '';
      li.appendChild(cb); li.appendChild(span); ul.appendChild(li);
      if (block && block !== this.element) block.parentNode.replaceChild(ul, block);
      else this.element.appendChild(ul);
      const range = document.createRange(); range.selectNodeContents(span); range.collapse(false);
      sel.removeAllRanges(); sel.addRange(range);
    },

    insertLink() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      this.postMessage('requestLinkInput', { selectedText: sel.toString() });
    },

    applyLink(url, text) {
      const sel = window.getSelection();
      const a = document.createElement('a'); a.href = url; a.textContent = text || url; a.setAttribute('target', '_blank');
      if (sel.rangeCount) { const range = sel.getRangeAt(0); range.deleteContents(); range.insertNode(a); range.setStartAfter(a); range.collapse(true); sel.removeAllRanges(); sel.addRange(range); }
      this.onContentChange();
    },

    insertImage() { this.postMessage('requestImageInput', {}); },

    applyImage(url, alt) {
      if (CarouselDialog._pendingLocal) { CarouselDialog.receiveLocalImage(url); return; }
      const img = document.createElement('img'); img.src = url; img.alt = alt || '';
      const sel = window.getSelection();
      if (sel.rangeCount) { const range = sel.getRangeAt(0); range.deleteContents(); range.insertNode(img); range.setStartAfter(img); range.collapse(true); sel.removeAllRanges(); sel.addRange(range); }
      this.onContentChange();
    },

    insertTable(rows, cols) {
      const table = document.createElement('table');
      const thead = document.createElement('thead'); const hr = document.createElement('tr');
      for (let j = 0; j < cols; j++) { const th = document.createElement('th'); th.textContent = 'Header ' + (j+1); hr.appendChild(th); }
      thead.appendChild(hr); table.appendChild(thead);
      const tbody = document.createElement('tbody');
      for (let i = 0; i < rows - 1; i++) { const tr = document.createElement('tr'); for (let j = 0; j < cols; j++) { const td = document.createElement('td'); td.innerHTML = '&nbsp;'; tr.appendChild(td); } tbody.appendChild(tr); }
      table.appendChild(tbody);
      const sel = window.getSelection();
      if (sel.rangeCount) {
        let block = sel.getRangeAt(0).startContainer;
        while (block && block !== this.element && block.nodeType !== Node.ELEMENT_NODE) block = block.parentNode;
        while (block && block.parentNode !== this.element) block = block.parentNode;
        if (block && block !== this.element) block.parentNode.insertBefore(table, block.nextSibling);
        else this.element.appendChild(table);
      } else this.element.appendChild(table);
      // Set up resize handles and show toolbar
      TableManager.setupResizeHandles(table);
      TableManager.showToolbar(table);
      const firstTh = table.querySelector('th');
      if (firstTh) { const range = document.createRange(); range.selectNodeContents(firstTh); sel.removeAllRanges(); sel.addRange(range); }
      this.onContentChange();
    },

    // --- Selection State ---

    updateSelectionState() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;

      // Check if cursor is inside a code block
      let inCodeBlock = false;
      let node = sel.getRangeAt(0).startContainer;
      while (node && node !== this.element) {
        if (node.tagName === 'PRE' || (node.tagName === 'CODE' && node.parentNode && node.parentNode.tagName === 'PRE')) {
          inCodeBlock = true;
          break;
        }
        node = node.parentNode;
      }

      // If cursor left a code block, re-highlight all
      if (!inCodeBlock && this._wasInCodeBlock) {
        this.rehighlightAll();
      }
      this._wasInCodeBlock = inCodeBlock;

      const formats = { bold: document.queryCommandState('bold'), italic: document.queryCommandState('italic'), strikethrough: document.queryCommandState('strikeThrough'), inlineCode: false, blockType: 'paragraph', isLink: false, linkUrl: '', headingLevel: 0 };
      node = sel.getRangeAt(0).startContainer;
      while (node && node !== this.element) {
        if (node.nodeType === Node.ELEMENT_NODE) {
          const tag = node.tagName.toLowerCase();
          if (tag === 'code' && !node.closest('pre')) formats.inlineCode = true;
          if (tag === 'a') { formats.isLink = true; formats.linkUrl = node.href || ''; }
        }
        node = node.parentNode;
      }
      node = sel.getRangeAt(0).startContainer;
      while (node && node !== this.element) {
        if (node.nodeType === Node.ELEMENT_NODE) {
          const tag = node.tagName.toLowerCase();
          if (/^h[1-6]$/.test(tag)) { formats.blockType = tag; formats.headingLevel = parseInt(tag[1]); break; }
          if (tag === 'blockquote') { formats.blockType = 'blockquote'; break; }
          if (tag === 'pre') { formats.blockType = 'codeBlock'; break; }
          if (tag === 'li') {
            const p = node.closest('ul, ol');
            if (p) { if (p.tagName === 'UL') { formats.blockType = p.getAttribute('data-type') === 'taskList' ? 'taskList' : 'bulletList'; } else { formats.blockType = 'orderedList'; } }
            break;
          }
        }
        node = node.parentNode;
      }
      // Detect text color and background color at cursor
      let colorNode = sel.getRangeAt(0).startContainer;
      if (colorNode.nodeType === Node.TEXT_NODE) colorNode = colorNode.parentNode;
      while (colorNode && colorNode !== this.element) {
        if (colorNode.style) {
          if (colorNode.style.color && !formats.textColor)         formats.textColor = colorNode.style.color;
          if (colorNode.style.backgroundColor && !formats.bgColor) formats.bgColor   = colorNode.style.backgroundColor;
        }
        colorNode = colorNode.parentNode;
      }

      this.postMessage('selectionChange', formats);
    },
    // ============================================================
    findState: { query: '', caseSensitive: false, matches: [], currentIndex: -1 },

    findInDocument(query, caseSensitive) {
      this.clearFindHighlights();
      if (!query) { this.findState.matches = []; this.findState.currentIndex = -1; this.postMessage('findResults', { count: 0, current: -1 }); return; }
      this.findState.query = query; this.findState.caseSensitive = caseSensitive;
      const flags = caseSensitive ? 'g' : 'gi';
      const regex = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), flags);
      const walker = document.createTreeWalker(this.element, NodeFilter.SHOW_TEXT, null);
      const textNodes = []; let n;
      while (n = walker.nextNode()) { if (n.parentNode.classList && n.parentNode.classList.contains('inkwell-find-highlight')) continue; if (n.textContent.length > 0) textNodes.push(n); }
      const matches = [];
      for (const tn of textNodes) { let m; regex.lastIndex = 0; while ((m = regex.exec(tn.textContent)) !== null) matches.push({ node: tn, index: m.index, length: m[0].length }); }
      for (let i = matches.length - 1; i >= 0; i--) { const m = matches[i]; try { const range = document.createRange(); range.setStart(m.node, m.index); range.setEnd(m.node, m.index + m.length); const mark = document.createElement('mark'); mark.classList.add('inkwell-find-highlight'); mark.dataset.findIndex = i; range.surroundContents(mark); } catch(e) {} }
      this.findState.matches = Array.from(this.element.querySelectorAll('.inkwell-find-highlight'));
      this.findState.currentIndex = this.findState.matches.length > 0 ? 0 : -1;
      if (this.findState.currentIndex >= 0) this.highlightCurrentMatch();
      this.postMessage('findResults', { count: this.findState.matches.length, current: this.findState.currentIndex });
    },
    highlightCurrentMatch() { this.findState.matches.forEach(m => m.classList.remove('inkwell-find-active')); const cur = this.findState.matches[this.findState.currentIndex]; if (cur) { cur.classList.add('inkwell-find-active'); cur.scrollIntoView({ block: 'center', behavior: 'smooth' }); } },
    findNext() { if (this.findState.matches.length === 0) return; this.findState.currentIndex = (this.findState.currentIndex + 1) % this.findState.matches.length; this.highlightCurrentMatch(); this.postMessage('findResults', { count: this.findState.matches.length, current: this.findState.currentIndex }); },
    findPrevious() { if (this.findState.matches.length === 0) return; this.findState.currentIndex = (this.findState.currentIndex - 1 + this.findState.matches.length) % this.findState.matches.length; this.highlightCurrentMatch(); this.postMessage('findResults', { count: this.findState.matches.length, current: this.findState.currentIndex }); },
    replaceCurrent(replacement) { if (this.findState.currentIndex < 0) return; const mark = this.findState.matches[this.findState.currentIndex]; if (!mark) return; const text = document.createTextNode(replacement); mark.parentNode.replaceChild(text, mark); this.findInDocument(this.findState.query, this.findState.caseSensitive); this.onContentChange(); },
    replaceAll(replacement) { this.clearFindHighlights(); const flags = this.findState.caseSensitive ? 'g' : 'gi'; const regex = new RegExp(this.findState.query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), flags); const walker = document.createTreeWalker(this.element, NodeFilter.SHOW_TEXT, null); const textNodes = []; let n; while (n = walker.nextNode()) textNodes.push(n); for (const tn of textNodes) { const orig = tn.textContent; const replaced = orig.replace(regex, replacement); if (replaced !== orig) tn.textContent = replaced; } this.findState.matches = []; this.findState.currentIndex = -1; this.postMessage('findResults', { count: 0, current: -1 }); this.onContentChange(); },
    clearFindHighlights() { const marks = this.element.querySelectorAll('.inkwell-find-highlight'); marks.forEach(mark => { const text = document.createTextNode(mark.textContent); mark.parentNode.replaceChild(text, mark); }); this.element.normalize(); },
    closeFindReplace() { this.clearFindHighlights(); this.findState.matches = []; this.findState.currentIndex = -1; },

    // --- Bridge ---
    postMessage(type, data) { try { if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.inkwell) { window.webkit.messageHandlers.inkwell.postMessage(JSON.stringify({ type: type, data: data })); } } catch (e) { console.error('Bridge error:', e); } }
  };

  // ----------------------------------------------------------
  // Global API
  // ----------------------------------------------------------
  window.InkwellEditor = {
    loadMarkdown: (md) => Editor.loadMarkdown(md),
    getMarkdown: () => Editor.getMarkdown(),
    applyTheme: (css) => Editor.applyTheme(css),
    execFormat: (cmd, param) => Editor.execFormat(cmd, param),
    focus: () => Editor.element.focus(),
    scrollToHeading: (text, level) => {
      const headings = Editor.element.querySelectorAll('h' + level);
      for (const h of headings) {
        if (h.textContent.trim() === text.trim()) {
          h.scrollIntoView({ behavior: 'smooth', block: 'start' });
          const range = document.createRange();
          range.selectNodeContents(h);
          range.collapse(false);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          return;
        }
      }
    },
    findInDocument: (q, cs) => Editor.findInDocument(q, cs),
    findNext: () => Editor.findNext(),
    findPrevious: () => Editor.findPrevious(),
    replaceCurrent: (r) => Editor.replaceCurrent(r),
    replaceAll: (r) => Editor.replaceAll(r),
    closeFindReplace: () => Editor.closeFindReplace(),
    applyLink: (url, text) => Editor.applyLink(url, text),
    applyImage: (url, alt) => Editor.applyImage(url, alt),
    carouselReceiveImage: (url) => CarouselDialog.receiveLocalImage(url),
    insertTable: (r, c) => Editor.insertTable(r, c),
  };

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => Editor.init());
  else Editor.init();
})();
</script>
</body>
</html>
