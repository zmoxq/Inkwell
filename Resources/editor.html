<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style id="theme-style">/* injected by Swift */</style>

<!-- Highlight.js for code syntax highlighting -->
<link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>

<style>
  /* Dark mode: swap to github-dark theme */
  @media (prefers-color-scheme: dark) {
    /* Override will be handled by swapping the theme link in JS */
  }

  html, body { margin: 0; padding: 0; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .editor-container { min-height: 100vh; }
  #editor { outline: none; min-height: 100vh; }
  #editor.ProseMirror { outline: none; }

  /* Code block styling */
  #editor pre {
    position: relative;
  }
  #editor pre code.hljs {
    padding: 1em;
    border-radius: 6px;
  }
  /* Language label badge */
  #editor pre::after {
    content: attr(data-language);
    position: absolute;
    top: 4px;
    right: 8px;
    font-size: 11px;
    font-family: -apple-system, sans-serif;
    color: rgba(128,128,128,0.6);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    pointer-events: none;
  }

  /* Find & Replace highlights */
  .inkwell-find-highlight {
    background: rgba(255, 220, 0, 0.4);
    border-radius: 2px;
    padding: 0 1px;
  }
  .inkwell-find-active {
    background: rgba(255, 140, 0, 0.6);
    box-shadow: 0 0 0 2px rgba(255, 140, 0, 0.3);
  }

  /* Highlight (==text==) */
  mark:not(.inkwell-find-highlight):not(.inkwell-find-active) {
    background: rgba(255, 230, 0, 0.35);
    border-radius: 2px;
    padding: 0 2px;
  }

  /* ========== Table Enhanced Styles ========== */
  .editor-container {
    position: relative; /* anchor for toolbar absolute positioning */
  }
  #editor table {
    border-collapse: collapse;
    width: 100%;
    margin: 1em 0;
    position: relative;
  }
  #editor th, #editor td {
    border: 1px solid var(--border, #d0d0d0);
    padding: 8px 12px;
    min-width: 100px;
    vertical-align: middle;
    text-align: center;
    position: relative;
    word-wrap: break-word;
  }
  #editor th {
    background: var(--bg-secondary, #f5f5f5);
    font-weight: 600;
    cursor: pointer;
    user-select: none;
  }
  /* Sort indicator */
  #editor th[data-sort="asc"]::after { content: ' ▲'; font-size: 10px; opacity: 0.5; }
  #editor th[data-sort="desc"]::after { content: ' ▼'; font-size: 10px; opacity: 0.5; }
  /* Active cell highlight */
  #editor td:focus, #editor th:focus {
    outline: 2px solid var(--accent, #0066cc);
    outline-offset: -2px;
  }
  /* Column resize handle */
  .inkwell-col-resize {
    position: absolute;
    top: 0;
    right: -2px;
    width: 5px;
    height: 100%;
    cursor: col-resize;
    z-index: 10;
    user-select: none;
  }
  .inkwell-col-resize:hover,
  .inkwell-col-resize.active {
    background: var(--accent, #0066cc);
    opacity: 0.4;
  }

  /* Table floating toolbar */
  .inkwell-table-toolbar {
    position: absolute;
    display: flex;
    gap: 2px;
    background: var(--bg-primary, #fff);
    border: 1px solid var(--border, #d0d0d0);
    border-radius: 6px;
    padding: 3px 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    z-index: 100;
    font-size: 12px;
    font-family: -apple-system, sans-serif;
  }
  .inkwell-table-toolbar button {
    background: none;
    border: none;
    padding: 3px 7px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--text-primary, #333);
    font-size: 12px;
    white-space: nowrap;
  }
  .inkwell-table-toolbar button:hover {
    background: var(--bg-secondary, #f0f0f0);
  }
  .inkwell-table-toolbar .separator {
    width: 1px;
    background: var(--border, #d0d0d0);
    margin: 2px 3px;
  }

  /* Alignment classes */
  #editor td.align-center, #editor th.align-center { text-align: center; }
  #editor td.align-right, #editor th.align-right { text-align: right; }
  #editor td.align-left, #editor th.align-left { text-align: left; }

  @media (prefers-color-scheme: dark) {
    .inkwell-table-toolbar {
      background: #2a2a2a;
      border-color: #555;
    }
    .inkwell-table-toolbar button { color: #ddd; }
    .inkwell-table-toolbar button:hover { background: #444; }
  }

  /* ========== Image Carousel ========== */
  .inkwell-carousel {
    position: relative;
    width: 100%;
    margin: 1.2em 0;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
    user-select: none;
    /* Reveal arrow zones on hover */
  }
  .inkwell-carousel-track {
    display: flex;
    transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }
  .inkwell-carousel-slide {
    flex: 0 0 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .inkwell-carousel-slide img {
    width: 100%;
    height: 100%;
    max-height: 520px;
    object-fit: cover;
    display: block;
    pointer-events: none;
    vertical-align: bottom;
  }

  /* ---- Arrow hit zones (invisible, left/right 20% strips) ---- */
  .inkwell-carousel-arrow {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 20%;
    border: none;
    background: transparent;
    cursor: pointer;
    z-index: 10;
    padding: 0;
    display: flex;
    align-items: center;
  }
  .inkwell-carousel-arrow.prev { left: 0; justify-content: flex-start; }
  .inkwell-carousel-arrow.next { right: 0; justify-content: flex-end; }
  .inkwell-carousel-arrow:disabled { cursor: default; pointer-events: none; }

  /* ---- Arrow icon pill ---- */
  .inkwell-carousel-arrow-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    -webkit-backdrop-filter: blur(12px) saturate(180%);
    backdrop-filter: blur(12px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.28);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.82);
    transition: opacity 0.22s ease, transform 0.22s ease, background 0.18s ease;
    color: #fff;
    font-size: 17px;
    font-weight: 300;
    box-shadow: 0 2px 12px rgba(0,0,0,0.22);
    flex-shrink: 0;
  }
  .inkwell-carousel-arrow.prev .inkwell-carousel-arrow-icon { margin-left: 12px; }
  .inkwell-carousel-arrow.next .inkwell-carousel-arrow-icon { margin-right: 12px; }

  /* Show icon when hovering the hit zone */
  .inkwell-carousel-arrow:not(:disabled):hover .inkwell-carousel-arrow-icon {
    opacity: 1;
    transform: scale(1);
    background: rgba(255,255,255,0.28);
  }

  /* Dot indicators */
  .inkwell-carousel-dots {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 10;
    padding: 4px 8px;
    background: rgba(0,0,0,0.28);
    border-radius: 20px;
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
  }
  .inkwell-carousel-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.45);
    border: none;
    cursor: pointer;
    padding: 0;
    transition: background 0.22s, transform 0.22s, width 0.22s;
  }
  .inkwell-carousel-dot.active {
    background: #fff;
    width: 18px;
    border-radius: 3px;
  }
  /* Counter badge */
  .inkwell-carousel-counter {
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 11px;
    font-family: -apple-system, sans-serif;
    font-weight: 500;
    letter-spacing: 0.3px;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.32);
    padding: 3px 9px;
    border-radius: 20px;
    pointer-events: none;
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
  }
  @media (prefers-color-scheme: dark) {
    .inkwell-carousel { background: #111; }
  }

  /* ========== Carousel Insert Dialog ========== */
  .inkwell-dialog-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
  }
  .inkwell-dialog {
    background: #fff; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.22);
    width: 520px; max-width: 92vw; max-height: 80vh;
    display: flex; flex-direction: column; font-family: -apple-system, sans-serif; overflow: hidden;
  }
  .inkwell-dialog-header { padding: 16px 20px 12px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: space-between; }
  .inkwell-dialog-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .inkwell-dialog-close { background: none; border: none; cursor: pointer; font-size: 18px; color: #888; padding: 2px 6px; border-radius: 4px; line-height: 1; }
  .inkwell-dialog-close:hover { background: #f0f0f0; color: #333; }
  .inkwell-dialog-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .inkwell-img-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .inkwell-img-item { display: flex; align-items: center; gap: 10px; background: #f7f7f7; border: 1px solid #e4e4e4; border-radius: 8px; padding: 8px 10px; }
  .inkwell-img-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 5px; flex-shrink: 0; }
  .inkwell-img-thumb-placeholder { width: 48px; height: 48px; border-radius: 5px; flex-shrink: 0; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .inkwell-img-info { flex: 1; min-width: 0; }
  .inkwell-img-url { font-size: 11px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .inkwell-img-alt-input { width: 100%; font-size: 12px; border: 1px solid #ddd; border-radius: 4px; padding: 3px 7px; color: #333; background: #fff; box-sizing: border-box; }
  .inkwell-img-alt-input:focus { outline: none; border-color: #0066cc; }
  .inkwell-img-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .inkwell-img-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 5px; border-radius: 3px; color: #666; line-height: 1; }
  .inkwell-img-btn:hover { background: #e8e8e8; color: #333; }
  .inkwell-img-btn.remove:hover { background: #ffe0e0; color: #c00; }
  .inkwell-add-controls { display: flex; gap: 8px; margin-bottom: 10px; }
  .inkwell-add-btn { flex: 1; padding: 8px 12px; border-radius: 7px; border: 1.5px dashed #bbb; background: #fafafa; cursor: pointer; font-size: 13px; color: #555; display: flex; align-items: center; justify-content: center; gap: 6px; transition: border-color 0.15s, background 0.15s; }
  .inkwell-add-btn:hover { border-color: #0066cc; background: #f0f5ff; color: #0055bb; }
  .inkwell-url-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .inkwell-url-input { flex: 1; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; color: #333; background: #fff; }
  .inkwell-url-input:focus { outline: none; border-color: #0066cc; }
  .inkwell-url-add { padding: 6px 14px; background: #0066cc; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .inkwell-url-add:hover { background: #0055aa; }
  .inkwell-dialog-footer { padding: 12px 20px; border-top: 1px solid #e8e8e8; display: flex; justify-content: flex-end; gap: 8px; }
  .inkwell-dialog-cancel { padding: 7px 18px; border-radius: 7px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 13px; color: #333; }
  .inkwell-dialog-cancel:hover { background: #f5f5f5; }
  .inkwell-dialog-insert { padding: 7px 18px; border-radius: 7px; border: none; background: #0066cc; color: #fff; cursor: pointer; font-size: 13px; font-weight: 600; }
  .inkwell-dialog-insert:hover { background: #0055aa; }
  .inkwell-dialog-insert:disabled { background: #aaa; cursor: default; }
  .inkwell-img-empty { text-align: center; color: #aaa; font-size: 13px; padding: 20px 0 10px; }
  @media (prefers-color-scheme: dark) {
    .inkwell-dialog { background: #242424; }
    .inkwell-dialog-header, .inkwell-dialog-footer { border-color: #3a3a3a; }
    .inkwell-dialog-title { color: #eee; }
    .inkwell-dialog-close:hover { background: #333; color: #ccc; }
    .inkwell-img-item { background: #2e2e2e; border-color: #3e3e3e; }
    .inkwell-img-url { color: #888; }
    .inkwell-img-alt-input { background: #1e1e1e; border-color: #444; color: #ddd; }
    .inkwell-img-btn:hover { background: #3a3a3a; color: #ccc; }
    .inkwell-img-btn.remove:hover { background: #4a1a1a; color: #f88; }
    .inkwell-add-btn { background: #2a2a2a; border-color: #444; color: #aaa; }
    .inkwell-add-btn:hover { border-color: #4488dd; background: #1e2a3a; color: #88bbff; }
    .inkwell-url-input { background: #1e1e1e; border-color: #444; color: #ddd; }
    .inkwell-dialog-cancel { background: #2e2e2e; border-color: #444; color: #ccc; }
    .inkwell-dialog-cancel:hover { background: #383838; }
    .inkwell-img-empty { color: #666; }
  }
</style>
</head>
<body>
<div class="editor-container">
  <div id="editor" contenteditable="true"></div>
</div>
<div id="inkwell-carousel-dialog" style="display:none"></div>

<script>
(function() {
  'use strict';

  // ----------------------------------------------------------
  // Markdown Parser: Markdown → HTML
  // ----------------------------------------------------------
  const MarkdownParser = {
    parse(md) {
      if (!md || md.trim() === '') return '<p class="is-editor-empty"></p>';
      let html = '';
      const lines = md.split('\n');
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];

        // Fenced code block
        if (line.match(/^```/)) {
          const lang = line.slice(3).trim();
          let code = '';
          i++;
          while (i < lines.length && !lines[i].match(/^```/)) {
            code += this.escapeHtml(lines[i]) + '\n';
            i++;
          }
          i++;
          html += '<pre><code' + (lang ? ' class="language-' + lang + '"' : '') + '>' + code.replace(/\n$/, '') + '</code></pre>\n';
          continue;
        }

        // Horizontal rule
        if (line.match(/^(---|\*\*\*|___)\s*$/)) {
          html += '<hr>\n';
          i++;
          continue;
        }

        // Heading
        const hm = line.match(/^(#{1,6})\s+(.+)/);
        if (hm) {
          html += '<h' + hm[1].length + '>' + this.parseInline(hm[2]) + '</h' + hm[1].length + '>\n';
          i++;
          continue;
        }

        // Table
        if (i + 1 < lines.length && lines[i + 1] && lines[i + 1].match(/^\|?\s*:?-+:?\s*(\|\s*:?-+:?\s*)*\|?\s*$/)) {
          const headerCells = this.parseTableRow(line);
          const sepCells = this.parseTableRow(lines[i + 1]);
          // Parse alignment from separator
          const aligns = sepCells.map(s => {
            s = s.trim();
            if (s.startsWith(':') && s.endsWith(':')) return 'center';
            if (s.endsWith(':')) return 'right';
            return 'left';
          });
          i += 2;
          let tableHtml = '<table><thead><tr>';
          headerCells.forEach((c, j) => {
            const align = aligns[j] || 'left';
            const style = align !== 'left' ? ' style="text-align:' + align + '"' : '';
            tableHtml += '<th' + style + '>' + this.parseInline(c) + '</th>';
          });
          tableHtml += '</tr></thead><tbody>';
          while (i < lines.length && lines[i].includes('|')) {
            const cells = this.parseTableRow(lines[i]);
            tableHtml += '<tr>';
            cells.forEach((c, j) => {
              const align = aligns[j] || 'left';
              const style = align !== 'left' ? ' style="text-align:' + align + '"' : '';
              tableHtml += '<td' + style + '>' + this.parseInline(c) + '</td>';
            });
            tableHtml += '</tr>';
            i++;
          }
          tableHtml += '</tbody></table>\n';
          html += tableHtml;
          continue;
        }

        // Blockquote
        if (line.match(/^>\s?/)) {
          let ql = [];
          while (i < lines.length && lines[i].match(/^>\s?/)) {
            ql.push(lines[i].replace(/^>\s?/, ''));
            i++;
          }
          html += '<blockquote>' + this.parse(ql.join('\n')) + '</blockquote>\n';
          continue;
        }

        // Task list
        if (line.match(/^[-*]\s+\[[ xX]\]/)) {
          html += '<ul data-type="taskList">\n';
          while (i < lines.length && lines[i].match(/^[-*]\s+\[[ xX]\]/)) {
            const tm = lines[i].match(/^[-*]\s+\[([ xX])\]\s*(.*)/);
            if (tm) {
              const checked = tm[1].toLowerCase() === 'x';
              html += '<li data-type="taskItem" data-checked="' + checked + '">';
              html += '<input type="checkbox"' + (checked ? ' checked' : '') + '>';
              html += '<span>' + this.parseInline(tm[2]) + '</span></li>\n';
            }
            i++;
          }
          html += '</ul>\n';
          continue;
        }

        // Unordered list
        if (line.match(/^[-*+]\s+/)) {
          html += '<ul>\n';
          while (i < lines.length && lines[i].match(/^[-*+]\s+/)) {
            const content = lines[i].replace(/^[-*+]\s+/, '');
            html += '<li>' + this.parseInline(content) + '</li>\n';
            i++;
          }
          html += '</ul>\n';
          continue;
        }

        // Ordered list (tolerant of single blank lines between items)
        if (line.match(/^\d+\.\s+/)) {
          const startNum = parseInt(line.match(/^(\d+)\./)[1]);
          html += '<ol' + (startNum !== 1 ? ' start="' + startNum + '"' : '') + '>\n';
          while (i < lines.length) {
            if (lines[i].match(/^\d+\.\s+/)) {
              const content = lines[i].replace(/^\d+\.\s+/, '');
              html += '<li>' + this.parseInline(content) + '</li>\n';
              i++;
            } else if (lines[i].trim() === '' && i + 1 < lines.length && lines[i + 1].match(/^\d+\.\s+/)) {
              // Skip blank line between numbered items
              i++;
            } else {
              break;
            }
          }
          html += '</ol>\n';
          continue;
        }

        // Empty line
        if (line.trim() === '') { i++; continue; }

        // Image-only line — collect consecutive image lines → carousel or single img
        const imgLineMatch = line.match(/^!\[([^\]]*)\]\(([^)]+)\)\s*$/);
        if (imgLineMatch) {
          const images = [];
          while (i < lines.length && lines[i].match(/^!\[([^\]]*)\]\(([^)]+)\)\s*$/)) {
            const m = lines[i].match(/^!\[([^\]]*)\]\(([^)]+)\)\s*$/);
            images.push({ alt: m[1], src: m[2] });
            i++;
          }
          if (images.length === 1) {
            html += '<p><img src="' + images[0].src + '" alt="' + images[0].alt + '"></p>\n';
          } else {
            // Build carousel
            const slides = images.map((img, idx) =>
              '<div class="inkwell-carousel-slide" data-index="' + idx + '">' +
              '<img src="' + img.src + '" alt="' + this.escapeHtml(img.alt) + '">' +
              '</div>'
            ).join('');
            const dots = images.map((_, idx) =>
              '<button class="inkwell-carousel-dot' + (idx === 0 ? ' active' : '') + '" data-dot="' + idx + '" aria-label="Slide ' + (idx+1) + '"></button>'
            ).join('');
            const md = images.map(img => '![' + img.alt + '](' + img.src + ')').join('\n');
            html +=
              '<div class="inkwell-carousel" contenteditable="false" data-carousel data-count="' + images.length + '" data-current="0" data-md="' + this.escapeAttr(md) + '">' +
                '<div class="inkwell-carousel-track">' + slides + '</div>' +
                '<button class="inkwell-carousel-arrow prev" aria-label="Previous"><span class="inkwell-carousel-arrow-icon">&#8249;</span></button>' +
                '<button class="inkwell-carousel-arrow next" aria-label="Next"><span class="inkwell-carousel-arrow-icon">&#8250;</span></button>' +
                '<div class="inkwell-carousel-dots">' + dots + '</div>' +
                '<div class="inkwell-carousel-counter">1 / ' + images.length + '</div>' +
              '</div>\n';
          }
          continue;
        }

        html += '<p>' + this.parseInline(line) + '</p>\n';
        i++;
      }
      return html;
    },

    parseInline(text) {
      if (!text) return '';
      text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
      text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
      text = text.replace(/_(.+?)_/g, '<em>$1</em>');
      text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
      text = text.replace(/==(.+?)==/g, '<mark>$1</mark>');
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      return text;
    },

    parseTableRow(line) {
      return line.replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim());
    },

    escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, c => map[c]);
    },

    escapeAttr(text) {
      return text.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/\n/g, '&#10;');
    }
  };

  // ----------------------------------------------------------
  // Markdown Serializer: HTML → Markdown
  // ----------------------------------------------------------
  const MarkdownSerializer = {
    serialize(el) {
      let md = '';
      const children = el.childNodes;
      for (let i = 0; i < children.length; i++) {
        md += this.serializeNode(children[i]);
      }
      return md.replace(/\n{3,}/g, '\n\n').trim();
    },

    serializeNode(node) {
      if (node.nodeType === Node.TEXT_NODE) return node.textContent;
      if (node.nodeType !== Node.ELEMENT_NODE) return '';
      const tag = node.tagName.toLowerCase();
      const inner = this.serializeChildren(node);

      switch (tag) {
        case 'p': return inner + '\n\n';
        case 'h1': return '# ' + inner + '\n\n';
        case 'h2': return '## ' + inner + '\n\n';
        case 'h3': return '### ' + inner + '\n\n';
        case 'h4': return '#### ' + inner + '\n\n';
        case 'h5': return '##### ' + inner + '\n\n';
        case 'h6': return '###### ' + inner + '\n\n';
        case 'strong': case 'b': return '**' + inner + '**';
        case 'em': case 'i': return '*' + inner + '*';
        case 'del': case 's': return '~~' + inner + '~~';
        case 'mark':
          if (node.classList.contains('inkwell-find-highlight')) return inner;
          return '==' + inner + '==';
        case 'code':
          if (node.parentNode && node.parentNode.tagName === 'PRE') return inner;
          return '`' + inner + '`';
        case 'pre': {
          const codeEl = node.querySelector('code');
          let lang = '';
          if (codeEl) {
            const langMatch = codeEl.className.match(/language-(\w+)/);
            if (langMatch) lang = langMatch[1];
          }
          const code = codeEl ? codeEl.textContent : node.textContent;
          return '```' + lang + '\n' + code + '\n```\n\n';
        }
        case 'blockquote':
          return inner.split('\n').filter(l => l.trim()).map(l => '> ' + l).join('\n') + '\n\n';
        case 'ul':
          if (node.getAttribute('data-type') === 'taskList') return this.serializeTaskList(node) + '\n';
          return this.serializeList(node, '-') + '\n';
        case 'ol': return this.serializeList(node, '1.') + '\n';
        case 'li': return inner;
        case 'a': return '[' + inner + '](' + (node.getAttribute('href') || '') + ')';
        case 'img': return '![' + (node.getAttribute('alt') || '') + '](' + (node.getAttribute('src') || '') + ')';
        case 'hr': return '---\n\n';
        case 'br': return '\n';
        case 'table': return this.serializeTable(node) + '\n\n';
        case 'input': return '';
        case 'span': {
          const color   = node.style.color;
          const bgColor = node.style.backgroundColor;
          if (color)   return `<span style="color:${color}">${inner}</span>`;
          if (bgColor) return `<span style="background-color:${bgColor}">${inner}</span>`;
          return inner;
        }
        case 'div':
          // Carousel → restore individual image lines
          if (node.hasAttribute('data-carousel')) {
            const md = node.getAttribute('data-md');
            if (md) return md.replace(/&#10;/g, '\n') + '\n\n';
            // Fallback: extract from slides
            const imgs = Array.from(node.querySelectorAll('.inkwell-carousel-slide img'));
            return imgs.map(img => '![' + (img.getAttribute('alt') || '') + '](' + (img.getAttribute('src') || '') + ')').join('\n') + '\n\n';
          }
          return inner + '\n';
        default: return inner;
      }
    },

    serializeChildren(node) {
      let md = '';
      for (let i = 0; i < node.childNodes.length; i++) md += this.serializeNode(node.childNodes[i]);
      return md;
    },

    serializeList(ul, marker) {
      let md = '';
      ul.querySelectorAll(':scope > li').forEach((li, idx) => {
        const prefix = marker === '1.' ? (idx + 1) + '. ' : marker + ' ';
        md += prefix + this.serializeChildren(li).trim() + '\n';
      });
      return md;
    },

    serializeTaskList(ul) {
      let md = '';
      ul.querySelectorAll(':scope > li').forEach(li => {
        const checked = li.getAttribute('data-checked') === 'true' ||
                        (li.querySelector('input[type="checkbox"]') || {}).checked;
        const text = li.querySelector('span') ? li.querySelector('span').textContent : li.textContent;
        md += '- [' + (checked ? 'x' : ' ') + '] ' + text.trim() + '\n';
      });
      return md;
    },

    serializeTable(table) {
      let md = '';
      const thead = table.querySelector('thead');
      const tbody = table.querySelector('tbody');
      if (thead) {
        const headerRow = thead.querySelector('tr');
        if (headerRow) {
          const cells = Array.from(headerRow.querySelectorAll('th, td'));
          md += '| ' + cells.map(c => c.textContent.trim()).join(' | ') + ' |\n';
          // Alignment markers (default to center since our CSS default is center)
          md += '| ' + cells.map(c => {
            const align = c.style.textAlign || 'center';
            if (align === 'center') return ':---:';
            if (align === 'right') return '---:';
            return '---';
          }).join(' | ') + ' |\n';
        }
      }
      if (tbody) {
        tbody.querySelectorAll('tr').forEach(row => {
          const cells = Array.from(row.querySelectorAll('td, th'));
          md += '| ' + cells.map(c => c.textContent.trim() || ' ').join(' | ') + ' |\n';
        });
      }
      return md;
    }
  };

  // ----------------------------------------------------------
  // Live Converter: Real-time Markdown → HTML conversion
  // Converts markdown syntax as you type, Typora-style.
  // ----------------------------------------------------------
  const LiveConverter = {
    editor: null,

    init(editor) {
      this.editor = editor;
    },

    // Called on every input event. Checks the current block for
    // markdown patterns and converts them to rendered HTML.
    onInput(e) {
      // Don't process during composition (IME input)
      if (e && e.isComposing) return;

      const sel = window.getSelection();
      if (!sel.rangeCount) return;

      const range = sel.getRangeAt(0);
      const block = this.getParentBlock(range.startContainer);
      if (!block) return;

      // Don't convert inside code blocks
      if (block.tagName === 'PRE' || block.closest('pre')) return;

      // Check for block-level conversions first (on Enter)
      // These are handled in onEnter() instead

      // Check for inline conversions in current text node
      this.convertInlinePatterns(block);
    },

    // Called when Enter is pressed. Checks if the current line
    // starts with a block-level markdown pattern.
    onEnter(e) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return false;

      const range = sel.getRangeAt(0);
      const block = this.getParentBlock(range.startContainer);
      if (!block || block.tagName === 'PRE' || block.closest('pre')) return false;

      // Only process <p> elements (not already converted blocks)
      if (block.tagName !== 'P' && block.tagName !== 'DIV') return false;

      const text = block.textContent;

      // --- Heading: # ## ### #### ##### ######
      const headingMatch = text.match(/^(#{1,6})\s+(.*)$/);
      if (headingMatch) {
        e.preventDefault();
        const level = headingMatch[1].length;
        const content = headingMatch[2];
        const heading = document.createElement('h' + level);
        heading.textContent = content || '\u200B';
        block.parentNode.replaceChild(heading, block);
        // Add empty paragraph after heading
        const p = document.createElement('p');
        p.innerHTML = '<br>';
        heading.parentNode.insertBefore(p, heading.nextSibling);
        this.setCursorAt(p, 0);
        this.editor.onContentChange();
        return true;
      }

      // --- Horizontal rule: --- or *** or ___
      if (/^(---|___|(\*\*\*))$/.test(text.trim())) {
        e.preventDefault();
        const hr = document.createElement('hr');
        const p = document.createElement('p');
        p.innerHTML = '<br>';
        block.parentNode.replaceChild(hr, block);
        hr.parentNode.insertBefore(p, hr.nextSibling);
        this.setCursorAt(p, 0);
        this.editor.onContentChange();
        return true;
      }

      // --- Fenced code block: ```
      if (/^```/.test(text.trim())) {
        e.preventDefault();
        const lang = text.trim().slice(3).trim();
        const pre = document.createElement('pre');
        const code = document.createElement('code');
        if (lang) {
          code.className = 'language-' + lang;
          pre.setAttribute('data-language', lang);
        }
        code.textContent = '\n';
        pre.appendChild(code);
        block.parentNode.replaceChild(pre, block);
        this.setCursorAt(code, 0);
        this.editor.onContentChange();
        return true;
      }

      // --- Blockquote: >
      if (/^>\s/.test(text)) {
        e.preventDefault();
        const content = text.replace(/^>\s?/, '');
        const bq = document.createElement('blockquote');
        const inner = document.createElement('p');
        inner.textContent = content || '\u200B';
        bq.appendChild(inner);
        block.parentNode.replaceChild(bq, block);
        // Add empty paragraph after
        const p = document.createElement('p');
        p.innerHTML = '<br>';
        bq.parentNode.insertBefore(p, bq.nextSibling);
        this.setCursorAt(p, 0);
        this.editor.onContentChange();
        return true;
      }

      // --- Task list: - [ ] or - [x]
      const taskMatch = text.match(/^[-*]\s+\[([ xX])\]\s*(.*)/);
      if (taskMatch) {
        e.preventDefault();
        const checked = taskMatch[1].toLowerCase() === 'x';
        const content = taskMatch[2];
        const ul = document.createElement('ul');
        ul.setAttribute('data-type', 'taskList');
        const li = document.createElement('li');
        li.setAttribute('data-type', 'taskItem');
        li.setAttribute('data-checked', String(checked));
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = checked;
        cb.addEventListener('change', () => {
          li.setAttribute('data-checked', String(cb.checked));
          this.editor.onContentChange();
        });
        const span = document.createElement('span');
        span.textContent = content || '\u200B';
        li.appendChild(cb);
        li.appendChild(span);
        ul.appendChild(li);
        block.parentNode.replaceChild(ul, block);
        this.setCursorAtEnd(span);
        this.editor.onContentChange();
        return true;
      }

      // --- Unordered list: - or * or +
      const ulMatch = text.match(/^([-*+])\s+(.*)$/);
      if (ulMatch) {
        e.preventDefault();
        const content = ulMatch[2];
        const ul = document.createElement('ul');
        const li = document.createElement('li');
        li.textContent = content || '\u200B';
        ul.appendChild(li);
        block.parentNode.replaceChild(ul, block);
        this.setCursorAtEnd(li);
        this.editor.onContentChange();
        return true;
      }

      // --- Ordered list: 1.
      const olMatch = text.match(/^(\d+)\.\s+(.*)$/);
      if (olMatch) {
        e.preventDefault();
        const content = olMatch[2];
        const ol = document.createElement('ol');
        const li = document.createElement('li');
        li.textContent = content || '\u200B';
        ol.appendChild(li);
        block.parentNode.replaceChild(ol, block);
        this.setCursorAtEnd(li);
        this.editor.onContentChange();
        return true;
      }

      return false;
    },

    // Scan a block element for inline markdown patterns and convert them.
    convertInlinePatterns(block) {
      const walker = document.createTreeWalker(block, NodeFilter.SHOW_TEXT, null);
      let textNode;

      while (textNode = walker.nextNode()) {
        // Skip text inside already-formatted elements
        const parent = textNode.parentNode;
        if (parent.tagName === 'CODE' || parent.tagName === 'PRE' ||
            parent.tagName === 'A' || parent.tagName === 'STRONG' ||
            parent.tagName === 'EM' || parent.tagName === 'DEL' ||
            parent.tagName === 'B' || parent.tagName === 'I' ||
            parent.tagName === 'S' || parent.tagName === 'MARK') continue;

        const text = textNode.textContent;
        let converted = false;

        // Order matters — check longer/more specific patterns first

        // Bold+Italic: ***text***
        converted = converted || this.tryConvertInline(textNode, /\*\*\*(.+?)\*\*\*/, (match, content) => {
          const strong = document.createElement('strong');
          const em = document.createElement('em');
          em.textContent = content;
          strong.appendChild(em);
          return strong;
        });
        if (converted) break;

        // Bold: **text**
        converted = this.tryConvertInline(textNode, /\*\*(.+?)\*\*/, (match, content) => {
          const el = document.createElement('strong');
          el.textContent = content;
          return el;
        });
        if (converted) break;

        // Bold: __text__
        converted = this.tryConvertInline(textNode, /__(.+?)__/, (match, content) => {
          const el = document.createElement('strong');
          el.textContent = content;
          return el;
        });
        if (converted) break;

        // Italic: *text*  (but not ** which is bold)
        converted = this.tryConvertInline(textNode, /(?<!\*)\*([^*]+?)\*(?!\*)/, (match, content) => {
          const el = document.createElement('em');
          el.textContent = content;
          return el;
        });
        if (converted) break;

        // Italic: _text_  (but not __ which is bold)
        converted = this.tryConvertInline(textNode, /(?<!_)_([^_]+?)_(?!_)/, (match, content) => {
          const el = document.createElement('em');
          el.textContent = content;
          return el;
        });
        if (converted) break;

        // Strikethrough: ~~text~~
        converted = this.tryConvertInline(textNode, /~~(.+?)~~/, (match, content) => {
          const el = document.createElement('del');
          el.textContent = content;
          return el;
        });
        if (converted) break;

        // Highlight: ==text==
        converted = this.tryConvertInline(textNode, /==(.+?)==/, (match, content) => {
          const el = document.createElement('mark');
          el.textContent = content;
          return el;
        });
        if (converted) break;

        // Inline code: `text`
        converted = this.tryConvertInline(textNode, /`([^`]+?)`/, (match, content) => {
          const el = document.createElement('code');
          el.textContent = content;
          return el;
        });
        if (converted) break;

        // Link: [text](url)
        converted = this.tryConvertInline(textNode, /\[([^\]]+)\]\(([^)]+)\)/, (match, text, url) => {
          const el = document.createElement('a');
          el.href = url;
          el.textContent = text;
          el.setAttribute('target', '_blank');
          return el;
        });
        if (converted) break;

        // Image: ![alt](url)
        converted = this.tryConvertInline(textNode, /!\[([^\]]*)\]\(([^)]+)\)/, (match, alt, url) => {
          const el = document.createElement('img');
          el.src = url;
          el.alt = alt;
          return el;
        });
        if (converted) break;
      }
    },

    // Try to find and convert a pattern in a text node.
    // Returns true if a conversion was made.
    tryConvertInline(textNode, regex, createEl) {
      const text = textNode.textContent;
      const match = regex.exec(text);
      if (!match) return false;

      // Don't convert if cursor is inside the match (user is still typing)
      const sel = window.getSelection();
      if (sel.rangeCount) {
        const cursorNode = sel.getRangeAt(0).startContainer;
        const cursorOffset = sel.getRangeAt(0).startOffset;
        if (cursorNode === textNode) {
          const matchEnd = match.index + match[0].length;
          // Only convert if cursor is at or past the end of the match
          if (cursorOffset < matchEnd) return false;
        }
      }

      // Split text node: before | element | after
      const before = text.substring(0, match.index);
      const after = text.substring(match.index + match[0].length);

      const newEl = createEl(match[0], ...match.slice(1));
      const parent = textNode.parentNode;

      // Build fragment: [beforeText, newElement, afterText]
      const frag = document.createDocumentFragment();
      if (before) frag.appendChild(document.createTextNode(before));
      frag.appendChild(newEl);
      const afterNode = document.createTextNode(after || '\u200B');
      frag.appendChild(afterNode);

      parent.replaceChild(frag, textNode);

      // Place cursor after the converted element
      const range = document.createRange();
      range.setStart(afterNode, after ? 0 : 1);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);

      this.editor.onContentChange();
      return true;
    },

    // Get the nearest block-level parent of a node
    getParentBlock(node) {
      const blockTags = ['P', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6',
                         'LI', 'BLOCKQUOTE', 'PRE', 'DIV', 'TD', 'TH'];
      while (node && node !== this.editor.element) {
        if (node.nodeType === Node.ELEMENT_NODE && blockTags.includes(node.tagName)) {
          return node;
        }
        node = node.parentNode;
      }
      return null;
    },

    setCursorAt(node, offset) {
      const sel = window.getSelection();
      const range = document.createRange();
      if (node.childNodes.length > 0 && offset === 0) {
        range.setStart(node.childNodes[0] || node, 0);
      } else {
        range.setStart(node, offset);
      }
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    },

    setCursorAtEnd(node) {
      const sel = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(node);
      range.collapse(false);
      sel.removeAllRanges();
      sel.addRange(range);
    }
  };

  // ----------------------------------------------------------
  // Carousel Manager: image carousel interaction
  // ----------------------------------------------------------
  const CarouselManager = {
    init(editor) {
      // Use event delegation on the editor element
      editor.element.addEventListener('click', (e) => this.onClick(e));
      editor.element.addEventListener('keydown', (e) => this.onKeyDown(e));
    },

    onClick(e) {
      // Arrow buttons
      const arrow = e.target.closest('.inkwell-carousel-arrow');
      if (arrow) {
        e.preventDefault();
        const carousel = arrow.closest('.inkwell-carousel');
        if (!carousel) return;
        const delta = arrow.classList.contains('prev') ? -1 : 1;
        this.go(carousel, delta);
        return;
      }
      // Dot buttons
      const dot = e.target.closest('.inkwell-carousel-dot');
      if (dot) {
        e.preventDefault();
        const carousel = dot.closest('.inkwell-carousel');
        if (!carousel) return;
        const idx = parseInt(dot.getAttribute('data-dot'));
        this.goTo(carousel, idx);
        return;
      }
    },

    onKeyDown(e) {
      // Allow left/right arrow keys when a carousel is focused
      if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      let node = sel.getRangeAt(0).startContainer;
      while (node) {
        if (node.classList && node.classList.contains('inkwell-carousel')) {
          e.preventDefault();
          this.go(node, e.key === 'ArrowLeft' ? -1 : 1);
          return;
        }
        node = node.parentNode;
      }
    },

    go(carousel, delta) {
      const count = parseInt(carousel.getAttribute('data-count'));
      const current = parseInt(carousel.getAttribute('data-current'));
      const next = Math.max(0, Math.min(count - 1, current + delta));
      this.goTo(carousel, next);
    },

    goTo(carousel, idx) {
      const count = parseInt(carousel.getAttribute('data-count'));
      idx = Math.max(0, Math.min(count - 1, idx));
      carousel.setAttribute('data-current', idx);

      // Move track
      const track = carousel.querySelector('.inkwell-carousel-track');
      if (track) track.style.transform = 'translateX(-' + (idx * 100) + '%)';

      // Update dots
      carousel.querySelectorAll('.inkwell-carousel-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === idx);
      });

      // Update counter
      const counter = carousel.querySelector('.inkwell-carousel-counter');
      if (counter) counter.textContent = (idx + 1) + ' / ' + count;

      // Update arrow disabled state
      const prev = carousel.querySelector('.inkwell-carousel-arrow.prev');
      const next = carousel.querySelector('.inkwell-carousel-arrow.next');
      if (prev) prev.disabled = idx === 0;
      if (next) next.disabled = idx === count - 1;
    },

    // Called after loadMarkdown to initialize all carousels
    initAll(container) {
      container.querySelectorAll('[data-carousel]').forEach(carousel => {
        this.goTo(carousel, 0);
      });
    }
  };

  // ----------------------------------------------------------
  // Carousel Dialog: insert-carousel popup UI
  // ----------------------------------------------------------
  const CarouselDialog = {
    images: [],
    _pendingLocal: false,
    _insertAfterNode: null,

    open(editor) {
      this.images = [];
      this._pendingLocal = false;
      const sel = window.getSelection();
      if (sel && sel.rangeCount) {
        let node = sel.getRangeAt(0).startContainer;
        if (node.nodeType === Node.TEXT_NODE) node = node.parentNode;
        while (node && node.parentNode !== editor.element) node = node.parentNode;
        this._insertAfterNode = node || null;
      } else {
        this._insertAfterNode = null;
      }
      this._render();
    },

    receiveLocalImage(src) {
      if (!this._pendingLocal) return;
      this._pendingLocal = false;
      this.images.push({ src, alt: '' });
      this._render();
    },

    _render() {
      const overlay = document.getElementById('inkwell-carousel-dialog');
      overlay.style.display = 'flex';
      overlay.className = 'inkwell-dialog-overlay';
      const imgs = this.images;
      const listHtml = imgs.length === 0
        ? '<div class="inkwell-img-empty">No images yet — add some below.</div>'
        : imgs.map((img, i) => `
          <div class="inkwell-img-item" data-idx="${i}">
            <img class="inkwell-img-thumb" src="${this._esc(img.src)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="">
            <div class="inkwell-img-thumb-placeholder" style="display:none">🖼</div>
            <div class="inkwell-img-info">
              <div class="inkwell-img-url" title="${this._esc(img.src)}">${this._esc(this._shortUrl(img.src))}</div>
              <input class="inkwell-img-alt-input" type="text" placeholder="Alt text (optional)" value="${this._esc(img.alt)}" data-alt-idx="${i}">
            </div>
            <div class="inkwell-img-actions">
              ${i > 0 ? `<button class="inkwell-img-btn" data-move-up="${i}">↑</button>` : '<span style="width:24px"></span>'}
              ${i < imgs.length - 1 ? `<button class="inkwell-img-btn" data-move-down="${i}">↓</button>` : '<span style="width:24px"></span>'}
              <button class="inkwell-img-btn remove" data-remove="${i}">✕</button>
            </div>
          </div>`).join('');

      overlay.innerHTML = `
        <div class="inkwell-dialog">
          <div class="inkwell-dialog-header">
            <span class="inkwell-dialog-title">🖼 Insert Image Carousel</span>
            <button class="inkwell-dialog-close" id="ikw-dlg-close">×</button>
          </div>
          <div class="inkwell-dialog-body">
            <div class="inkwell-img-list">${listHtml}</div>
            <div class="inkwell-add-controls">
              <button class="inkwell-add-btn" id="ikw-add-local">📁 Add Local Image</button>
              <button class="inkwell-add-btn" id="ikw-show-url">🔗 Add by URL</button>
            </div>
            <div id="ikw-url-row" class="inkwell-url-row" style="display:none">
              <input class="inkwell-url-input" id="ikw-url-input" type="url" placeholder="https://example.com/image.jpg">
              <button class="inkwell-url-add" id="ikw-url-confirm">Add</button>
            </div>
          </div>
          <div class="inkwell-dialog-footer">
            <button class="inkwell-dialog-cancel" id="ikw-dlg-cancel">Cancel</button>
            <button class="inkwell-dialog-insert" id="ikw-dlg-insert" ${imgs.length < 1 ? 'disabled' : ''}>
              ${imgs.length < 2 ? 'Insert Image' : 'Insert Carousel (' + imgs.length + ' images)'}
            </button>
          </div>
        </div>`;

      this._bindEvents(overlay);
    },

    _bindEvents(overlay) {
      overlay.querySelector('#ikw-dlg-close').onclick = () => this.close();
      overlay.querySelector('#ikw-dlg-cancel').onclick = () => this.close();
      overlay.onclick = (e) => { if (e.target === overlay) this.close(); };

      overlay.querySelector('#ikw-add-local').onclick = () => {
        this._pendingLocal = true;
        try {
          window.webkit.messageHandlers.inkwell.postMessage(
            JSON.stringify({ type: 'requestImageInput', data: { carouselMode: true } })
          );
        } catch(e) { this._pendingLocal = false; }
      };

      const urlRow = overlay.querySelector('#ikw-url-row');
      overlay.querySelector('#ikw-show-url').onclick = () => {
        urlRow.style.display = urlRow.style.display === 'none' ? 'flex' : 'none';
        if (urlRow.style.display === 'flex') overlay.querySelector('#ikw-url-input').focus();
      };

      const urlInput = overlay.querySelector('#ikw-url-input');
      const doAddUrl = () => {
        const val = urlInput.value.trim();
        if (!val) return;
        this.images.push({ src: val, alt: '' });
        urlInput.value = '';
        this._render();
      };
      overlay.querySelector('#ikw-url-confirm').onclick = doAddUrl;
      urlInput.onkeydown = (e) => { if (e.key === 'Enter') doAddUrl(); };

      overlay.querySelectorAll('[data-alt-idx]').forEach(inp => {
        inp.oninput = () => { this.images[parseInt(inp.getAttribute('data-alt-idx'))].alt = inp.value; };
      });
      overlay.querySelectorAll('[data-move-up]').forEach(btn => {
        btn.onclick = () => {
          const i = parseInt(btn.getAttribute('data-move-up'));
          [this.images[i-1], this.images[i]] = [this.images[i], this.images[i-1]];
          this._render();
        };
      });
      overlay.querySelectorAll('[data-move-down]').forEach(btn => {
        btn.onclick = () => {
          const i = parseInt(btn.getAttribute('data-move-down'));
          [this.images[i], this.images[i+1]] = [this.images[i+1], this.images[i]];
          this._render();
        };
      });
      overlay.querySelectorAll('[data-remove]').forEach(btn => {
        btn.onclick = () => { this.images.splice(parseInt(btn.getAttribute('data-remove')), 1); this._render(); };
      });

      const insertBtn = overlay.querySelector('#ikw-dlg-insert');
      if (insertBtn && !insertBtn.disabled) insertBtn.onclick = () => this._doInsert();
    },

    _doInsert() {
      if (this.images.length < 1) return;
      this.close();

      const editor = document.getElementById('editor');

      if (this.images.length === 1) {
        const img = document.createElement('img');
        img.src = this.images[0].src; img.alt = this.images[0].alt;
        const sel = window.getSelection();
        if (sel.rangeCount) { const r = sel.getRangeAt(0); r.deleteContents(); r.insertNode(img); r.setStartAfter(img); r.collapse(true); sel.removeAllRanges(); sel.addRange(r); }
        else editor.appendChild(img);
        const event = new Event('input', { bubbles: true }); editor.dispatchEvent(event);
        return;
      }

      // Build carousel
      const carousel = document.createElement('div');
      carousel.className = 'inkwell-carousel';
      carousel.setAttribute('contenteditable', 'false');
      carousel.setAttribute('data-carousel', '');
      carousel.setAttribute('data-count', this.images.length);
      carousel.setAttribute('data-current', '0');
      carousel.setAttribute('data-md', this.images.map(img => '![' + img.alt + '](' + img.src + ')').join('\n'));

      const track = document.createElement('div'); track.className = 'inkwell-carousel-track';
      this.images.forEach((img, idx) => {
        const slide = document.createElement('div');
        slide.className = 'inkwell-carousel-slide'; slide.setAttribute('data-index', idx);
        const im = document.createElement('img'); im.src = img.src; im.alt = img.alt;
        slide.appendChild(im); track.appendChild(slide);
      });
      carousel.appendChild(track);

      const prevBtn = document.createElement('button');
      prevBtn.className = 'inkwell-carousel-arrow prev'; prevBtn.setAttribute('aria-label', 'Previous');
      prevBtn.innerHTML = '<span class="inkwell-carousel-arrow-icon">&#8249;</span>';
      carousel.appendChild(prevBtn);

      const nextBtn = document.createElement('button');
      nextBtn.className = 'inkwell-carousel-arrow next'; nextBtn.setAttribute('aria-label', 'Next');
      nextBtn.innerHTML = '<span class="inkwell-carousel-arrow-icon">&#8250;</span>';
      carousel.appendChild(nextBtn);

      const dots = document.createElement('div'); dots.className = 'inkwell-carousel-dots';
      this.images.forEach((_, idx) => {
        const dot = document.createElement('button');
        dot.className = 'inkwell-carousel-dot' + (idx === 0 ? ' active' : '');
        dot.setAttribute('data-dot', idx); dot.setAttribute('aria-label', 'Slide ' + (idx+1));
        dots.appendChild(dot);
      });
      carousel.appendChild(dots);

      const counter = document.createElement('div');
      counter.className = 'inkwell-carousel-counter'; counter.textContent = '1 / ' + this.images.length;
      carousel.appendChild(counter);

      CarouselManager.goTo(carousel, 0);

      if (this._insertAfterNode && this._insertAfterNode.parentNode === editor) {
        this._insertAfterNode.parentNode.insertBefore(carousel, this._insertAfterNode.nextSibling);
      } else {
        editor.appendChild(carousel);
      }
      const p = document.createElement('p'); p.innerHTML = '<br>';
      carousel.parentNode.insertBefore(p, carousel.nextSibling);
      const range = document.createRange(); range.setStart(p, 0); range.collapse(true);
      const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);

      const event = new Event('input', { bubbles: true }); editor.dispatchEvent(event);
    },

    close() {
      const overlay = document.getElementById('inkwell-carousel-dialog');
      overlay.style.display = 'none';
      overlay.innerHTML = '';
      this._pendingLocal = false;
    },

    _esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); },
    _shortUrl(s) { try { return decodeURIComponent(s).split('/').pop() || s; } catch(e) { return s; } }
  };
  const TableManager = {
    editor: null,
    activeTable: null,
    toolbar: null,
    resizing: null,

    init(editor) {
      this.editor = editor;
      // Listen for clicks to detect table focus
      editor.element.addEventListener('click', (e) => this.onClick(e));
      // Listen for keydown inside tables
      editor.element.addEventListener('keydown', (e) => this.onKeyDown(e));
      // Dismiss toolbar on click outside
      document.addEventListener('click', (e) => {
        if (this.toolbar && !this.toolbar.contains(e.target) && !this.getTableFromEvent(e)) {
          this.hideToolbar();
        }
      });
    },

    // --- Event Handlers ---

    onClick(e) {
      const table = this.getTableFromEvent(e);
      if (table) {
        this.activeTable = table;
        this.showToolbar(table);
        this.setupResizeHandles(table);

        // Sort on header click
        const th = e.target.closest('th');
        if (th && !e.target.classList.contains('inkwell-col-resize')) {
          this.sortByColumn(table, th);
        }
      }
    },

    onKeyDown(e) {
      const cell = this.getCurrentCell();
      if (!cell) return;
      const table = cell.closest('table');
      if (!table) return;

      // Tab: move to next cell
      if (e.key === 'Tab') {
        e.preventDefault();
        e.stopPropagation();
        if (e.shiftKey) {
          this.moveToPrevCell(cell, table);
        } else {
          this.moveToNextCell(cell, table);
        }
        return;
      }

      // Enter inside table cell: prevent new paragraph, move to cell below
      if (e.key === 'Enter' && !e.shiftKey) {
        const isInTable = cell.closest('table');
        if (isInTable) {
          e.preventDefault();
          this.moveToCellBelow(cell, table);
          return;
        }
      }

      // Escape: deselect table, move cursor after table
      if (e.key === 'Escape') {
        this.hideToolbar();
        const p = document.createElement('p');
        p.innerHTML = '<br>';
        table.parentNode.insertBefore(p, table.nextSibling);
        const range = document.createRange();
        range.setStart(p, 0);
        range.collapse(true);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    },

    // --- Navigation ---

    getCurrentCell() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return null;
      let node = sel.getRangeAt(0).startContainer;
      while (node && node !== this.editor.element) {
        if (node.tagName === 'TD' || node.tagName === 'TH') return node;
        node = node.parentNode;
      }
      return null;
    },

    moveToNextCell(cell, table) {
      const cells = Array.from(table.querySelectorAll('th, td'));
      const idx = cells.indexOf(cell);
      if (idx < cells.length - 1) {
        this.focusCell(cells[idx + 1]);
      } else {
        // At last cell — add new row
        this.addRow(table, 'below');
        const newCells = Array.from(table.querySelectorAll('td'));
        const lastRow = table.querySelector('tbody tr:last-child');
        if (lastRow) this.focusCell(lastRow.querySelector('td'));
      }
    },

    moveToPrevCell(cell, table) {
      const cells = Array.from(table.querySelectorAll('th, td'));
      const idx = cells.indexOf(cell);
      if (idx > 0) this.focusCell(cells[idx - 1]);
    },

    moveToCellBelow(cell, table) {
      const row = cell.closest('tr');
      const cellIdx = Array.from(row.children).indexOf(cell);
      const nextRow = row.nextElementSibling || (row.closest('thead') ? table.querySelector('tbody tr') : null);
      if (nextRow) {
        const target = nextRow.children[cellIdx];
        if (target) this.focusCell(target);
      }
    },

    focusCell(cell) {
      const range = document.createRange();
      range.selectNodeContents(cell);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      cell.focus();
    },

    // --- Floating Toolbar ---

    showToolbar(table) {
      this.hideToolbar();
      const tb = document.createElement('div');
      tb.className = 'inkwell-table-toolbar';
      tb.contentEditable = 'false';

      const btns = [
        { label: '+ Row ↑', action: () => this.addRow(table, 'above') },
        { label: '+ Row ↓', action: () => this.addRow(table, 'below') },
        { sep: true },
        { label: '+ Col ←', action: () => this.addCol(table, 'before') },
        { label: '+ Col →', action: () => this.addCol(table, 'after') },
        { sep: true },
        { label: '⊖ Row', action: () => this.deleteRow(table) },
        { label: '⊖ Col', action: () => this.deleteCol(table) },
        { sep: true },
        { label: '⇤', title: 'Align Left', action: () => this.alignCol(table, 'left') },
        { label: '⇔', title: 'Align Center', action: () => this.alignCol(table, 'center') },
        { label: '⇥', title: 'Align Right', action: () => this.alignCol(table, 'right') },
      ];

      btns.forEach(b => {
        if (b.sep) {
          const sep = document.createElement('div');
          sep.className = 'separator';
          tb.appendChild(sep);
          return;
        }
        const btn = document.createElement('button');
        btn.textContent = b.label;
        if (b.title) btn.title = b.title;
        btn.addEventListener('mousedown', (e) => {
          e.preventDefault();
          e.stopPropagation();
          b.action();
          this.editor.onContentChange();
        });
        tb.appendChild(btn);
      });

      // Append to editor-container (outside contentEditable) for proper rendering
      const container = document.querySelector('.editor-container');

      // Position above table, relative to container
      const tableRect = table.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      tb.style.left = Math.max(0, tableRect.left - containerRect.left) + 'px';
      tb.style.top = (tableRect.top - containerRect.top - 38) + 'px';

      container.appendChild(tb);
      this.toolbar = tb;
    },

    hideToolbar() {
      if (this.toolbar) {
        this.toolbar.remove();
        this.toolbar = null;
      }
      this.activeTable = null;
    },

    // --- Add / Delete Rows & Columns ---

    addRow(table, position) {
      const cell = this.getCurrentCell();
      const tbody = table.querySelector('tbody') || table;
      const colCount = (table.querySelector('tr') || {}).children?.length || 3;
      const newRow = document.createElement('tr');
      for (let i = 0; i < colCount; i++) {
        const td = document.createElement('td');
        td.innerHTML = '&nbsp;';
        newRow.appendChild(td);
      }

      if (position === 'above' && cell) {
        const row = cell.closest('tr');
        if (row && row.closest('tbody')) {
          row.parentNode.insertBefore(newRow, row);
        } else {
          // Above header — insert as first tbody row
          const firstTbodyRow = tbody.querySelector('tr');
          if (firstTbodyRow) tbody.insertBefore(newRow, firstTbodyRow);
          else tbody.appendChild(newRow);
        }
      } else {
        if (cell) {
          const row = cell.closest('tr');
          if (row && row.closest('tbody')) {
            row.parentNode.insertBefore(newRow, row.nextSibling);
          } else {
            // After header row — insert as first tbody row
            const firstTbodyRow = tbody.querySelector('tr');
            if (firstTbodyRow) tbody.insertBefore(newRow, firstTbodyRow);
            else tbody.appendChild(newRow);
          }
        } else {
          tbody.appendChild(newRow);
        }
      }
      this.focusCell(newRow.querySelector('td'));
    },

    deleteRow(table) {
      const cell = this.getCurrentCell();
      if (!cell) return;
      const row = cell.closest('tr');
      if (!row) return;
      // Don't delete header row
      if (row.closest('thead')) return;
      const tbody = table.querySelector('tbody');
      if (tbody && tbody.querySelectorAll('tr').length <= 1) return; // keep at least 1 row
      const prevRow = row.previousElementSibling || row.nextElementSibling;
      row.remove();
      if (prevRow) this.focusCell(prevRow.querySelector('td, th'));
    },

    addCol(table, position) {
      const cell = this.getCurrentCell();
      let colIdx = 0;
      if (cell) {
        colIdx = Array.from(cell.closest('tr').children).indexOf(cell);
      }
      const insertIdx = position === 'after' ? colIdx + 1 : colIdx;

      table.querySelectorAll('tr').forEach(row => {
        const newCell = document.createElement(row.closest('thead') ? 'th' : 'td');
        newCell.innerHTML = row.closest('thead') ? 'Header' : '&nbsp;';
        const ref = row.children[insertIdx];
        if (ref) row.insertBefore(newCell, ref);
        else row.appendChild(newCell);
      });
      this.setupResizeHandles(table);
    },

    deleteCol(table) {
      const cell = this.getCurrentCell();
      if (!cell) return;
      const colIdx = Array.from(cell.closest('tr').children).indexOf(cell);
      const colCount = table.querySelector('tr').children.length;
      if (colCount <= 1) return; // keep at least 1 column

      table.querySelectorAll('tr').forEach(row => {
        if (row.children[colIdx]) row.children[colIdx].remove();
      });
      this.setupResizeHandles(table);
    },

    // --- Column Alignment ---

    alignCol(table, alignment) {
      const cell = this.getCurrentCell();
      if (!cell) return;
      const colIdx = Array.from(cell.closest('tr').children).indexOf(cell);

      table.querySelectorAll('tr').forEach(row => {
        const c = row.children[colIdx];
        if (c) {
          c.classList.remove('align-left', 'align-center', 'align-right');
          if (alignment !== 'left') c.classList.add('align-' + alignment);
          c.style.textAlign = alignment;
        }
      });
    },

    // --- Column Sorting ---

    sortByColumn(table, th) {
      const thead = table.querySelector('thead');
      const tbody = table.querySelector('tbody');
      if (!thead || !tbody) return;

      const colIdx = Array.from(th.closest('tr').children).indexOf(th);
      const currentSort = th.dataset.sort || '';

      // Cycle: none → asc → desc → none
      let newSort;
      if (currentSort === '') newSort = 'asc';
      else if (currentSort === 'asc') newSort = 'desc';
      else newSort = '';

      // Clear all sort indicators
      thead.querySelectorAll('th').forEach(h => delete h.dataset.sort);
      if (newSort) th.dataset.sort = newSort;

      if (!newSort) return; // reset to original order — skip

      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.sort((a, b) => {
        const aText = (a.children[colIdx]?.textContent || '').trim();
        const bText = (b.children[colIdx]?.textContent || '').trim();
        // Try numeric sort first
        const aNum = parseFloat(aText);
        const bNum = parseFloat(bText);
        if (!isNaN(aNum) && !isNaN(bNum)) {
          return newSort === 'asc' ? aNum - bNum : bNum - aNum;
        }
        // String sort
        const cmp = aText.localeCompare(bText, undefined, { sensitivity: 'base' });
        return newSort === 'asc' ? cmp : -cmp;
      });

      rows.forEach(r => tbody.appendChild(r));
      this.editor.onContentChange();
    },

    // --- Column Resize ---

    setupResizeHandles(table) {
      // Remove existing handles
      table.querySelectorAll('.inkwell-col-resize').forEach(h => h.remove());

      const headerCells = table.querySelectorAll('thead th');
      headerCells.forEach((th, idx) => {
        if (idx === headerCells.length - 1) return; // no handle on last column
        const handle = document.createElement('div');
        handle.className = 'inkwell-col-resize';
        handle.contentEditable = 'false';
        th.style.position = 'relative';
        th.appendChild(handle);

        handle.addEventListener('mousedown', (e) => {
          e.preventDefault();
          e.stopPropagation();
          this.startResize(e, table, idx);
        });
      });
    },

    startResize(e, table, colIdx) {
      const startX = e.clientX;
      const headerCells = table.querySelectorAll('thead th');
      const startWidth = headerCells[colIdx].offsetWidth;
      const handle = headerCells[colIdx].querySelector('.inkwell-col-resize');
      if (handle) handle.classList.add('active');

      const onMouseMove = (e) => {
        const diff = e.clientX - startX;
        const newWidth = Math.max(40, startWidth + diff);
        // Apply width to all cells in this column
        table.querySelectorAll('tr').forEach(row => {
          const cell = row.children[colIdx];
          if (cell) cell.style.width = newWidth + 'px';
        });
      };

      const onMouseUp = () => {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        if (handle) handle.classList.remove('active');
        this.editor.onContentChange();
      };

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    },

    // --- Helpers ---

    getTableFromEvent(e) {
      let node = e.target;
      while (node && node !== this.editor.element) {
        if (node.tagName === 'TABLE') return node;
        node = node.parentNode;
      }
      return null;
    }
  };

  // ----------------------------------------------------------
  // Editor Core
  // ----------------------------------------------------------
  const Editor = {
    element: null,
    lastContent: '',

    init() {
      this.element = document.getElementById('editor');
      this.element.setAttribute('contenteditable', 'true');
      this.element.classList.add('ProseMirror');

      // Initialize live converter
      LiveConverter.init(this);

      // Initialize table manager
      TableManager.init(this);

      // Initialize carousel manager
      CarouselManager.init(this);

      this.element.addEventListener('input', (e) => {
        this.onContentChange();
        // Run live conversion after content change is reported
        LiveConverter.onInput(e);
      });

      this.element.addEventListener('keydown', (e) => {
        // Handle Enter for block-level conversions
        if (e.key === 'Enter' && !e.shiftKey) {
          if (LiveConverter.onEnter(e)) return;
        }
      });

      document.addEventListener('selectionchange', () => this.updateSelectionState());

      this.setupKeyboardShortcuts();

      // Listen for dark mode changes to swap hljs theme
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        this.updateDarkModeTheme();
      });
      this.updateDarkModeTheme();

      this.postMessage('editorReady', {});
    },

    // --- Content ---

    onContentChange() {
      const md = this.getMarkdown();
      if (md !== this.lastContent) {
        this.lastContent = md;
        this.postMessage('contentChange', { content: md });
      }
    },

    loadMarkdown(markdown) {
      this.lastContent = markdown;
      this.element.innerHTML = MarkdownParser.parse(markdown);
      this.element.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => this.onContentChange());
      });
      this.highlightCodeBlocks();
      // Set up table resize handles
      this.element.querySelectorAll('table').forEach(t => TableManager.setupResizeHandles(t));
      // Initialize carousels
      CarouselManager.initAll(this.element);
    },

    // --- Syntax Highlighting ---

    highlightCodeBlocks() {
      if (typeof hljs === 'undefined') return;

      // Find which code block the cursor is in (skip highlighting that one)
      let activeCodeBlock = null;
      const sel = window.getSelection();
      if (sel.rangeCount) {
        let node = sel.getRangeAt(0).startContainer;
        while (node && node !== this.element) {
          if (node.tagName === 'CODE' && node.parentNode && node.parentNode.tagName === 'PRE') {
            activeCodeBlock = node;
            break;
          }
          node = node.parentNode;
        }
      }

      this.element.querySelectorAll('pre code').forEach(block => {
        // Don't highlight the block user is currently editing
        if (block === activeCodeBlock) return;

        // Get the plain text content
        const plainText = block.textContent;

        // Clear previous highlighting
        if (block.dataset.highlighted === 'yes') {
          block.textContent = plainText;
          delete block.dataset.highlighted;
        }

        // Set language label on pre element
        const langMatch = block.className.match(/language-(\w+)/);
        if (langMatch) {
          block.closest('pre').setAttribute('data-language', langMatch[1]);
        }

        try {
          hljs.highlightElement(block);
        } catch(e) { /* language not supported, ignore */ }
      });
      this.updateDarkModeTheme();
    },

    // Re-highlight all code blocks (called when cursor leaves a code block)
    rehighlightAll() {
      if (typeof hljs === 'undefined') return;
      this.element.querySelectorAll('pre code').forEach(block => {
        const plainText = block.textContent;
        if (block.dataset.highlighted === 'yes') {
          block.textContent = plainText;
          delete block.dataset.highlighted;
        }
        const langMatch = block.className.match(/language-(\w+)/);
        if (langMatch) {
          block.closest('pre').setAttribute('data-language', langMatch[1]);
        }
        try {
          hljs.highlightElement(block);
        } catch(e) {}
      });
    },

    updateDarkModeTheme() {
      const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const themeLink = document.getElementById('hljs-theme');
      if (themeLink) {
        const base = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/';
        themeLink.href = isDark ? base + 'github-dark.min.css' : base + 'github.min.css';
      }
    },

    getMarkdown() {
      // Clear find highlights before serializing
      const marks = this.element.querySelectorAll('.inkwell-find-highlight');
      if (marks.length > 0) {
        marks.forEach(m => {
          const text = document.createTextNode(m.textContent);
          m.parentNode.replaceChild(text, m);
        });
        this.element.normalize();
      }
      return MarkdownSerializer.serialize(this.element);
    },

    applyTheme(css) {
      document.getElementById('theme-style').textContent = css;
    },

    // --- Keyboard Shortcuts ---

    setupKeyboardShortcuts() {
      this.element.addEventListener('keydown', (e) => {
        const mod = e.metaKey || e.ctrlKey;
        if (!mod) return;

        const key = e.key.toLowerCase();
        let handled = true;

        if      (key === 'b' && !e.shiftKey) this.execFormat('bold');
        else if (key === 'i' && !e.shiftKey) this.execFormat('italic');
        else if (key === 'k' && !e.shiftKey) this.execFormat('link');
        else if (key === 'e' && !e.shiftKey) this.execFormat('inlineCode');
        else if (key === 'd' && e.shiftKey)  this.execFormat('strikethrough');
        else if (key === 'e' && e.shiftKey)  this.execFormat('codeBlock');
        else if (key === '1' && e.shiftKey)  this.execFormat('heading1');
        else if (key === '2' && e.shiftKey)  this.execFormat('heading2');
        else if (key === '3' && e.shiftKey)  this.execFormat('heading3');
        else if (key === '8' && e.shiftKey)  this.execFormat('bulletList');
        else if (key === '9' && e.shiftKey)  this.execFormat('orderedList');
        else if (key === 'x' && e.shiftKey)  this.execFormat('taskList');
        else if (key === "'" && e.shiftKey)  this.execFormat('blockquote');
        else if (key === 'f' && !e.shiftKey) {
          this.postMessage('showFindReplace', { mode: 'find' });
        }
        else if (key === 'h' && !e.shiftKey) {
          this.postMessage('showFindReplace', { mode: 'replace' });
        }
        else handled = false;

        if (handled) { e.preventDefault(); e.stopPropagation(); }
      });
    },

    // --- Format Commands ---

    execFormat(command, param) {
      const sel = window.getSelection();
      if (!sel.rangeCount && command !== 'horizontalRule') return;

      switch (command) {
        case 'bold':          document.execCommand('bold'); break;
        case 'italic':        document.execCommand('italic'); break;
        case 'strikethrough': document.execCommand('strikeThrough'); break;
        case 'inlineCode':    this.toggleInlineCode(); break;
        case 'heading1':      this.wrapBlock('h1'); break;
        case 'heading2':      this.wrapBlock('h2'); break;
        case 'heading3':      this.wrapBlock('h3'); break;
        case 'heading4':      this.wrapBlock('h4'); break;
        case 'paragraph':     this.wrapBlock('p'); break;
        case 'bulletList':    document.execCommand('insertUnorderedList'); break;
        case 'orderedList':   document.execCommand('insertOrderedList'); break;
        case 'taskList':      this.insertTaskList(); break;
        case 'codeBlock':     this.insertCodeBlock(); break;
        case 'blockquote':    this.wrapBlock('blockquote'); break;
        case 'horizontalRule': document.execCommand('insertHorizontalRule'); break;
        case 'link':          this.insertLink(); break;
        case 'image':         this.insertImage(); break;
        case 'carousel':      CarouselDialog.open(this); break;
        case 'table':         this.insertTable(3, 3); break;
        case 'increaseIndent': document.execCommand('indent'); break;
        case 'decreaseIndent': document.execCommand('outdent'); break;
        case 'textColor':
          if (!param) this.removeInlineStyle('color');
          else this.applyInlineStyle('color', param);
          break;
        case 'bgColor':
          if (!param) this.removeInlineStyle('backgroundColor');
          else this.applyInlineStyle('backgroundColor', param);
          break;
      }
      this.onContentChange();
      this.updateSelectionState();
    },

    // Apply an inline CSS style (color / backgroundColor) to the current selection
    applyInlineStyle(prop, value) {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
      const range = sel.getRangeAt(0);
      this.removeInlineStyleInRange(range.commonAncestorContainer, prop);
      const span = document.createElement('span');
      span.style[prop] = value;
      try {
        range.surroundContents(span);
      } catch (e) {
        const frag = range.extractContents();
        span.appendChild(frag);
        range.insertNode(span);
      }
      const newRange = document.createRange();
      newRange.selectNodeContents(span);
      sel.removeAllRanges();
      sel.addRange(newRange);
    },

    removeInlineStyle(prop) {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
      const range = sel.getRangeAt(0);
      this.removeInlineStyleInRange(range.commonAncestorContainer, prop);
    },

    removeInlineStyleInRange(container, prop) {
      const root = container.nodeType === Node.TEXT_NODE ? container.parentNode : container;
      Array.from(root.querySelectorAll('span')).forEach(span => {
        if (span.style[prop]) {
          span.style[prop] = '';
          const style = span.getAttribute('style');
          if (!style || style.trim() === '') {
            const parent = span.parentNode;
            while (span.firstChild) parent.insertBefore(span.firstChild, span);
            parent.removeChild(span);
          }
        }
      });
      // Also check the root span itself
      if (root.tagName === 'SPAN' && root.style[prop]) {
        root.style[prop] = '';
      }
    },

    wrapBlock(tag) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      let block = sel.getRangeAt(0).startContainer;
      while (block && block !== this.element && block.nodeType !== Node.ELEMENT_NODE) block = block.parentNode;
      while (block && block.parentNode !== this.element) block = block.parentNode;
      if (!block || block === this.element) return;
      if (block.tagName && block.tagName.toLowerCase() === tag) {
        const p = document.createElement('p');
        p.innerHTML = block.innerHTML;
        block.parentNode.replaceChild(p, block);
        const range = document.createRange();
        range.selectNodeContents(p);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
        return;
      }
      const newEl = document.createElement(tag);
      newEl.innerHTML = block.innerHTML;
      block.parentNode.replaceChild(newEl, block);
      const range = document.createRange();
      range.selectNodeContents(newEl);
      range.collapse(false);
      sel.removeAllRanges();
      sel.addRange(range);
    },

    toggleInlineCode() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      let codeEl = null;
      let node = range.startContainer;
      while (node && node !== this.element) {
        if (node.nodeType === Node.ELEMENT_NODE && node.tagName === 'CODE' && !node.closest('pre')) { codeEl = node; break; }
        node = node.parentNode;
      }
      if (codeEl) {
        const text = document.createTextNode(codeEl.textContent);
        codeEl.parentNode.replaceChild(text, codeEl);
        const r = document.createRange(); r.selectNodeContents(text); sel.removeAllRanges(); sel.addRange(r);
      } else {
        const selectedText = range.toString();
        if (selectedText.length > 0) {
          const code = document.createElement('code');
          try { range.surroundContents(code); } catch(e) {}
        } else {
          const code = document.createElement('code');
          code.textContent = '\u200B';
          range.insertNode(code);
          const r = document.createRange(); r.selectNodeContents(code); r.collapse(false); sel.removeAllRanges(); sel.addRange(r);
        }
      }
    },

    insertCodeBlock() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
