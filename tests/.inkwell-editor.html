    },

    refresh() {
      const headings = this.editor.element.querySelectorAll('h1,h2,h3,h4,h5,h6');
      if (headings.length === 0) {
        this.panelEl.innerHTML = '<div class="inkwell-toc-empty">No headings yet</div>';
        return;
      }

      let html = '<div class="inkwell-toc-title">Outline</div>';
      // Build auto-numbering counters (H1 not numbered, H2=1., H3=1.1, etc.)
      const counters = [0, 0, 0, 0, 0, 0]; // h1..h6
      headings.forEach((h, idx) => {
        const level = parseInt(h.tagName.charAt(1), 10);
        const text = h.textContent.replace(/[▶▼⋯⠿]/g, '').trim();
        if (!text) return;
        // Increment current level counter, reset deeper levels
        counters[level - 1]++;
        for (let i = level; i < 6; i++) counters[i] = 0;
        // Build number string: skip H1 (no number), H2="1.", H3="1.1", etc.
        let numStr = '';
        if (level >= 2) {
          const parts = [];
          for (let i = 1; i < level; i++) parts.push(counters[i]);
          numStr = parts.join('.') + '  ';
        }
        html += '<div class="inkwell-toc-item inkwell-toc-h' + level + '" data-toc-idx="' + idx + '">'
          + '<span style="color:var(--text-muted,#999);font-size:0.9em;">' + numStr + '</span>'
          + this._escapeHtml(text)
          + '</div>';
      });
      this.panelEl.innerHTML = html;

      // Bind click handlers
      this.panelEl.querySelectorAll('.inkwell-toc-item').forEach(item => {
        item.addEventListener('click', () => {
          const idx = parseInt(item.dataset.tocIdx, 10);
          const allH = this.editor.element.querySelectorAll('h1,h2,h3,h4,h5,h6');
          const target = allH[idx];
          if (!target) return;

          // Reveal if folded
          FoldableHeadings.revealElement(target);

          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          // Place cursor
          const range = document.createRange();
          range.selectNodeContents(target);
          range.collapse(false);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);

          this._highlightActive();
        });
      });
    },

    _highlightActive() {
      const headings = this.editor.element.querySelectorAll('h1,h2,h3,h4,h5,h6');
      const items = this.panelEl.querySelectorAll('.inkwell-toc-item');
      if (headings.length === 0 || items.length === 0) return;

      // Find the heading closest to the top of the viewport
      let activeIdx = 0;
      const scrollTop = window.scrollY || document.documentElement.scrollTop;
      for (let i = 0; i < headings.length; i++) {
        const rect = headings[i].getBoundingClientRect();
        if (rect.top <= 60) activeIdx = i;
        else break;
      }

      items.forEach(item => {
        item.classList.toggle('active', parseInt(item.dataset.tocIdx, 10) === activeIdx);
      });

      // Scroll active item into view in panel
      const activeItem = this.panelEl.querySelector('.inkwell-toc-item.active');
      if (activeItem) activeItem.scrollIntoView({ block: 'nearest' });
    },

    _escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
  };

  // ----------------------------------------------------------
  // Foldable Headings
  // ----------------------------------------------------------
  const FoldableHeadings = {
    editor: null,

    init(editor) {
      this.editor = editor;
      // Attach toggles after load and on content change
      this.editor.element.addEventListener('click', (e) => {
        const toggle = e.target.closest('.inkwell-fold-toggle');
        if (toggle) {
          e.preventDefault();
          e.stopPropagation();
          this.toggleFold(toggle.parentElement);
        }
      });
    },

    // Call after loadMarkdown or content changes that add/remove headings
    refresh() {
      const headings = this.editor.element.querySelectorAll('h1,h2,h3,h4,h5,h6');
      headings.forEach(h => {
        if (!h.querySelector('.inkwell-fold-toggle')) {
          const btn = document.createElement('span');
          btn.className = 'inkwell-fold-toggle';
          btn.setAttribute('contenteditable', 'false');
          h.insertBefore(btn, h.firstChild);
        }
      });
      // Remove orphaned toggles from non-heading elements
      this.editor.element.querySelectorAll('.inkwell-fold-toggle').forEach(btn => {
        if (!btn.parentElement || !/^H[1-6]$/.test(btn.parentElement.tagName)) {
          btn.remove();
        }
      });
    },

    toggleFold(heading) {
      const isFolded = heading.classList.contains('inkwell-folded');
      if (isFolded) {
        this.unfold(heading);
      } else {
        this.fold(heading);
      }
    },

    fold(heading) {
      const level = parseInt(heading.tagName.charAt(1), 10);
      heading.classList.add('inkwell-folded');

      let sibling = heading.nextElementSibling;
      while (sibling) {
        // Stop at same level or higher heading
        if (/^H[1-6]$/.test(sibling.tagName)) {
          const sibLevel = parseInt(sibling.tagName.charAt(1), 10);
          if (sibLevel <= level) break;
        }
        sibling.classList.add('inkwell-fold-hidden');
        sibling.setAttribute('data-folded-by', heading.tagName + '-' + this._headingId(heading));
        sibling = sibling.nextElementSibling;
      }
    },

    unfold(heading) {
      const hId = heading.tagName + '-' + this._headingId(heading);
      heading.classList.remove('inkwell-folded');

      let sibling = heading.nextElementSibling;
      while (sibling) {
        if (/^H[1-6]$/.test(sibling.tagName)) {
          const sibLevel = parseInt(sibling.tagName.charAt(1), 10);
          const headLevel = parseInt(heading.tagName.charAt(1), 10);
          if (sibLevel <= headLevel) break;
        }
        if (sibling.getAttribute('data-folded-by') === hId) {
          sibling.classList.remove('inkwell-fold-hidden');
          sibling.removeAttribute('data-folded-by');
        }
        sibling = sibling.nextElementSibling;
      }
    },

    // Unfold a heading (and its ancestors) to reveal target element
    revealElement(el) {
      // Walk up and unfold any folded headings that hide this element
      let node = el;
      while (node && node !== this.editor.element) {
        if (node.classList && node.classList.contains('inkwell-fold-hidden')) {
          // Find which heading folded this
          const foldedBy = node.getAttribute('data-folded-by');
          if (foldedBy) {
            // Find the heading that folded it
            const allHeadings = this.editor.element.querySelectorAll('.inkwell-folded');
            allHeadings.forEach(h => {
              const hId = h.tagName + '-' + this._headingId(h);
              if (hId === foldedBy) this.unfold(h);
            });
          }
        }
        node = node.parentElement;
      }
      // Also unfold if the element itself is fold-hidden
      if (el.classList && el.classList.contains('inkwell-fold-hidden')) {
        el.classList.remove('inkwell-fold-hidden');
      }
    },

    _headingId(h) {
      // Simple ID based on text content hash
      const text = h.textContent.replace(/[▶▼⋯]/g, '').trim();
      let hash = 0;
      for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash).toString(36);
    }
  };

  // ----------------------------------------------------------
  // Word Count & Status Bar
  // ----------------------------------------------------------
  const WordCount = {
    editor: null,
    wordsEl: null,
    charsEl: null,
    readEl: null,
    debounceTimer: null,

    init(editor) {
      this.editor = editor;
      this.wordsEl = document.getElementById('inkwell-stat-words');
      this.charsEl = document.getElementById('inkwell-stat-chars');
      this.readEl = document.getElementById('inkwell-stat-read');
    },

    update() {
      clearTimeout(this.debounceTimer);
      this.debounceTimer = setTimeout(() => this._compute(), 300);
    },

    _compute() {
      const text = this.editor.element.innerText || '';
      // Characters (excluding line breaks)
      const chars = text.replace(/\n/g, '').length;

      // Words: handle CJK (Chinese/Japanese/Korean) + Latin
      // CJK characters count as 1 word each
      const cjkCount = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/g) || []).length;
      // Latin words
      const stripped = text.replace(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/g, ' ');
      const latinWords = stripped.split(/\s+/).filter(w => w.length > 0).length;
      const words = cjkCount + latinWords;

      // Reading time: ~250 wpm for Latin, ~500 cpm for CJK
      const readMinutes = Math.max(1, Math.ceil((latinWords / 250) + (cjkCount / 500)));

      if (this.wordsEl) this.wordsEl.textContent = words.toLocaleString() + ' words';
      if (this.charsEl) this.charsEl.textContent = chars.toLocaleString() + ' chars';
      if (this.readEl) this.readEl.textContent = readMinutes + ' min read';

      // Also send to Swift for potential display in native UI
      this.editor.postMessage('wordCount', { words, chars, readMinutes });
    }
  };

  // ----------------------------------------------------------
  // Focus Mode & Typewriter Mode
  // ----------------------------------------------------------
  const FocusMode = {
    editor: null,
    focusEnabled: false,
    typewriterEnabled: false,
    focusBtn: null,
    typewriterBtn: null,

    init(editor) {
      this.editor = editor;
      this.focusBtn = document.getElementById('inkwell-btn-focus');
      this.typewriterBtn = document.getElementById('inkwell-btn-typewriter');

      this.focusBtn.addEventListener('click', () => this.toggleFocus());
      this.typewriterBtn.addEventListener('click', () => this.toggleTypewriter());

      // Update focus highlight on selection change
      document.addEventListener('selectionchange', () => {
        if (this.focusEnabled) this._updateFocusHighlight();
        if (this.typewriterEnabled) this._scrollToCurrentLine();
      });
    },

    toggleFocus() {
      this.focusEnabled = !this.focusEnabled;
      this.focusBtn.classList.toggle('active', this.focusEnabled);
      document.querySelector('.editor-container').classList.toggle('inkwell-focus-mode', this.focusEnabled);
      if (this.focusEnabled) {
        this._updateFocusHighlight();
      } else {
        // Remove all focus-active classes
        this.editor.element.querySelectorAll('.inkwell-focus-active').forEach(el => {
          el.classList.remove('inkwell-focus-active');
        });
      }
    },

    toggleTypewriter() {
      this.typewriterEnabled = !this.typewriterEnabled;
      this.typewriterBtn.classList.toggle('active', this.typewriterEnabled);
      if (this.typewriterEnabled) this._scrollToCurrentLine();
    },

    _updateFocusHighlight() {
      if (!this.focusEnabled) return;

      const sel = window.getSelection();
      if (!sel.rangeCount) return;

      let node = sel.anchorNode;
      // Walk up to find the top-level block in the editor
      let block = null;
      while (node && node !== this.editor.element) {
        if (node.parentNode === this.editor.element) {
          block = node;
          break;
        }
        node = node.parentNode;
      }

      // Clear previous
      this.editor.element.querySelectorAll('.inkwell-focus-active').forEach(el => {
        el.classList.remove('inkwell-focus-active');
      });

      if (block && block.nodeType === Node.ELEMENT_NODE) {
        block.classList.add('inkwell-focus-active');
      }
    },

    _scrollToCurrentLine() {
      if (!this.typewriterEnabled) return;

      const sel = window.getSelection();
      if (!sel.rangeCount || !sel.isCollapsed) return;

      const range = sel.getRangeAt(0);
      const rect = range.getBoundingClientRect();
      if (!rect || rect.height === 0) return;

      const viewportH = window.innerHeight;
      const targetY = viewportH / 2; // Center of viewport
      const currentY = rect.top;
      const diff = currentY - targetY;

      if (Math.abs(diff) > 10) {
        window.scrollBy({ top: diff, behavior: 'smooth' });
      }
    }
  };

  // ----------------------------------------------------------
  // Slash Menu: / command palette
  // ----------------------------------------------------------
  const SlashMenu = {
    editor: null,
    menuEl: null,
    isOpen: false,
    query: '',
    activeIndex: 0,
    triggerNode: null,
    triggerOffset: 0,
    filteredItems: [],

    commands: [
      { id: 'paragraph',   cat: 'Basic Blocks', icon: '¶',  label: 'Paragraph',       desc: 'Plain text block',           shortcut: '' },
      { id: 'h1',          cat: 'Basic Blocks', icon: 'H₁', label: 'Heading 1',       desc: 'Top-level heading',          shortcut: '⌘⇧1' },
      { id: 'h2',          cat: 'Basic Blocks', icon: 'H₂', label: 'Heading 2',       desc: 'Section heading',            shortcut: '⌘⇧2' },
      { id: 'h3',          cat: 'Basic Blocks', icon: 'H₃', label: 'Heading 3',       desc: 'Sub-section heading',        shortcut: '⌘⇧3' },
      { id: 'h4',          cat: 'Basic Blocks', icon: 'H₄', label: 'Heading 4',       desc: 'Deep heading',               shortcut: '' },
      { id: 'h5',          cat: 'Basic Blocks', icon: 'H₅', label: 'Heading 5',       desc: 'Minor heading',              shortcut: '' },
      { id: 'h6',          cat: 'Basic Blocks', icon: 'H₆', label: 'Heading 6',       desc: 'Smallest heading',           shortcut: '' },
      { id: 'bullet',      cat: 'Lists',        icon: '•',  label: 'Bulleted List',   desc: 'Unordered list',             shortcut: '⌘⇧8' },
      { id: 'ordered',     cat: 'Lists',        icon: '1.', label: 'Numbered List',   desc: 'Ordered list',               shortcut: '⌘⇧9' },
      { id: 'todo',        cat: 'Lists',        icon: '☐',  label: 'Task List',       desc: 'Checklist with checkboxes',  shortcut: '⌘⇧X' },
      { id: 'blockquote',  cat: 'Blocks',       icon: '❝',  label: 'Blockquote',      desc: 'Quote / callout',            shortcut: '⌘⇧\'' },
      { id: 'code',        cat: 'Blocks',       icon: '⟨⟩', label: 'Code Block',      desc: 'Fenced code with syntax HL', shortcut: '⌘⇧E' },
      { id: 'hr',          cat: 'Blocks',       icon: '—',  label: 'Horizontal Rule',  desc: 'Divider line',              shortcut: '' },
      { id: 'table',       cat: 'Blocks',       icon: '⊞',  label: 'Table',           desc: 'Insert a 3×3 table',         shortcut: '' },
      { id: 'image',       cat: 'Media',        icon: '🖼', label: 'Image',           desc: 'Insert an image',            shortcut: '' },
      { id: 'carousel',    cat: 'Media',        icon: '🎠', label: 'Carousel',        desc: 'Multi-image carousel',       shortcut: '' },
      { id: 'link',        cat: 'Media',        icon: '🔗', label: 'Link',            desc: 'Insert a hyperlink',         shortcut: '⌘K' },
      { id: 'math',        cat: 'Media',        icon: '∑',  label: 'Math Block',      desc: 'LaTeX math equation',        shortcut: '' },
    ],

    init(editor) {
      this.editor = editor;
      this.menuEl = document.createElement('div');
      this.menuEl.className = 'inkwell-slash-menu';
      this.menuEl.setAttribute('role', 'listbox');
      document.body.appendChild(this.menuEl);

      document.addEventListener('mousedown', (e) => {
        if (this.isOpen && !this.menuEl.contains(e.target)) this.close();
      });
    },

    onInput(e) {
      const sel = window.getSelection();
      if (!sel.rangeCount || !sel.isCollapsed) return;

      const node = sel.anchorNode;
      if (!node || node.nodeType !== Node.TEXT_NODE) {
        if (this.isOpen) this.close();
        return;
      }

      const text = node.textContent;
      const offset = sel.anchorOffset;
      const before = text.substring(0, offset);
      const slashIdx = before.lastIndexOf('/');

      if (slashIdx === -1) { if (this.isOpen) this.close(); return; }

      // / must be at position 0 or after whitespace
      const charBefore = slashIdx > 0 ? before[slashIdx - 1] : null;
      if (charBefore !== null && charBefore !== ' ' && charBefore !== '\n' && charBefore !== '\t') {
        if (this.isOpen) this.close();
        return;
      }

      // Only trigger in blocks where / is at the start of content
      const block = this._getParentBlock(node);
      if (!block) { if (this.isOpen) this.close(); return; }
      // Get block text excluding UI elements (drag handles, fold toggles)
      let blockText = '';
      block.childNodes.forEach(n => {
        if (n.nodeType === Node.TEXT_NODE) blockText += n.textContent;
        else if (n.nodeType === Node.ELEMENT_NODE &&
                 !n.classList.contains('inkwell-drag-handle') &&
                 !n.classList.contains('inkwell-fold-toggle')) {
          blockText += n.textContent;
        }
      });
      const slashPosInBlock = blockText.indexOf('/');
      if (slashPosInBlock > 0 && blockText.substring(0, slashPosInBlock).trim() !== '') {
        if (this.isOpen) this.close();
        return;
      }

      this.query = before.substring(slashIdx + 1).toLowerCase();
      this.triggerNode = node;
      this.triggerOffset = slashIdx;
      this._filter();
      this.open();
      this._positionMenu();
    },

    _filter() {
      const q = this.query.trim();
      if (!q) {
        this.filteredItems = [...this.commands];
      } else {
        this.filteredItems = this.commands.filter(cmd =>
          cmd.label.toLowerCase().includes(q) ||
          cmd.desc.toLowerCase().includes(q) ||
          cmd.id.includes(q)
        );
      }
      this.activeIndex = 0;
      this._render();
    },

    _render() {
      if (this.filteredItems.length === 0) {
        this.menuEl.innerHTML = '<div class="inkwell-slash-empty">No matching commands</div>';
        return;
      }
      let html = '';
      let lastCat = '';
      this.filteredItems.forEach((item, idx) => {
        if (item.cat !== lastCat) {
          lastCat = item.cat;
          html += '<div class="inkwell-slash-category">' + item.cat + '</div>';
        }
        const cls = idx === this.activeIndex ? ' active' : '';
        html += '<div class="inkwell-slash-item' + cls + '" data-index="' + idx + '" role="option">'
          + '<div class="inkwell-slash-icon">' + item.icon + '</div>'
          + '<div class="inkwell-slash-info">'
          +   '<div class="inkwell-slash-label">' + item.label + '</div>'
          +   '<div class="inkwell-slash-desc">' + item.desc + '</div>'
          + '</div>'
          + (item.shortcut ? '<div class="inkwell-slash-shortcut">' + item.shortcut + '</div>' : '')
          + '</div>';
      });
      this.menuEl.innerHTML = html;

      this.menuEl.querySelectorAll('.inkwell-slash-item').forEach(el => {
        el.addEventListener('mousedown', (e) => {
          e.preventDefault();
          this._execute(this.filteredItems[parseInt(el.dataset.index, 10)]);
        });
        el.addEventListener('mouseenter', () => {
          this.activeIndex = parseInt(el.dataset.index, 10);
          this._updateActive();
        });
      });
    },

    _updateActive() {
      this.menuEl.querySelectorAll('.inkwell-slash-item').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.index, 10) === this.activeIndex);
      });
      const activeEl = this.menuEl.querySelector('.inkwell-slash-item.active');
      if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
    },

    open() {
      this.isOpen = true;
      this.menuEl.classList.add('visible');
    },

    close() {
      this.isOpen = false;
      this.menuEl.classList.remove('visible');
      this.query = '';
      this.triggerNode = null;
      this.activeIndex = 0;
    },

    _positionMenu() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0).cloneRange();
      try {
        range.setStart(this.triggerNode, this.triggerOffset);
        range.setEnd(this.triggerNode, this.triggerOffset);
      } catch(e) { return; }

      const rect = range.getBoundingClientRect();
      const menuH = this.menuEl.offsetHeight || 300;
      let top = rect.bottom + 4;
      let left = rect.left;

      if (top + menuH > window.innerHeight - 10) top = rect.top - menuH - 4;
      const menuW = this.menuEl.offsetWidth || 280;
      if (left + menuW > window.innerWidth - 10) left = window.innerWidth - menuW - 10;
      if (left < 10) left = 10;

      this.menuEl.style.top = top + 'px';
      this.menuEl.style.left = left + 'px';
    },

    handleKeyDown(e) {
      if (!this.isOpen) return false;
      switch (e.key) {
        case 'ArrowDown':
          e.preventDefault();
          if (this.filteredItems.length > 0) {
            this.activeIndex = (this.activeIndex + 1) % this.filteredItems.length;
            this._updateActive();
          }
          return true;
        case 'ArrowUp':
          e.preventDefault();
          if (this.filteredItems.length > 0) {
            this.activeIndex = (this.activeIndex - 1 + this.filteredItems.length) % this.filteredItems.length;
            this._updateActive();
          }
          return true;
        case 'Enter':
        case 'Tab':
          e.preventDefault();
          if (this.filteredItems.length > 0) this._execute(this.filteredItems[this.activeIndex]);
          return true;
        case 'Escape':
          e.preventDefault();
          this.close();
          return true;
        case 'Backspace':
          if (this.query === '') { setTimeout(() => this.close(), 0); }
          return false;
        default:
          return false;
      }
    },

    _execute(cmd) {
      const block = this._getParentBlock(this.triggerNode);
      if (block) block.textContent = '';
      this.close();

      const ed = this.editor;

      switch (cmd.id) {
        case 'paragraph': {
          if (block && block.tagName !== 'P') {
            const p = document.createElement('p'); p.innerHTML = '<br>';
            block.parentNode.replaceChild(p, block);
            this._setCursor(p, 0);
          }
          break;
        }
        case 'h1': case 'h2': case 'h3': case 'h4': case 'h5': case 'h6': {
          const h = document.createElement('h' + cmd.id.charAt(1));
          h.innerHTML = '<br>';
          if (block) block.parentNode.replaceChild(h, block);
          else ed.element.appendChild(h);
          this._setCursor(h, 0);
          break;
        }
        case 'bullet': {
          const ul = document.createElement('ul');
          const li = document.createElement('li'); li.innerHTML = '<br>';
          ul.appendChild(li);
          if (block) block.parentNode.replaceChild(ul, block);
          else ed.element.appendChild(ul);
          this._setCursor(li, 0);
          break;
        }
        case 'ordered': {
          const ol = document.createElement('ol');
          const li = document.createElement('li'); li.innerHTML = '<br>';
          ol.appendChild(li);
          if (block) block.parentNode.replaceChild(ol, block);
          else ed.element.appendChild(ol);
          this._setCursor(li, 0);
          break;
        }
        case 'todo': {
          const tul = document.createElement('ul');
          tul.setAttribute('data-type', 'taskList');
          const tli = document.createElement('li');
          tli.setAttribute('data-checked', 'false');
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.addEventListener('change', function() {
            tli.setAttribute('data-checked', this.checked ? 'true' : 'false');
          });
          const span = document.createElement('span'); span.innerHTML = '<br>';
          tli.appendChild(cb); tli.appendChild(span);
          tul.appendChild(tli);
          if (block) block.parentNode.replaceChild(tul, block);
          else ed.element.appendChild(tul);
          this._setCursor(span, 0);
          break;
        }
        case 'blockquote': {
          const bq = document.createElement('blockquote');
          const p = document.createElement('p'); p.innerHTML = '<br>';
          bq.appendChild(p);
          if (block) block.parentNode.replaceChild(bq, block);
          else ed.element.appendChild(bq);
          this._setCursor(p, 0);
          break;
        }
        case 'code': {
          const pre = document.createElement('pre');
          const code = document.createElement('code');
          code.textContent = '\n';
          pre.appendChild(code);
          if (block) block.parentNode.replaceChild(pre, block);
          else ed.element.appendChild(pre);
          this._setCursor(code, 0);
          break;
        }
        case 'hr': {
          const hr = document.createElement('hr');
          const p = document.createElement('p'); p.innerHTML = '<br>';
          if (block) {
            block.parentNode.replaceChild(hr, block);
            hr.parentNode.insertBefore(p, hr.nextSibling);
          } else {
            ed.element.appendChild(hr);
            ed.element.appendChild(p);
          }
          this._setCursor(p, 0);
          break;
        }
        case 'table': {
          if (block) block.remove();
          ed.insertTable(3, 3);
          break;
        }
        case 'image': {
          if (block) block.remove();
          ed.execFormat('image');
          break;
        }
        case 'carousel': {
          if (block) block.remove();
          ed.execFormat('carousel');
          break;
        }
        case 'link': {
          if (block) { block.innerHTML = '<br>'; this._setCursor(block, 0); }
          ed.execFormat('link');
          break;
        }
        case 'math': {
          const pre = document.createElement('pre');
          pre.setAttribute('data-language', 'math');
          const code = document.createElement('code');
          code.className = 'language-math';
          code.textContent = '\n';
          pre.appendChild(code);
          if (block) block.parentNode.replaceChild(pre, block);
          else ed.element.appendChild(pre);
          this._setCursor(code, 0);
          break;
        }
      }
      ed.onContentChange();
    },

    _getParentBlock(node) {
      const tags = ['P','H1','H2','H3','H4','H5','H6','LI','BLOCKQUOTE','PRE','DIV','TD','TH'];
      while (node && node !== this.editor.element) {
        if (node.nodeType === Node.ELEMENT_NODE && tags.includes(node.tagName)) return node;
        node = node.parentNode;
      }
      return null;
    },

    _setCursor(node, offset) {
      const sel = window.getSelection();
      const range = document.createRange();
      const target = (node.childNodes.length > 0 && offset === 0) ? (node.childNodes[0] || node) : node;
      const off = (node.childNodes.length > 0 && offset === 0) ? 0 : offset;
      range.setStart(target, off);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    }
  };

  // ----------------------------------------------------------
  // Editor Core
  // ----------------------------------------------------------
  const Editor = {
    element: null,
    lastContent: '',

    init() {
      this.element = document.getElementById('editor');
      this.element.setAttribute('contenteditable', 'true');
      this.element.classList.add('ProseMirror');

      // Initialize live converter
      LiveConverter.init(this);

      // Initialize table manager
      TableManager.init(this);

      // Initialize carousel manager
      CarouselManager.init(this);

      // Initialize slash menu
      SlashMenu.init(this);

      // Initialize foldable headings
      FoldableHeadings.init(this);

      // Initialize drag & drop sorting
      DragSort.init(this);

      // Initialize outline panel
      TableOfContents.init(this);

      // Initialize word count status bar
      WordCount.init(this);

      // Initialize focus & typewriter mode
      FocusMode.init(this);

      this.element.addEventListener('input', (e) => {
        this.onContentChange();
        // Run live conversion after content change is reported
        LiveConverter.onInput(e);
        // Check for slash menu trigger
        SlashMenu.onInput(e);
      });

      this.element.addEventListener('keydown', (e) => {
        // Slash menu intercepts first
        if (SlashMenu.handleKeyDown(e)) return;
        // Handle Enter for block-level conversions
        if (e.key === 'Enter' && !e.shiftKey) {
          if (LiveConverter.onEnter(e)) return;
        }
      });

      document.addEventListener('selectionchange', () => this.updateSelectionState());

      this.setupKeyboardShortcuts();

      // Listen for dark mode changes to swap hljs theme
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        this.updateDarkModeTheme();
      });
      this.updateDarkModeTheme();

      this.postMessage('editorReady', {});
    },

    // --- Content ---

    onContentChange() {
      const md = this.getMarkdown();
      if (md !== this.lastContent) {
        this.lastContent = md;
        this.postMessage('contentChange', { content: md });
      }
      WordCount.update();
      FoldableHeadings.refresh();
      DragSort.refresh();
      TableOfContents.scheduleRefresh();
    },

    loadMarkdown(markdown) {
      this.lastContent = markdown;
      this.element.innerHTML = MarkdownParser.parse(markdown);
      this.element.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => this.onContentChange());
      });
      // Phase 3 PR 2: 把 parser 输出的占位符替换为真正的 BlockRenderer 产物
      this._resolvePendingRenderers();
      this.highlightCodeBlocks();
      // Set up table resize handles
      this.element.querySelectorAll('table').forEach(t => TableManager.setupResizeHandles(t));
      // Initialize carousels
      CarouselManager.initAll(this.element);
      // Set up foldable heading toggles
      FoldableHeadings.refresh();
      // Set up drag handles
      DragSort.refresh();
      // Initial word count
      WordCount.update();
    },

    // 扫描 parser 输出的占位符，调用对应 BlockRenderer.render() 替换为实际渲染产物。
    // 这条路径所有 BlockRenderer 共用（mermaid、KaTeX display、未来的 timeline 等）。
    // PR 3 起：按 data-pending-block-type 派发,支持 fenced-code 和 display-math 两种 type。
    _resolvePendingRenderers() {
      if (typeof ExtensionRegistry === 'undefined') return;
      const placeholders = this.element.querySelectorAll('.inkwell-pending-renderer');
      placeholders.forEach(ph => {
        const blockType = ph.getAttribute('data-pending-block-type') || 'fenced-code';
        const name = ph.getAttribute('data-pending-renderer');
        const lang = ph.getAttribute('data-pending-language') || '';
        const b64 = ph.getAttribute('data-pending-source-b64') || '';
        let source = '';
        try {
          source = decodeURIComponent(escape(atob(b64)));
        } catch (e) {
          console.error('[Editor] failed to decode pending source', e);
        }

        // 按 blockType 构造 block 对象
        // - fenced-code: source = 围栏内容(裸 content),block 提供 language + content
        // - display-math: source = 完整原文含 $$ 定界符,block 提供 content + raw
        let block;
        if (blockType === 'display-math') {
          // 从 raw 里剥出 content(开闭 $$ 之间的所有行)
          const innerLines = source.split('\n');
          // 第一行是 $$,最后一行是 $$,中间是内容
          // 防御性:若结构异常,fallback 到把整个 source 当 content
          let content = source;
          if (innerLines.length >= 2 &&
              innerLines[0].trim() === '$$' &&
              innerLines[innerLines.length - 1].trim() === '$$') {
            content = innerLines.slice(1, -1).join('\n');
          }
          block = { type: 'display-math', content: content, raw: source };
        } else {
          // 默认 fenced-code 兼容
          block = { type: 'fenced-code', language: lang, content: source };
        }

        // 找 renderer
        const renderer = ExtensionRegistry.findBlockRenderer(block);
        if (!renderer || renderer.name !== name) {
          // renderer 已不在注册列表（或同名扩展失败）—— fallback
          this._fallbackForPending(ph, blockType, lang, source);
          return;
        }

        // 调 render，拿真 DOM 节点
        const root = ExtensionRegistry.renderBlock(block, renderer);
        if (root && root instanceof HTMLElement) {
          ph.parentNode.replaceChild(root, ph);
        } else {
          // render 失败（safeCall 已上报）—— fallback
          this._fallbackForPending(ph, blockType, lang, source);
        }
      });
    },

    // 占位符 fallback：按 blockType 选择合适的回显形式,保证源码不丢
    _fallbackForPending(placeholderEl, blockType, lang, source) {
      if (blockType === 'display-math') {
        // source 已是完整含 $$ 原文,直接 pre 回显
        const pre = document.createElement('pre');
        pre.className = 'inkwell-unrendered-math';
        pre.textContent = source;
        placeholderEl.parentNode.replaceChild(pre, placeholderEl);
      } else {
        // 默认 fenced-code 路径
        this._fallbackToPlainCodeBlock(placeholderEl, lang, source);
      }
    },

    _fallbackToPlainCodeBlock(placeholderEl, lang, source) {
      const pre = document.createElement('pre');
      const code = document.createElement('code');
      if (lang) code.className = 'language-' + lang;
      code.textContent = source;
      pre.appendChild(code);
      placeholderEl.parentNode.replaceChild(pre, placeholderEl);
    },

    // --- Syntax Highlighting ---
    // highlight.js 装饰逻辑已迁移到 ExtensionRegistry (highlight-code BlockDecorator)。
    // 这里只保留 core 职责：找光标所在 code block（用于跳过高亮）+ 主题切换调度。

    highlightCodeBlocks() {
      // Find which code block the cursor is in (skip highlighting that one)
      let activeCodeBlock = null;
      const sel = window.getSelection();
      if (sel.rangeCount) {
        let node = sel.getRangeAt(0).startContainer;
        while (node && node !== this.element) {
          if (node.tagName === 'CODE' && node.parentNode && node.parentNode.tagName === 'PRE') {
            activeCodeBlock = node;
            break;
          }
          node = node.parentNode;
        }
      }

      ExtensionRegistry.runDecorators(this.element, {
        filter: (dec) => dec.name === 'highlight-code',
        skipPredicate: (target) => target === activeCodeBlock
      });

      this.updateDarkModeTheme();
    },

    // Re-highlight all code blocks (called when cursor leaves a code block)
    rehighlightAll() {
      ExtensionRegistry.runDecorators(this.element, {
        filter: (dec) => dec.name === 'highlight-code'
      });
    },

    updateDarkModeTheme() {
      const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const themeLink = document.getElementById('hljs-theme');
      if (themeLink) {
        const base = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/';
        themeLink.href = isDark ? base + 'github-dark.min.css' : base + 'github.min.css';
      }

      // 通知所有声明 rerenderOn:["theme-change"] 的扩展重渲染
      this._notifyRerender('theme-change');
    },

    // 重渲染调度——core 职责。
    // PR 2 起：处理 decorator + renderer 两种类型。
    _notifyRerender(trigger) {
      if (typeof ExtensionRegistry === 'undefined') return;
      const items = ExtensionRegistry.getNodesToRerender(trigger);

      // 主题切换时 mermaid 需要重新初始化，否则新图表仍用旧主题
      if (trigger === 'theme-change' && typeof mermaid !== 'undefined') {
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        try {
          mermaid.initialize({
            startOnLoad: false,
            theme: isDark ? 'dark' : 'default',
            securityLevel: 'strict',
            fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'
          });
        } catch (e) { /* 忽略 */ }
      }

      items.forEach(item => {
        if (item.kind === 'decorator') {
          ExtensionRegistry.runDecorators(this.element, {
            filter: (dec) => dec.name === item.name
          });
        } else if (item.kind === 'renderer') {
          // 重新调用 renderer.render() 替换节点
          // node 是当前渲染产物的 root，它有 data-source-b64 + data-renderer
          const oldRoot = item.node;
          const rendererName = oldRoot.getAttribute('data-renderer');
          const lang = oldRoot.getAttribute('data-language') || '';
          // 用 ExtensionRegistry 内部 helper 解 base64
          const sourceB64 = oldRoot.getAttribute('data-source-b64');
          let source = '';
          try {
            source = decodeURIComponent(escape(atob(sourceB64 || '')));
          } catch (_) {}

          const block = { type: 'fenced-code', language: lang, content: source };
          // TODO(PR-3+): 这一段重渲染路径写死了 type='fenced-code' 并做了"剥围栏"处理。
          // PR 3 KaTeX display-math 的 rerenderOn 是空数组,不会进入这条路径,所以暂不影响。
          // 等第二个有 rerenderOn 的非 fenced-code block type 出现时再泛化:
          //   - 改读 oldRoot 上的 data-block-type 字段(需要 createBlockRoot 一并支持)
          //   - 按 type 派发不同的 block 对象构造 + content 提取逻辑
          // 注意：source 是完整 markdown（含围栏），但 block.content 应该是
          // 围栏内部的内容。findBlockRenderer/render 期望 content 为内部内容。
          // 处理：如果 source 以 ``` 开头则剥掉围栏
          const stripped = source.replace(/^```[^\n]*\n/, '').replace(/\n```\s*$/, '');
          block.content = stripped;

          // 找 renderer
          const renderer = ExtensionRegistry._findRendererByName
            ? ExtensionRegistry._findRendererByName(rendererName)
            : ExtensionRegistry.findBlockRenderer(block);
          if (!renderer) return;

          const newRoot = ExtensionRegistry.renderBlock(block, renderer);
          if (newRoot && oldRoot.parentNode) {
            // 取消旧 root 任何 in-flight 任务
            const ctrl = oldRoot.__inkwellAbortController;
            if (ctrl) ctrl.abort();
            oldRoot.parentNode.replaceChild(newRoot, oldRoot);
          }
        }
      });
    },

    getMarkdown() {
      // Clear find highlights before serializing
      const marks = this.element.querySelectorAll('.inkwell-find-highlight');
      if (marks.length > 0) {
        marks.forEach(m => {
          const text = document.createTextNode(m.textContent);
          m.parentNode.replaceChild(text, m);
        });
        this.element.normalize();
      }
      return MarkdownSerializer.serialize(this.element);
    },

    applyTheme(css) {
      document.getElementById('theme-style').textContent = css;
    },

    // --- Keyboard Shortcuts ---

    setupKeyboardShortcuts() {
      this.element.addEventListener('keydown', (e) => {
        const mod = e.metaKey || e.ctrlKey;
        if (!mod) return;

        const key = e.key.toLowerCase();
        let handled = true;

        if      (key === 'b' && !e.shiftKey) this.execFormat('bold');
        else if (key === 'i' && !e.shiftKey) this.execFormat('italic');
        else if (key === 'k' && !e.shiftKey) this.execFormat('link');
        else if (key === 'e' && !e.shiftKey) this.execFormat('inlineCode');
        else if (key === 'd' && e.shiftKey)  this.execFormat('strikethrough');
        else if (key === 'e' && e.shiftKey)  this.execFormat('codeBlock');
        else if (key === '1' && e.shiftKey)  this.execFormat('heading1');
        else if (key === '2' && e.shiftKey)  this.execFormat('heading2');
        else if (key === '3' && e.shiftKey)  this.execFormat('heading3');
        else if (key === '8' && e.shiftKey)  this.execFormat('bulletList');
        else if (key === '9' && e.shiftKey)  this.execFormat('orderedList');
        else if (key === 'x' && e.shiftKey)  this.execFormat('taskList');
        else if (key === "'" && e.shiftKey)  this.execFormat('blockquote');
        else if (key === 'f' && !e.shiftKey) {
          this.postMessage('showFindReplace', { mode: 'find' });
        }
        else if (key === 'h' && !e.shiftKey) {
          this.postMessage('showFindReplace', { mode: 'replace' });
        }
        else handled = false;

        if (handled) { e.preventDefault(); e.stopPropagation(); }
      });
    },

    // --- Format Commands ---

    execFormat(command, param) {
      const sel = window.getSelection();
      if (!sel.rangeCount && command !== 'horizontalRule') return;

      switch (command) {
        case 'bold':          document.execCommand('bold'); break;
        case 'italic':        document.execCommand('italic'); break;
        case 'strikethrough': document.execCommand('strikeThrough'); break;
        case 'inlineCode':    this.toggleInlineCode(); break;
        case 'heading1':      this.wrapBlock('h1'); break;
        case 'heading2':      this.wrapBlock('h2'); break;
        case 'heading3':      this.wrapBlock('h3'); break;
        case 'heading4':      this.wrapBlock('h4'); break;
        case 'paragraph':     this.wrapBlock('p'); break;
        case 'bulletList':    document.execCommand('insertUnorderedList'); break;
        case 'orderedList':   document.execCommand('insertOrderedList'); break;
        case 'taskList':      this.insertTaskList(); break;
        case 'codeBlock':     this.insertCodeBlock(); break;
        case 'blockquote':    this.wrapBlock('blockquote'); break;
        case 'horizontalRule': document.execCommand('insertHorizontalRule'); break;
        case 'link':          this.insertLink(); break;
        case 'image':         this.insertImage(); break;
        case 'carousel':      CarouselDialog.open(this); break;
        case 'table':         this.insertTable(3, 3); break;
        case 'increaseIndent': document.execCommand('indent'); break;
        case 'decreaseIndent': document.execCommand('outdent'); break;
        case 'textColor':
          if (!param) this.removeInlineStyle('color');
          else this.applyInlineStyle('color', param);
          break;
        case 'bgColor':
          if (!param) this.removeInlineStyle('backgroundColor');
          else this.applyInlineStyle('backgroundColor', param);
          break;
      }
      this.onContentChange();
      this.updateSelectionState();
    },

    // Apply an inline CSS style (color / backgroundColor) to the current selection
    applyInlineStyle(prop, value) {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
      const range = sel.getRangeAt(0);
      this.removeInlineStyleInRange(range.commonAncestorContainer, prop);
      const span = document.createElement('span');
      span.style[prop] = value;
      try {
        range.surroundContents(span);
      } catch (e) {
        const frag = range.extractContents();
        span.appendChild(frag);
        range.insertNode(span);
      }
      const newRange = document.createRange();
      newRange.selectNodeContents(span);
      sel.removeAllRanges();
      sel.addRange(newRange);
    },

    removeInlineStyle(prop) {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
      const range = sel.getRangeAt(0);
      this.removeInlineStyleInRange(range.commonAncestorContainer, prop);
    },

    removeInlineStyleInRange(container, prop) {
      const root = container.nodeType === Node.TEXT_NODE ? container.parentNode : container;
      Array.from(root.querySelectorAll('span')).forEach(span => {
        if (span.style[prop]) {
          span.style[prop] = '';
          const style = span.getAttribute('style');
          if (!style || style.trim() === '') {
            const parent = span.parentNode;
            while (span.firstChild) parent.insertBefore(span.firstChild, span);
            parent.removeChild(span);
          }
        }
      });
      // Also check the root span itself
      if (root.tagName === 'SPAN' && root.style[prop]) {
        root.style[prop] = '';
      }
    },

    wrapBlock(tag) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      let block = sel.getRangeAt(0).startContainer;
      while (block && block !== this.element && block.nodeType !== Node.ELEMENT_NODE) block = block.parentNode;
      while (block && block.parentNode !== this.element) block = block.parentNode;
      if (!block || block === this.element) return;
      if (block.tagName && block.tagName.toLowerCase() === tag) {
        const p = document.createElement('p');
        p.innerHTML = block.innerHTML;
        block.parentNode.replaceChild(p, block);
        const range = document.createRange();
        range.selectNodeContents(p);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
        return;
      }
      const newEl = document.createElement(tag);
      newEl.innerHTML = block.innerHTML;
      block.parentNode.replaceChild(newEl, block);
      const range = document.createRange();
      range.selectNodeContents(newEl);
      range.collapse(false);
      sel.removeAllRanges();
      sel.addRange(range);
    },

    toggleInlineCode() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      let codeEl = null;
      let node = range.startContainer;
      while (node && node !== this.element) {
        if (node.nodeType === Node.ELEMENT_NODE && node.tagName === 'CODE' && !node.closest('pre')) { codeEl = node; break; }
        node = node.parentNode;
      }
      if (codeEl) {
        const text = document.createTextNode(codeEl.textContent);
        codeEl.parentNode.replaceChild(text, codeEl);
        const r = document.createRange(); r.selectNodeContents(text); sel.removeAllRanges(); sel.addRange(r);
      } else {
        const selectedText = range.toString();
        if (selectedText.length > 0) {
          const code = document.createElement('code');
          try { range.surroundContents(code); } catch(e) {}
        } else {
          const code = document.createElement('code');
          code.textContent = '\u200B';
          range.insertNode(code);
          const r = document.createRange(); r.selectNodeContents(code); r.collapse(false); sel.removeAllRanges(); sel.addRange(r);
        }
      }
    },

    insertCodeBlock() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      let block = sel.getRangeAt(0).startContainer;
      while (block && block !== this.element && block.nodeType !== Node.ELEMENT_NODE) block = block.parentNode;
      while (block && block.parentNode !== this.element) block = block.parentNode;
      if (block && block.tagName === 'PRE') {
        const p = document.createElement('p'); p.textContent = block.textContent;
        block.parentNode.replaceChild(p, block); return;
      }
      const pre = document.createElement('pre');
      const code = document.createElement('code');
      code.textContent = block ? block.textContent || '\n' : '\n';
      pre.appendChild(code);
      if (block && block !== this.element) block.parentNode.replaceChild(pre, block);
      else this.element.appendChild(pre);
      const range = document.createRange(); range.selectNodeContents(code); range.collapse(false);
      sel.removeAllRanges(); sel.addRange(range);
    },

    insertTaskList() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      let block = sel.getRangeAt(0).startContainer;
      while (block && block !== this.element && block.nodeType !== Node.ELEMENT_NODE) block = block.parentNode;
      while (block && block.parentNode !== this.element) block = block.parentNode;
      const ul = document.createElement('ul'); ul.setAttribute('data-type', 'taskList');
      const li = document.createElement('li'); li.setAttribute('data-type', 'taskItem'); li.setAttribute('data-checked', 'false');
      const cb = document.createElement('input'); cb.type = 'checkbox';
      cb.addEventListener('change', () => this.onContentChange());
      const span = document.createElement('span'); span.textContent = block ? block.textContent || '' : '';
      li.appendChild(cb); li.appendChild(span); ul.appendChild(li);
      if (block && block !== this.element) block.parentNode.replaceChild(ul, block);
      else this.element.appendChild(ul);
      const range = document.createRange(); range.selectNodeContents(span); range.collapse(false);
      sel.removeAllRanges(); sel.addRange(range);
    },

    insertLink() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      this.postMessage('requestLinkInput', { selectedText: sel.toString() });
    },

    applyLink(url, text) {
      const sel = window.getSelection();
      const a = document.createElement('a'); a.href = url; a.textContent = text || url; a.setAttribute('target', '_blank');
      if (sel.rangeCount) { const range = sel.getRangeAt(0); range.deleteContents(); range.insertNode(a); range.setStartAfter(a); range.collapse(true); sel.removeAllRanges(); sel.addRange(range); }
      this.onContentChange();
    },

    insertImage() { this.postMessage('requestImageInput', {}); },

    applyImage(url, alt) {
      if (CarouselDialog._pendingLocal) { CarouselDialog.receiveLocalImage(url); return; }
      const img = document.createElement('img'); img.src = url; img.alt = alt || '';
      const sel = window.getSelection();
      if (sel.rangeCount) { const range = sel.getRangeAt(0); range.deleteContents(); range.insertNode(img); range.setStartAfter(img); range.collapse(true); sel.removeAllRanges(); sel.addRange(range); }
      this.onContentChange();
    },

    insertTable(rows, cols) {
      const table = document.createElement('table');
      const thead = document.createElement('thead'); const hr = document.createElement('tr');
      for (let j = 0; j < cols; j++) { const th = document.createElement('th'); th.textContent = 'Header ' + (j+1); hr.appendChild(th); }
      thead.appendChild(hr); table.appendChild(thead);
      const tbody = document.createElement('tbody');
      for (let i = 0; i < rows - 1; i++) { const tr = document.createElement('tr'); for (let j = 0; j < cols; j++) { const td = document.createElement('td'); td.innerHTML = '&nbsp;'; tr.appendChild(td); } tbody.appendChild(tr); }
      table.appendChild(tbody);
      const sel = window.getSelection();
      if (sel.rangeCount) {
        let block = sel.getRangeAt(0).startContainer;
        while (block && block !== this.element && block.nodeType !== Node.ELEMENT_NODE) block = block.parentNode;
        while (block && block.parentNode !== this.element) block = block.parentNode;
        if (block && block !== this.element) block.parentNode.insertBefore(table, block.nextSibling);
        else this.element.appendChild(table);
      } else this.element.appendChild(table);
      // Set up resize handles and show toolbar
      TableManager.setupResizeHandles(table);
      TableManager.showToolbar(table);
      const firstTh = table.querySelector('th');
      if (firstTh) { const range = document.createRange(); range.selectNodeContents(firstTh); sel.removeAllRanges(); sel.addRange(range); }
      this.onContentChange();
    },

    // --- Selection State ---

    updateSelectionState() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;

      // Check if cursor is inside a code block
      let inCodeBlock = false;
      let node = sel.getRangeAt(0).startContainer;
      while (node && node !== this.element) {
        if (node.tagName === 'PRE' || (node.tagName === 'CODE' && node.parentNode && node.parentNode.tagName === 'PRE')) {
          inCodeBlock = true;
          break;
        }
        node = node.parentNode;
      }

      // If cursor left a code block, re-highlight all
      if (!inCodeBlock && this._wasInCodeBlock) {
        this.rehighlightAll();
      }
      this._wasInCodeBlock = inCodeBlock;

      const formats = { bold: document.queryCommandState('bold'), italic: document.queryCommandState('italic'), strikethrough: document.queryCommandState('strikeThrough'), inlineCode: false, blockType: 'paragraph', isLink: false, linkUrl: '', headingLevel: 0 };
      node = sel.getRangeAt(0).startContainer;
      while (node && node !== this.element) {
        if (node.nodeType === Node.ELEMENT_NODE) {
          const tag = node.tagName.toLowerCase();
          if (tag === 'code' && !node.closest('pre')) formats.inlineCode = true;
          if (tag === 'a') { formats.isLink = true; formats.linkUrl = node.href || ''; }
        }
        node = node.parentNode;
      }
      node = sel.getRangeAt(0).startContainer;
      while (node && node !== this.element) {
        if (node.nodeType === Node.ELEMENT_NODE) {
          const tag = node.tagName.toLowerCase();
          if (/^h[1-6]$/.test(tag)) { formats.blockType = tag; formats.headingLevel = parseInt(tag[1]); break; }
          if (tag === 'blockquote') { formats.blockType = 'blockquote'; break; }
          if (tag === 'pre') { formats.blockType = 'codeBlock'; break; }
          if (tag === 'li') {
            const p = node.closest('ul, ol');
            if (p) { if (p.tagName === 'UL') { formats.blockType = p.getAttribute('data-type') === 'taskList' ? 'taskList' : 'bulletList'; } else { formats.blockType = 'orderedList'; } }
            break;
          }
        }
        node = node.parentNode;
      }
      // Detect text color and background color at cursor
      let colorNode = sel.getRangeAt(0).startContainer;
      if (colorNode.nodeType === Node.TEXT_NODE) colorNode = colorNode.parentNode;
      while (colorNode && colorNode !== this.element) {
        if (colorNode.style) {
          if (colorNode.style.color && !formats.textColor)         formats.textColor = colorNode.style.color;
          if (colorNode.style.backgroundColor && !formats.bgColor) formats.bgColor   = colorNode.style.backgroundColor;
        }
        colorNode = colorNode.parentNode;
      }

      this.postMessage('selectionChange', formats);
    },
    // ============================================================
    findState: { query: '', caseSensitive: false, matches: [], currentIndex: -1 },

    findInDocument(query, caseSensitive) {
      this.clearFindHighlights();
      if (!query) { this.findState.matches = []; this.findState.currentIndex = -1; this.postMessage('findResults', { count: 0, current: -1 }); return; }
      this.findState.query = query; this.findState.caseSensitive = caseSensitive;
      const flags = caseSensitive ? 'g' : 'gi';
      const regex = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), flags);
      const walker = document.createTreeWalker(this.element, NodeFilter.SHOW_TEXT, null);
      const textNodes = []; let n;
      while (n = walker.nextNode()) { if (n.parentNode.classList && n.parentNode.classList.contains('inkwell-find-highlight')) continue; if (n.textContent.length > 0) textNodes.push(n); }
      const matches = [];
      for (const tn of textNodes) { let m; regex.lastIndex = 0; while ((m = regex.exec(tn.textContent)) !== null) matches.push({ node: tn, index: m.index, length: m[0].length }); }
      for (let i = matches.length - 1; i >= 0; i--) { const m = matches[i]; try { const range = document.createRange(); range.setStart(m.node, m.index); range.setEnd(m.node, m.index + m.length); const mark = document.createElement('mark'); mark.classList.add('inkwell-find-highlight'); mark.dataset.findIndex = i; range.surroundContents(mark); } catch(e) {} }
      this.findState.matches = Array.from(this.element.querySelectorAll('.inkwell-find-highlight'));
      this.findState.currentIndex = this.findState.matches.length > 0 ? 0 : -1;
      if (this.findState.currentIndex >= 0) this.highlightCurrentMatch();
      this.postMessage('findResults', { count: this.findState.matches.length, current: this.findState.currentIndex });
    },
    highlightCurrentMatch() { this.findState.matches.forEach(m => m.classList.remove('inkwell-find-active')); const cur = this.findState.matches[this.findState.currentIndex]; if (cur) { cur.classList.add('inkwell-find-active'); cur.scrollIntoView({ block: 'center', behavior: 'smooth' }); } },
    findNext() { if (this.findState.matches.length === 0) return; this.findState.currentIndex = (this.findState.currentIndex + 1) % this.findState.matches.length; this.highlightCurrentMatch(); this.postMessage('findResults', { count: this.findState.matches.length, current: this.findState.currentIndex }); },
    findPrevious() { if (this.findState.matches.length === 0) return; this.findState.currentIndex = (this.findState.currentIndex - 1 + this.findState.matches.length) % this.findState.matches.length; this.highlightCurrentMatch(); this.postMessage('findResults', { count: this.findState.matches.length, current: this.findState.currentIndex }); },
    replaceCurrent(replacement) { if (this.findState.currentIndex < 0) return; const mark = this.findState.matches[this.findState.currentIndex]; if (!mark) return; const text = document.createTextNode(replacement); mark.parentNode.replaceChild(text, mark); this.findInDocument(this.findState.query, this.findState.caseSensitive); this.onContentChange(); },
    replaceAll(replacement) { this.clearFindHighlights(); const flags = this.findState.caseSensitive ? 'g' : 'gi'; const regex = new RegExp(this.findState.query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), flags); const walker = document.createTreeWalker(this.element, NodeFilter.SHOW_TEXT, null); const textNodes = []; let n; while (n = walker.nextNode()) textNodes.push(n); for (const tn of textNodes) { const orig = tn.textContent; const replaced = orig.replace(regex, replacement); if (replaced !== orig) tn.textContent = replaced; } this.findState.matches = []; this.findState.currentIndex = -1; this.postMessage('findResults', { count: 0, current: -1 }); this.onContentChange(); },
    clearFindHighlights() { const marks = this.element.querySelectorAll('.inkwell-find-highlight'); marks.forEach(mark => { const text = document.createTextNode(mark.textContent); mark.parentNode.replaceChild(text, mark); }); this.element.normalize(); },
    closeFindReplace() { this.clearFindHighlights(); this.findState.matches = []; this.findState.currentIndex = -1; },

    // --- Bridge ---
    postMessage(type, data) { try { if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.inkwell) { window.webkit.messageHandlers.inkwell.postMessage(JSON.stringify({ type: type, data: data })); } } catch (e) { console.error('Bridge error:', e); } }
  };

  // ----------------------------------------------------------
  // Global API
  // ----------------------------------------------------------
  window.InkwellEditor = {
    loadMarkdown: (md) => Editor.loadMarkdown(md),
    getMarkdown: () => Editor.getMarkdown(),
    applyTheme: (css) => Editor.applyTheme(css),
    execFormat: (cmd, param) => Editor.execFormat(cmd, param),
    focus: () => Editor.element.focus(),
    scrollToHeading: (text, level) => {
      const headings = Editor.element.querySelectorAll('h' + level);
      for (const h of headings) {
        if (h.textContent.replace(/[▶▼⋯]/g, '').trim() === text.trim()) {
          // Auto-unfold if heading is hidden
          FoldableHeadings.revealElement(h);
          h.scrollIntoView({ behavior: 'smooth', block: 'start' });
          const range = document.createRange();
          range.selectNodeContents(h);
          range.collapse(false);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          return;
        }
      }
    },
    findInDocument: (q, cs) => Editor.findInDocument(q, cs),
    findNext: () => Editor.findNext(),
    findPrevious: () => Editor.findPrevious(),
    replaceCurrent: (r) => Editor.replaceCurrent(r),
    replaceAll: (r) => Editor.replaceAll(r),
    closeFindReplace: () => Editor.closeFindReplace(),
    applyLink: (url, text) => Editor.applyLink(url, text),
    applyImage: (url, alt) => Editor.applyImage(url, alt),
    carouselReceiveImage: (url) => CarouselDialog.receiveLocalImage(url),
    insertTable: (r, c) => Editor.insertTable(r, c),
    toggleFocusMode: () => FocusMode.toggleFocus(),
    toggleTypewriterMode: () => FocusMode.toggleTypewriter(),
    foldAll: () => {
      Editor.element.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(h => {
        if (!h.classList.contains('inkwell-folded')) FoldableHeadings.fold(h);
      });
    },
    unfoldAll: () => {
      Editor.element.querySelectorAll('.inkwell-folded').forEach(h => {
        FoldableHeadings.unfold(h);
      });
    },
    toggleTOC: () => TableOfContents.toggle(),
    // Zoom
    setZoom: (level) => {
      // Actual zoom is handled by Swift (webView.pageZoom)
      // JS only updates the status bar display
      const pct = Math.max(50, Math.min(200, level));
      const zoomEl = document.getElementById('inkwell-stat-zoom');
      if (zoomEl) zoomEl.textContent = pct + '%';
    },
    getZoom: () => {
      const zoomEl = document.getElementById('inkwell-stat-zoom');
      return zoomEl ? parseInt(zoomEl.textContent) : 100;
    },
    // Export
    getHTMLForExport: () => {
      const themeCSS = document.getElementById('theme-style').textContent;
      const baseCSS = document.querySelector('style:not(#theme-style)').textContent;
      const content = Editor.element.innerHTML;
      // Strip UI elements from export
      const temp = document.createElement('div');
      temp.innerHTML = content;
      temp.querySelectorAll('.inkwell-fold-toggle, .inkwell-drag-handle, .inkwell-slash-menu, .inkwell-toc-panel, .inkwell-status-bar').forEach(el => el.remove());
      // Remove fold-hidden class so all content is visible
      temp.querySelectorAll('.inkwell-fold-hidden').forEach(el => el.classList.remove('inkwell-fold-hidden'));
      temp.querySelectorAll('.inkwell-folded').forEach(el => el.classList.remove('inkwell-folded'));
      return '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>'
        + baseCSS + '</style><style>' + themeCSS
        + '</style></head><body><div class="editor-container"><div id="editor">'
        + temp.innerHTML + '</div></div></body></html>';
    },
  };

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => Editor.init());
  else Editor.init();
})();
</script>
</body>
</html>
