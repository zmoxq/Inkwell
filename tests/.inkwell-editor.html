<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style id="theme-style">/* injected by Swift */</style>

<!-- Highlight.js for code syntax highlighting -->
<link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<!-- Mermaid: 通过 inkwell-asset:// scheme 从 app Bundle 的 WebAssets/mermaid/ 加载 -->
<script src="inkwell-asset:///mermaid/mermaid.min.js"></script>
<!-- KaTeX (Phase 3 PR 3): 通过 inkwell-asset:// scheme 加载,放在 katex/ 子目录。
     用同步 <script> 不要 async/defer,确保 BlockRenderer.render() 调用时 katex 已就绪。
     CSS 内 url(fonts/...) 相对路径会自然指向 inkwell-asset:///katex/fonts/,
     无需平铺字体或改 CSS。详见 PHASE_3_ARCHITECTURE.md 附录 D.5。 -->
<link rel="stylesheet" href="inkwell-asset:///katex/katex.min.css">
<script src="inkwell-asset:///katex/katex.min.js"></script>

<style>
  /* Dark mode: swap to github-dark theme */
  @media (prefers-color-scheme: dark) {
    /* Override will be handled by swapping the theme link in JS */
  }

  html, body { margin: 0; padding: 0; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .editor-container { min-height: 100vh; }
  #editor { outline: none; min-height: 100vh; }
  #editor.ProseMirror { outline: none; }

  /* Code block styling */
  #editor pre {
    position: relative;
  }
  #editor pre code.hljs {
    padding: 1em;
    border-radius: 6px;
  }
  /* Language label badge */
  #editor pre::after {
    content: attr(data-language);
    position: absolute;
    top: 4px;
    right: 8px;
    font-size: 11px;
    font-family: -apple-system, sans-serif;
    color: rgba(128,128,128,0.6);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    pointer-events: none;
  }

  /* Find & Replace highlights */
  .inkwell-find-highlight {
    background: rgba(255, 220, 0, 0.4);
    border-radius: 2px;
    padding: 0 1px;
  }
  .inkwell-find-active {
    background: rgba(255, 140, 0, 0.6);
    box-shadow: 0 0 0 2px rgba(255, 140, 0, 0.3);
  }

  /* Highlight (==text==) */
  mark:not(.inkwell-find-highlight):not(.inkwell-find-active) {
    background: rgba(255, 230, 0, 0.35);
    border-radius: 2px;
    padding: 0 2px;
  }

  /* ========== Block Renderer (Phase 3 Extensions) ========== */
  .inkwell-block-renderer {
    position: relative;
    margin: 1em 0;
  }
  .inkwell-block-renderer .renderer-output {
    /* renderer 的实际产物容器 */
  }
  .inkwell-block-renderer .renderer-loading {
    color: rgba(128,128,128,0.7);
    font-size: 13px;
    font-style: italic;
    padding: 12px 16px;
    text-align: center;
    border: 1px dashed rgba(128,128,128,0.3);
    border-radius: 6px;
  }
  .inkwell-block-renderer .renderer-error {
    color: #c0392b;
    font-size: 13px;
    padding: 12px 16px;
    border: 1px solid rgba(192, 57, 43, 0.3);
    border-radius: 6px;
    background: rgba(192, 57, 43, 0.05);
    white-space: pre-wrap;
    font-family: -apple-system, ui-monospace, monospace;
  }
  .inkwell-block-renderer .renderer-error[data-error-type="syntax"] {
    /* 语法错给一个稍温和的样式区分于运行时错 */
    color: #b58a00;
    border-color: rgba(181, 138, 0, 0.4);
    background: rgba(181, 138, 0, 0.05);
  }

  /* Mermaid 特定样式 */
  .inkwell-block-renderer[data-renderer="mermaid"] .renderer-output {
    text-align: center;
    padding: 12px;
  }
  .inkwell-block-renderer[data-renderer="mermaid"] svg {
    max-width: 100%;
    height: auto;
  }

  /* KaTeX display math 特定样式 (Phase 3 PR 3) */
  .inkwell-block-renderer[data-renderer="katex-display"] .renderer-output {
    text-align: center;
    padding: 8px 12px;
    overflow-x: auto;  /* 长公式可横向滚动 */
  }
  /* KaTeX 自带 .katex-display 类已是 block + center,不需要再覆盖。
     主题切换通过 currentColor 自动继承,没有 hardcode 颜色规则。 */

  /* display-math fallback (parser 阶段无 renderer / 未闭合) */
  pre.inkwell-unrendered-math,
  pre.inkwell-unclosed-math {
    background: var(--code-bg, #f5f5f5);
    border-left: 3px solid var(--border, #d0d0d0);
    padding: 8px 12px;
    margin: 1em 0;
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 0.9em;
    white-space: pre-wrap;
    word-break: break-word;
  }
  pre.inkwell-unclosed-math {
    border-left-color: #d97706;  /* 橙色提示这是未闭合的 */
  }

  /* ========== Table Enhanced Styles ========== */
  .editor-container {
    position: relative; /* anchor for toolbar absolute positioning */
  }
  #editor table {
    border-collapse: collapse;
    width: 100%;
    margin: 1em 0;
    position: relative;
  }
  #editor th, #editor td {
    border: 1px solid var(--border, #d0d0d0);
    padding: 8px 12px;
    min-width: 100px;
    vertical-align: middle;
    text-align: center;
    position: relative;
    word-wrap: break-word;
  }
  #editor th {
    background: var(--bg-secondary, #f5f5f5);
    font-weight: 600;
    cursor: pointer;
    user-select: none;
  }
  /* Sort indicator */
  #editor th[data-sort="asc"]::after { content: ' ▲'; font-size: 10px; opacity: 0.5; }
  #editor th[data-sort="desc"]::after { content: ' ▼'; font-size: 10px; opacity: 0.5; }
  /* Active cell highlight */
  #editor td:focus, #editor th:focus {
    outline: 2px solid var(--accent, #0066cc);
    outline-offset: -2px;
  }
  /* Column resize handle */
  .inkwell-col-resize {
    position: absolute;
    top: 0;
    right: -2px;
    width: 5px;
    height: 100%;
    cursor: col-resize;
    z-index: 10;
    user-select: none;
  }
  .inkwell-col-resize:hover,
  .inkwell-col-resize.active {
    background: var(--accent, #0066cc);
    opacity: 0.4;
  }

  /* Table floating toolbar */
  .inkwell-table-toolbar {
    position: absolute;
    display: flex;
    gap: 2px;
    background: var(--bg-primary, #fff);
    border: 1px solid var(--border, #d0d0d0);
    border-radius: 6px;
    padding: 3px 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    z-index: 100;
    font-size: 12px;
    font-family: -apple-system, sans-serif;
  }
  .inkwell-table-toolbar button {
    background: none;
    border: none;
    padding: 3px 7px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--text-primary, #333);
    font-size: 12px;
    white-space: nowrap;
  }
  .inkwell-table-toolbar button:hover {
    background: var(--bg-secondary, #f0f0f0);
  }
  .inkwell-table-toolbar .separator {
    width: 1px;
    background: var(--border, #d0d0d0);
    margin: 2px 3px;
  }

  /* Alignment classes */
  #editor td.align-center, #editor th.align-center { text-align: center; }
  #editor td.align-right, #editor th.align-right { text-align: right; }
  #editor td.align-left, #editor th.align-left { text-align: left; }

  @media (prefers-color-scheme: dark) {
    .inkwell-table-toolbar {
      background: #2a2a2a;
      border-color: #555;
    }
    .inkwell-table-toolbar button { color: #ddd; }
    .inkwell-table-toolbar button:hover { background: #444; }
  }

  /* ========== Image Carousel ========== */
  .inkwell-carousel {
    position: relative;
    width: 100%;
    margin: 1.2em 0;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
    user-select: none;
    /* Reveal arrow zones on hover */
  }
  .inkwell-carousel-track {
    display: flex;
    transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }
  .inkwell-carousel-slide {
    flex: 0 0 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .inkwell-carousel-slide img {
    width: 100%;
    height: 100%;
    max-height: 520px;
    object-fit: cover;
    display: block;
    pointer-events: none;
    vertical-align: bottom;
  }

  /* ---- Arrow hit zones (invisible, left/right 20% strips) ---- */
  .inkwell-carousel-arrow {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 20%;
    border: none;
    background: transparent;
    cursor: pointer;
    z-index: 10;
    padding: 0;
    display: flex;
    align-items: center;
  }
  .inkwell-carousel-arrow.prev { left: 0; justify-content: flex-start; }
  .inkwell-carousel-arrow.next { right: 0; justify-content: flex-end; }
  .inkwell-carousel-arrow:disabled { cursor: default; pointer-events: none; }

  /* ---- Arrow icon pill ---- */
  .inkwell-carousel-arrow-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    -webkit-backdrop-filter: blur(12px) saturate(180%);
    backdrop-filter: blur(12px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.28);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.82);
    transition: opacity 0.22s ease, transform 0.22s ease, background 0.18s ease;
    color: #fff;
    font-size: 17px;
    font-weight: 300;
    box-shadow: 0 2px 12px rgba(0,0,0,0.22);
    flex-shrink: 0;
  }
  .inkwell-carousel-arrow.prev .inkwell-carousel-arrow-icon { margin-left: 12px; }
  .inkwell-carousel-arrow.next .inkwell-carousel-arrow-icon { margin-right: 12px; }

  /* Show icon when hovering the hit zone */
  .inkwell-carousel-arrow:not(:disabled):hover .inkwell-carousel-arrow-icon {
    opacity: 1;
    transform: scale(1);
    background: rgba(255,255,255,0.28);
  }

  /* Dot indicators */
  .inkwell-carousel-dots {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 10;
    padding: 4px 8px;
    background: rgba(0,0,0,0.28);
    border-radius: 20px;
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
  }
  .inkwell-carousel-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.45);
    border: none;
    cursor: pointer;
    padding: 0;
    transition: background 0.22s, transform 0.22s, width 0.22s;
  }
  .inkwell-carousel-dot.active {
    background: #fff;
    width: 18px;
    border-radius: 3px;
  }
  /* Counter badge */
  .inkwell-carousel-counter {
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 11px;
    font-family: -apple-system, sans-serif;
    font-weight: 500;
    letter-spacing: 0.3px;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.32);
    padding: 3px 9px;
    border-radius: 20px;
    pointer-events: none;
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
  }
  @media (prefers-color-scheme: dark) {
    .inkwell-carousel { background: #111; }
  }

  /* ========== Carousel Insert Dialog ========== */
  .inkwell-dialog-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
  }
  .inkwell-dialog {
    background: #fff; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.22);
    width: 520px; max-width: 92vw; max-height: 80vh;
    display: flex; flex-direction: column; font-family: -apple-system, sans-serif; overflow: hidden;
  }
  .inkwell-dialog-header { padding: 16px 20px 12px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: space-between; }
  .inkwell-dialog-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .inkwell-dialog-close { background: none; border: none; cursor: pointer; font-size: 18px; color: #888; padding: 2px 6px; border-radius: 4px; line-height: 1; }
  .inkwell-dialog-close:hover { background: #f0f0f0; color: #333; }
  .inkwell-dialog-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .inkwell-img-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .inkwell-img-item { display: flex; align-items: center; gap: 10px; background: #f7f7f7; border: 1px solid #e4e4e4; border-radius: 8px; padding: 8px 10px; }
  .inkwell-img-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 5px; flex-shrink: 0; }
  .inkwell-img-thumb-placeholder { width: 48px; height: 48px; border-radius: 5px; flex-shrink: 0; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .inkwell-img-info { flex: 1; min-width: 0; }
  .inkwell-img-url { font-size: 11px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .inkwell-img-alt-input { width: 100%; font-size: 12px; border: 1px solid #ddd; border-radius: 4px; padding: 3px 7px; color: #333; background: #fff; box-sizing: border-box; }
  .inkwell-img-alt-input:focus { outline: none; border-color: #0066cc; }
  .inkwell-img-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .inkwell-img-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 5px; border-radius: 3px; color: #666; line-height: 1; }
  .inkwell-img-btn:hover { background: #e8e8e8; color: #333; }
  .inkwell-img-btn.remove:hover { background: #ffe0e0; color: #c00; }
  .inkwell-add-controls { display: flex; gap: 8px; margin-bottom: 10px; }
  .inkwell-add-btn { flex: 1; padding: 8px 12px; border-radius: 7px; border: 1.5px dashed #bbb; background: #fafafa; cursor: pointer; font-size: 13px; color: #555; display: flex; align-items: center; justify-content: center; gap: 6px; transition: border-color 0.15s, background 0.15s; }
  .inkwell-add-btn:hover { border-color: #0066cc; background: #f0f5ff; color: #0055bb; }
  .inkwell-url-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .inkwell-url-input { flex: 1; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; color: #333; background: #fff; }
  .inkwell-url-input:focus { outline: none; border-color: #0066cc; }
  .inkwell-url-add { padding: 6px 14px; background: #0066cc; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .inkwell-url-add:hover { background: #0055aa; }
  .inkwell-dialog-footer { padding: 12px 20px; border-top: 1px solid #e8e8e8; display: flex; justify-content: flex-end; gap: 8px; }
  .inkwell-dialog-cancel { padding: 7px 18px; border-radius: 7px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 13px; color: #333; }
  .inkwell-dialog-cancel:hover { background: #f5f5f5; }
  .inkwell-dialog-insert { padding: 7px 18px; border-radius: 7px; border: none; background: #0066cc; color: #fff; cursor: pointer; font-size: 13px; font-weight: 600; }
  .inkwell-dialog-insert:hover { background: #0055aa; }
  .inkwell-dialog-insert:disabled { background: #aaa; cursor: default; }
  .inkwell-img-empty { text-align: center; color: #aaa; font-size: 13px; padding: 20px 0 10px; }
  @media (prefers-color-scheme: dark) {
    .inkwell-dialog { background: #242424; }
    .inkwell-dialog-header, .inkwell-dialog-footer { border-color: #3a3a3a; }
    .inkwell-dialog-title { color: #eee; }
    .inkwell-dialog-close:hover { background: #333; color: #ccc; }
    .inkwell-img-item { background: #2e2e2e; border-color: #3e3e3e; }
    .inkwell-img-url { color: #888; }
    .inkwell-img-alt-input { background: #1e1e1e; border-color: #444; color: #ddd; }
    .inkwell-img-btn:hover { background: #3a3a3a; color: #ccc; }
    .inkwell-img-btn.remove:hover { background: #4a1a1a; color: #f88; }
    .inkwell-add-btn { background: #2a2a2a; border-color: #444; color: #aaa; }
    .inkwell-add-btn:hover { border-color: #4488dd; background: #1e2a3a; color: #88bbff; }
    .inkwell-url-input { background: #1e1e1e; border-color: #444; color: #ddd; }
    .inkwell-dialog-cancel { background: #2e2e2e; border-color: #444; color: #ccc; }
    .inkwell-dialog-cancel:hover { background: #383838; }
    .inkwell-img-empty { color: #666; }
  }

  /* ========== Slash Menu ========== */
  .inkwell-slash-menu {
    position: fixed;
    z-index: 9999;
    min-width: 260px;
    max-width: 320px;
    max-height: 340px;
    overflow-y: auto;
    background: var(--bg-primary, #fff);
    border: 1px solid var(--border, #ddd);
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    padding: 6px 0;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.15s ease, transform 0.15s ease;
    pointer-events: none;
    font-family: var(--font-body, -apple-system, BlinkMacSystemFont, sans-serif);
    scrollbar-width: thin;
  }
  .inkwell-slash-menu.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .inkwell-slash-menu::-webkit-scrollbar { width: 4px; }
  .inkwell-slash-menu::-webkit-scrollbar-thumb { background: var(--text-muted, #ccc); border-radius: 4px; }

  .inkwell-slash-category {
    padding: 4px 14px 2px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted, #999);
    user-select: none;
  }
  .inkwell-slash-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.1s ease;
    user-select: none;
  }
  .inkwell-slash-item:hover,
  .inkwell-slash-item.active {
    background: var(--accent-light, rgba(0, 196, 182, 0.1));
  }
  .inkwell-slash-item.active {
    background: var(--accent-light, rgba(0, 196, 182, 0.15));
  }
  .inkwell-slash-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    background: var(--bg-secondary, #f5f5f5);
    font-size: 16px;
    flex-shrink: 0;
    color: var(--text-primary, #333);
  }
  .inkwell-slash-info {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .inkwell-slash-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary, #333);
    line-height: 1.3;
  }
  .inkwell-slash-desc {
    font-size: 11px;
    color: var(--text-muted, #999);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .inkwell-slash-shortcut {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted, #bbb);
    font-family: var(--font-mono, monospace);
    flex-shrink: 0;
  }
  .inkwell-slash-empty {
    padding: 16px 14px;
    text-align: center;
    color: var(--text-muted, #999);
    font-size: 13px;
  }
  @media (prefers-color-scheme: dark) {
    .inkwell-slash-menu {
      box-shadow: 0 8px 30px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
    }
    .inkwell-slash-icon {
      background: var(--bg-secondary, #2a2a2a);
    }
  }

  /* ========== Foldable Headings ========== */
  .inkwell-fold-toggle {
    position: absolute;
    left: -24px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s ease, transform 0.2s ease;
    color: var(--text-muted, #aaa);
    font-size: 12px;
    border-radius: 3px;
    user-select: none;
    -webkit-user-select: none;
    line-height: 1;
  }
  .inkwell-fold-toggle:hover {
    background: var(--bg-secondary, #f0f0f0);
    color: var(--text-primary, #333);
  }
  /* Show toggle on heading hover or when folded */
  h1:hover > .inkwell-fold-toggle,
  h2:hover > .inkwell-fold-toggle,
  h3:hover > .inkwell-fold-toggle,
  h4:hover > .inkwell-fold-toggle,
  h5:hover > .inkwell-fold-toggle,
  h6:hover > .inkwell-fold-toggle,
  .inkwell-folded > .inkwell-fold-toggle {
    opacity: 1;
  }
  /* Headings need relative positioning for the toggle */
  #editor h1, #editor h2, #editor h3,
  #editor h4, #editor h5, #editor h6 {
    position: relative;
  }
  /* Folded state */
  .inkwell-folded > .inkwell-fold-toggle {
    opacity: 0.6;
  }
  .inkwell-folded > .inkwell-fold-toggle::after {
    content: '▶';
  }
  .inkwell-fold-toggle::after {
    content: '▼';
  }
  .inkwell-fold-hidden {
    display: none !important;
  }
  /* Folded heading indicator */
  .inkwell-folded::after {
    content: '⋯';
    display: inline-block;
    margin-left: 8px;
    color: var(--text-muted, #bbb);
    font-size: 0.6em;
    vertical-align: middle;
    font-weight: normal;
  }

  /* ========== Word Count Status Bar ========== */
  .inkwell-status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 16px;
    padding: 0 16px;
    background: var(--bg-secondary, #f8f8f8);
    border-top: 1px solid var(--border, #e5e5e5);
    font-family: var(--font-body, -apple-system, BlinkMacSystemFont, sans-serif);
    font-size: 11px;
    color: var(--text-muted, #999);
    z-index: 100;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity 0.2s ease;
  }
  .inkwell-status-item {
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  .inkwell-status-sep {
    width: 1px;
    height: 12px;
    background: var(--border, #ddd);
  }
  /* Focus mode button in status bar */
  .inkwell-status-btn {
    cursor: pointer;
    padding: 1px 6px;
    border-radius: 3px;
    transition: background 0.1s ease;
  }
  .inkwell-status-btn:hover {
    background: var(--accent-light, rgba(0,196,182,0.12));
    color: var(--text-primary, #555);
  }
  .inkwell-status-btn.active {
    background: var(--accent-light, rgba(0,196,182,0.2));
    color: var(--accent, #00c4b6);
  }
  /* Make room for status bar */
  .editor-container {
    padding-bottom: 30px;
  }
  @media (prefers-color-scheme: dark) {
    .inkwell-status-bar {
      background: var(--bg-secondary, #1e1e1e);
      border-top-color: var(--border, #333);
    }
  }

  /* ========== Focus Mode ========== */
  .inkwell-focus-mode #editor > *:not(.inkwell-focus-active):not(.inkwell-fold-hidden) {
    opacity: 0.25;
    transition: opacity 0.3s ease;
  }
  .inkwell-focus-mode #editor > .inkwell-focus-active {
    opacity: 1;
    transition: opacity 0.3s ease;
  }

  /* ========== Typewriter Mode ========== */
  /* Handled via JS scroll, no special CSS needed */

  /* ========== Zoom ========== */
  /* Zoom works by setting html { font-size: X% }
     Editor content inherits and scales naturally.
     Status bar and UI elements use fixed px sizes and won't scale. */

  /* ========== Drag Handle ========== */
  .inkwell-drag-handle {
    position: absolute;
    left: -40px;
    top: 4px;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    opacity: 0;
    transition: opacity 0.15s ease;
    color: var(--text-muted, #bbb);
    font-size: 14px;
    border-radius: 4px;
    user-select: none;
    -webkit-user-select: none;
    z-index: 5;
    line-height: 1;
  }
  .inkwell-drag-handle:hover {
    background: var(--bg-secondary, #f0f0f0);
    color: var(--text-primary, #666);
    opacity: 1 !important;
  }
  .inkwell-drag-handle:active { cursor: grabbing; }
  /* Show on block hover */
  #editor > *:hover > .inkwell-drag-handle { opacity: 0.5; }
  /* All top-level editor blocks need relative positioning */
  #editor > * { position: relative; }
  /* Drag-over indicator line */
  .inkwell-drag-indicator {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent, #00c4b6);
    border-radius: 1px;
    pointer-events: none;
    z-index: 9998;
    transition: top 0.08s ease;
  }
  /* Dragging state */
  .inkwell-dragging { opacity: 0.4; }

  /* ========== Outline (Floating Panel) ========== */
  .inkwell-toc-panel {
    position: fixed;
    top: 50px;
    right: 16px;
    width: 260px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
    background: var(--bg-primary, #fff);
    border: 1px solid var(--border, #e0e0e0);
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.05);
    padding: 10px 0;
    z-index: 199;
    opacity: 0;
    transform: translateY(-6px) scale(0.97);
    transition: opacity 0.18s ease, transform 0.18s ease;
    pointer-events: none;
    scrollbar-width: thin;
  }
  .inkwell-toc-panel.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
  .inkwell-toc-panel::-webkit-scrollbar { width: 4px; }
  .inkwell-toc-panel::-webkit-scrollbar-thumb { background: var(--text-muted, #ccc); border-radius: 4px; }
  .inkwell-toc-title {
    padding: 2px 14px 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted, #999);
    user-select: none;
  }
  .inkwell-toc-item {
    display: block;
    padding: 4px 14px;
    font-size: 13px;
    color: var(--text-primary, #333);
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.1s;
    line-height: 1.5;
    border-radius: 0;
  }
  .inkwell-toc-item:hover {
    background: var(--accent-light, rgba(0,196,182,0.08));
  }
  .inkwell-toc-item.active {
    color: var(--accent, #00c4b6);
    font-weight: 500;
    background: var(--accent-light, rgba(0,196,182,0.06));
  }
  .inkwell-toc-h2 { padding-left: 28px; }
  .inkwell-toc-h3 { padding-left: 42px; font-size: 12px; }
  .inkwell-toc-h4 { padding-left: 56px; font-size: 12px; color: var(--text-muted, #999); }
  .inkwell-toc-h5 { padding-left: 66px; font-size: 11px; color: var(--text-muted, #aaa); }
  .inkwell-toc-h6 { padding-left: 76px; font-size: 11px; color: var(--text-muted, #aaa); }
  .inkwell-toc-empty {
    padding: 16px 14px;
    text-align: center;
    color: var(--text-muted, #bbb);
    font-size: 12px;
  }
  @media (prefers-color-scheme: dark) {
    .inkwell-toc-panel {
      box-shadow: 0 8px 30px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.15);
    }
  }
</style>

<body>
<div class="editor-container">
  <div id="editor" contenteditable="true"></div>
</div>
<div id="inkwell-carousel-dialog" style="display:none"></div>
<div class="inkwell-status-bar" id="inkwell-status-bar">
  <div class="inkwell-status-item" id="inkwell-stat-words">0 words</div>
  <div class="inkwell-status-sep"></div>
  <div class="inkwell-status-item" id="inkwell-stat-chars">0 chars</div>
  <div class="inkwell-status-sep"></div>
  <div class="inkwell-status-item" id="inkwell-stat-read">0 min read</div>
  <div class="inkwell-status-sep"></div>
  <div class="inkwell-status-btn" id="inkwell-btn-focus" title="Focus Mode">Focus</div>
  <div class="inkwell-status-btn" id="inkwell-btn-typewriter" title="Typewriter Mode">Typewriter</div>
  <div class="inkwell-status-sep"></div>
  <div class="inkwell-status-item" id="inkwell-stat-zoom">100%</div>
</div>
<div class="inkwell-toc-panel" id="inkwell-toc-panel"></div>

<script>
(function() {
  'use strict';

  // =============================================================================
  // Extension Registry — Phase 3 PR 1
  // -----------------------------------------------------------------------------
  // 内置扩展机制。所有非核心渲染逻辑（code highlight、mermaid、KaTeX、timeline、
  // inline marks）通过这里接入。详见 PHASE_3_ARCHITECTURE.md。
  //
  // 三种扩展类型：
  //   - BlockRenderer:  接管 fenced block 渲染（Mermaid、KaTeX display、timeline）
  //                     产物有 data-source-b64 包裹，contenteditable=false
  //   - BlockDecorator: 装饰已渲染的 block，不接管 DOM 所有权（highlight.js）
  //   - InlineRenderer: 行内文本片段（==highlight==，未来 ^^sup^^ 等）
  //
  // 关键不变量：
  //   - 源码权威：保存优先读 data-source-b64
  //   - 故障隔离：任何扩展抛错都不破坏 core 流程
  //   - 源码绝不丢失：底线
  // =============================================================================
  
  (function () {
    'use strict';
  
    // ---------------------------------------------------------------------------
    // 错误上报 + safeCall
    // ---------------------------------------------------------------------------
  
    function reportToSwift(payload) {
      try {
        const handler = window.webkit?.messageHandlers?.inkwell;
        if (!handler) return;
        handler.postMessage(JSON.stringify({
          type: 'extensionError',
          data: payload
        }));
      } catch (_) {
        // 桥不可用时静默
      }
    }
  
    function safeCall(extensionName, method, fn, fallbackFn) {
      try {
        return fn();
      } catch (error) {
        console.error(`[Extension:${extensionName}] ${method} failed`, error);
        reportToSwift({
          extension: extensionName,
          method: method,
          error: String(error && error.stack || error)
        });
        return fallbackFn ? fallbackFn(error) : undefined;
      }
    }
  
    // ---------------------------------------------------------------------------
    // base64 helpers（UTF-8 safe）
    // ---------------------------------------------------------------------------
  
    function encodeSourceB64(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }
  
    function decodeSourceB64(b64) {
      return decodeURIComponent(escape(atob(b64)));
    }
  
    // ---------------------------------------------------------------------------
    // BlockContext —— 给 BlockRenderer 和 BlockDecorator 使用
    // ---------------------------------------------------------------------------
  
    function createBlockContext() {
      return {
        // ---- DOM 构造（主要给 Renderer 用）----
  
        createBlockRoot({ renderer, sourceMarkdown, language, editStyle }) {
          const root = document.createElement('div');
          root.className = 'inkwell-block-renderer';
          root.setAttribute('data-renderer', renderer);
          if (language) root.setAttribute('data-language', language);
          root.setAttribute('data-edit-style', editStyle || 'typora');
          root.setAttribute('data-source-b64', encodeSourceB64(sourceMarkdown));
          root.setAttribute('contenteditable', 'false');
  
          const output = document.createElement('div');
          output.className = 'renderer-output';
          root.appendChild(output);
  
          if (editStyle === 'edit-button') {
            const btn = document.createElement('button');
            btn.className = 'renderer-edit-action';
            btn.type = 'button';
            btn.textContent = 'Edit Source';
            root.appendChild(btn);
          }
          return root;
        },
  
        createElement(tag, attrs, ...children) {
          const el = document.createElement(tag);
          if (attrs) {
            for (const k in attrs) {
              if (k === 'className') el.className = attrs[k];
              else if (k === 'style' && typeof attrs[k] === 'object') {
                Object.assign(el.style, attrs[k]);
              } else if (k.startsWith('on') && typeof attrs[k] === 'function') {
                el.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
              } else {
                el.setAttribute(k, attrs[k]);
              }
            }
          }
          for (const child of children) {
            if (child == null) continue;
            el.appendChild(typeof child === 'string'
              ? document.createTextNode(child)
              : child);
          }
          return el;
        },
  
        // ---- 状态管理（Renderer 用）----
  
        setLoading(rootEl, message) {
          const out = rootEl.querySelector('.renderer-output');
          if (!out) return;
          out.innerHTML = '';
          const ph = document.createElement('div');
          ph.className = 'renderer-loading';
          ph.textContent = message || 'Loading…';
          out.appendChild(ph);
        },
  
        setError(rootEl, errorInfo) {
          const out = rootEl.querySelector('.renderer-output');
          if (!out) return;
          out.innerHTML = '';
          const box = document.createElement('div');
          box.className = 'renderer-error';
          box.setAttribute('data-error-type', errorInfo?.type || 'unknown');
          box.textContent = errorInfo?.message || 'Render failed';
          out.appendChild(box);
        },
  
        replaceOutput(rootEl, newDOM) {
          const out = rootEl.querySelector('.renderer-output');
          if (!out) return;
          out.innerHTML = '';
          if (newDOM) out.appendChild(newDOM);
        },
  
        // ---- 源码访问 ----
  
        getSourceMarkdown(rootEl) {
          const b64 = rootEl.getAttribute('data-source-b64');
          if (!b64) return '';
          try {
            return decodeSourceB64(b64);
          } catch (e) {
            console.error('[ExtensionRegistry] base64 decode failed', e);
            return '';
          }
        },
  
        // ---- 异步任务 —— 同 root 同时只一个 in-flight，新任务自动 abort 旧任务 ----
  
        runAsync(rootEl, task, opts) {
          if (!opts || typeof opts.onError !== 'function') {
            throw new Error('runAsync requires opts.onError (renderer must define error UX)');
          }
          const prev = rootEl.__inkwellAbortController;
          if (prev) prev.abort();
  
          const ctrl = new AbortController();
          rootEl.__inkwellAbortController = ctrl;
  
          Promise.resolve()
            .then(() => task(ctrl.signal))
            .catch((err) => {
              if (ctrl.signal.aborted) return;
              safeCall(
                rootEl.getAttribute('data-renderer') || 'unknown',
                'runAsync.onError',
                () => opts.onError(err, rootEl)
              );
            })
            .finally(() => {
              if (rootEl.__inkwellAbortController === ctrl) {
                rootEl.__inkwellAbortController = null;
              }
            });
        },
  
        // ---- 主题信息（重渲染前由 core 注入最新值）----
  
        theme: {
          isDark: false,
          colors: {}
        }
      };
    }
  
    // ---------------------------------------------------------------------------
    // Registry
    // ---------------------------------------------------------------------------
  
    const blockRenderers = [];      // 接管渲染
    const blockDecorators = [];     // 装饰已渲染的 DOM
    const inlineRenderers = [];     // 行内文本
  
    function sortByPriority(arr) {
      arr.sort((a, b) => (b.priority || 0) - (a.priority || 0));
    }
  
    const ExtensionRegistry = {
  
      // =========================================================================
      // BlockRenderer —— 接管 fenced block 渲染（Mermaid、KaTeX display、timeline）
      // =========================================================================
  
      registerBlock(spec) {
        if (!spec || !spec.name || !spec.type) {
          throw new Error('registerBlock: name and type are required');
        }
        if (typeof spec.match !== 'function' || typeof spec.render !== 'function') {
          throw new Error(`registerBlock(${spec.name}): match and render are required`);
        }
        const normalized = Object.assign({
          priority: 0,
          editStyle: 'typora',
          capabilities: { rerenderOn: [] }
        }, spec);
        blockRenderers.push(normalized);
        sortByPriority(blockRenderers);
      },
  
      findBlockRenderer(block) {
        const ctx = createBlockContext();
        for (const r of blockRenderers) {
          if (r.type !== block.type) continue;
          const ok = safeCall(r.name, 'match', () => r.match(block, ctx), () => false);
          if (ok) return r;
        }
        return null;
      },

      // 按名字直接拿 renderer（重渲染调度用，跳过 match）
      _findRendererByName(name) {
        return blockRenderers.find(r => r.name === name) || null;
      },
  
      renderBlock(block, renderer) {
        const ctx = createBlockContext();
        return safeCall(
          renderer.name,
          'render',
          () => {
            const root = renderer.render(block, ctx);
            if (!(root instanceof HTMLElement)) {
              throw new Error('render must return HTMLElement synchronously');
            }
            return root;
          },
          () => null  // core 决定 fallback：plain code block，base64 源码不丢
        );
      },
  
      serializeBlockNode(rootEl) {
        // 1. 优先 data-source-b64
        const b64 = rootEl.getAttribute('data-source-b64');
        if (b64) {
          try { return decodeSourceB64(b64); } catch (_) {}
        }
        // 2. renderer 显式 serialize
        const rendererName = rootEl.getAttribute('data-renderer');
        const renderer = blockRenderers.find(r => r.name === rendererName);
        if (renderer && typeof renderer.serialize === 'function') {
          const ctx = createBlockContext();
          const out = safeCall(rendererName, 'serialize',
            () => renderer.serialize(rootEl, ctx),
            () => null);
          if (out != null) return out;
        }
        // 3. 兜底从 .renderer-output 提文本
        const out = rootEl.querySelector('.renderer-output');
        return out ? out.textContent : '';
      },
  
      // =========================================================================
      // BlockDecorator —— 装饰已渲染的 DOM（highlight.js、未来的 KaTeX inline 风格扩展）
      // -------------------------------------------------------------------------
      // Decorator 不接管 DOM 所有权，只在 core 渲染完成后被调用做装饰处理。
      // 不产生 data-source-b64 包裹。serialize 阶段被透明跳过。
      // =========================================================================
  
      registerBlockDecorator(spec) {
        if (!spec || !spec.name) {
          throw new Error('registerBlockDecorator: name is required');
        }
        if (typeof spec.decorate !== 'function') {
          throw new Error(`registerBlockDecorator(${spec.name}): decorate is required`);
        }
        const normalized = Object.assign({
          selector: null,           // 必填：装饰目标选择器，例 "pre code"
          priority: 0,
          capabilities: { rerenderOn: [] }
        }, spec);
        if (!normalized.selector) {
          throw new Error(`registerBlockDecorator(${spec.name}): selector is required`);
        }
        blockDecorators.push(normalized);
        sortByPriority(blockDecorators);
      },
  
      // 由 core 在 loadMarkdown 之后、需要装饰时调用
      runDecorators(scopeEl, options) {
        const ctx = createBlockContext();
        const filter = options?.filter; // (decorator) => boolean，可选过滤
        for (const dec of blockDecorators) {
          if (filter && !filter(dec)) continue;
          const targets = scopeEl.querySelectorAll(dec.selector);
          targets.forEach(target => {
            // 装饰器可读 options.skipPredicate 跳过特定节点（例如光标所在的代码块）
            if (options?.skipPredicate && options.skipPredicate(target, dec)) return;
            safeCall(dec.name, 'decorate',
              () => dec.decorate(target, ctx),
              () => {}  // 装饰失败：不做任何事，原 DOM 保持不变
            );
          });
        }
      },
  
      // =========================================================================
      // InlineRenderer —— 行内文本片段（==highlight== 等）
      // -------------------------------------------------------------------------
      // 三个对接点：
      //   - toHTML(match, ...captures): string  —— 给 MarkdownParser.parseInline 用
      //   - toDOM(match, ...captures): Node     —— 给 LiveConverter 用
      //   - serialize(node): string             —— 给 MarkdownSerializer 用
      //   - tagName: string                     —— serialize 派发依据（如 "MARK"）
      //
      // v1 限制：仅简单 regex 替换；不嵌套；不跨行；不感知 code/escape 上下文
      // =========================================================================
  
      registerInline(spec) {
        if (!spec || !spec.name || !spec.pattern) {
          throw new Error('registerInline: name and pattern are required');
        }
        if (typeof spec.toHTML !== 'function' && typeof spec.toDOM !== 'function') {
          throw new Error(`registerInline(${spec.name}): at least one of toHTML/toDOM is required`);
        }
        // 强制每个 pattern 都带 global flag，方便 parser 用 replace
        const flags = spec.pattern.flags.includes('g') ? spec.pattern.flags : spec.pattern.flags + 'g';
        const normalized = Object.assign({
          priority: 0,
          tagName: null  // 用于 serialize 派发，例 "MARK"
        }, spec, {
          pattern: new RegExp(spec.pattern.source, flags)
        });
        inlineRenderers.push(normalized);
        sortByPriority(inlineRenderers);
      },
  
      // ---- parser 阶段：把 plain text 跑一遍所有 inline 替换 → HTML 字符串 ----
  
      applyInlineToHTML(text) {
        let result = text;
        for (const r of inlineRenderers) {
          if (typeof r.toHTML !== 'function') continue;
          result = safeCall(r.name, 'toHTML',
            () => result.replace(r.pattern, (...args) => {
              // args = [match, capture1, capture2, ..., offset, fullString, groups?]
              return r.toHTML(...args);
            }),
            () => result
          );
        }
        return result;
      },
  
      // ---- live converter 阶段：列出所有可用 inline 让 core 循环 tryConvert ----
      // 返回数组（按 priority 降序），每项包含 pattern + toDOM
      // core 按现有 tryConvertInline 模式逐个匹配
  
      listInlineForLiveConvert() {
        return inlineRenderers
          .filter(r => typeof r.toDOM === 'function')
          .map(r => ({
            name: r.name,
            // tryConvertInline 用 non-global pattern；这里去掉 g flag
            pattern: new RegExp(r.pattern.source, r.pattern.flags.replace('g', '')),
            createElement: (match, ...captures) => safeCall(r.name, 'toDOM',
              () => r.toDOM(match, ...captures),
              () => {
                // fallback：返回包含原文的 span，避免吞内容
                const span = document.createElement('span');
                span.textContent = match;
                return span;
              })
          }));
      },
  
      // ---- serializer 阶段：根据 tagName 派发到对应 renderer 的 serialize ----
  
      serializeInlineNode(node) {
        if (!node || node.nodeType !== Node.ELEMENT_NODE) return null;
        const tag = node.tagName;
        for (const r of inlineRenderers) {
          if (r.tagName !== tag) continue;
          if (typeof r.serialize !== 'function') continue;
          const out = safeCall(r.name, 'serialize',
            () => r.serialize(node),
            () => null);
          if (out != null) return out;
        }
        return null; // null 表示"未注册的 inline"，core 用现有逻辑处理
      },
  
      // =========================================================================
      // 重渲染调度（core 触发）
      // =========================================================================
  
      getNodesToRerender(trigger /* e.g. "theme-change" */) {
        const nodes = [];
  
        // BlockRenderer 节点
        const rendererNames = blockRenderers
          .filter(r => (r.capabilities?.rerenderOn || []).includes(trigger))
          .map(r => r.name);
        if (rendererNames.length > 0) {
          const sel = rendererNames.map(n => `[data-renderer="${n}"]`).join(',');
          document.querySelectorAll(sel).forEach(n => nodes.push({ kind: 'renderer', node: n }));
        }
  
        // BlockDecorator 触发：core 应当对整个文档重跑该 decorator
        const decoratorNames = blockDecorators
          .filter(d => (d.capabilities?.rerenderOn || []).includes(trigger))
          .map(d => d.name);
        decoratorNames.forEach(name => nodes.push({ kind: 'decorator', name }));
  
        return nodes;
      },
  
      // =========================================================================
      // 调试与内部工具
      // =========================================================================
  
      list() {
        return {
          blocks: blockRenderers.map(r => ({
            name: r.name, type: r.type, priority: r.priority,
            rerenderOn: r.capabilities?.rerenderOn || []
          })),
          decorators: blockDecorators.map(d => ({
            name: d.name, selector: d.selector,
            rerenderOn: d.capabilities?.rerenderOn || []
          })),
          inline: inlineRenderers.map(r => ({
            name: r.name, tagName: r.tagName, pattern: r.pattern.source
          }))
        };
      },
  
      isEnabled(name) {

    });

  // ----------------------------------------------------------
  // Markdown Parser: Markdown → HTML
  // ----------------------------------------------------------
  const MarkdownParser = {
    parse(md) {
      if (!md || md.trim() === '') return '<p class="is-editor-empty"></p>';
      let html = '';
      const lines = md.split('\n');
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];

        // Fenced code block
        if (line.match(/^```/)) {
          const lang = line.slice(3).trim();
          let code = '';
          i++;
          while (i < lines.length && !lines[i].match(/^```/)) {
            code += lines[i] + '\n';  // 注意：先不 escapeHtml，因为可能要传给 BlockRenderer
            i++;

              language: lang,

            // runAsync 等依赖 DOM 的能力工作不正常。

                    ' data-pending-block-type="fenced-code"' +
                    ' data-pending-renderer="' + (renderer.name) + '"' +
                    ' data-pending-language="' + this.escapeAttr(lang) + '"' +

        }

        // Phase 3 PR 3 引入。规则详见 PHASE_3_ARCHITECTURE.md 附录 D.3。
        // - 开/闭定界符必须是 trim 后等于 "$$" 的整行
        // - 内容是开闭之间的所有行
        // - 未闭合的开 $$ —— 整段当普通文本,不退回 markdown 二次 parse
        // - inline $...$ 和段内 $$...$$ 不在范围,留 PR 5
        if (line.trim() === '$$') {
          // 先扫一遍找闭定界符
          let endIdx = -1;
          for (let j = i + 1; j < lines.length; j++) {
            if (lines[j].trim() === '$$') {
              endIdx = j;
              break;
            }
          }
          if (endIdx === -1) {
            // 未闭合 —— 当普通文本逐行输出,不进入 markdown parse
            // 用 pre 保留换行,escapeHtml 防止 HTML 注入

            html += '<pre class="inkwell-unclosed-math">' + escaped + '</pre>\n';
            i = lines.length;
            continue;

          // 找到了配对的 $$
          const contentLines = lines.slice(i + 1, endIdx);
          const content = contentLines.join('\n');
          // raw 是完整原文,含两个定界符
          const raw = lines.slice(i, endIdx + 1).join('\n');

          // 找 renderer
          let renderer = null;
          if (typeof ExtensionRegistry !== 'undefined') {
            renderer = ExtensionRegistry.findBlockRenderer({
              type: 'display-math',
              content: content,
              raw: raw
            });
          }

            // raw(完整含 $$ 定界符)进 base64
            const sourceB64 = btoa(unescape(encodeURIComponent(raw)));
            html += '<div class="inkwell-pending-renderer"' +
                    ' data-pending-block-type="display-math"' +
                    ' data-pending-renderer="' + (renderer.name) + '"' +
                    ' data-pending-language=""' +
                    ' data-pending-source-b64="' + sourceB64 + '"></div>\n';
          } else {

          }
          i = endIdx + 1;
          continue;

          html += '<hr>\n';
          i++;
          continue;
        }

        // Heading
        const hm = line.match(/^(#{1,6})\s+(.+)/);
        if (hm) {
          html += '<h' + hm[1].length + '>' + this.parseInline(hm[2]) + '</h' + hm[1].length + '>\n';

        if (i + 1 < lines.length && lines[i + 1] && lines[i + 1].match(/^\|?\s*:?-+:?\s*(\|\s*:?-+:?\s*)*\|?\s*$/)) {
          const headerCells = this.parseTableRow(line);
          const sepCells = this.parseTableRow(lines[i + 1]);
          // Parse alignment from separator
          const aligns = sepCells.map(s => {
            s = s.trim();

            return 'left';

          let tableHtml = '<table><thead><tr>';
          headerCells.forEach((c, j) => {

            const style = align !== 'left' ? ' style="text-align:' + align + '"' : '';
            tableHtml += '<th' + style + '>' + this.parseInline(c) + '</th>';
          });
          tableHtml += '</tr></thead><tbody>';
          while (i < lines.length && lines[i].includes('|')) {

            tableHtml += '<tr>';
            cells.forEach((c, j) => {
              const align = aligns[j] || 'left';
              const style = align !== 'left' ? ' style="text-align:' + align + '"' : '';
              tableHtml += '<td' + style + '>' + this.parseInline(c) + '</td>';

            i++;
          }
          html += '</ul>\n';
          continue;
        }

          html += '<ul>\n';
          while (i < lines.length && lines[i].match(/^[-*+]\s+/)) {
            const content = lines[i].replace(/^[-*+]\s+/, '');
            html += '<li>' + this.parseInline(content) + '</li>\n';
            i++;
          }
          html += '</ul>\n';
          continue;
        }

        // Ordered list (tolerant of single blank lines between items)
        if (line.match(/^\d+\.\s+/)) {
          const startNum = parseInt(line.match(/^(\d+)\./)[1]);
          html += '<ol' + (startNum !== 1 ? ' start="' + startNum + '"' : '') + '>\n';
          while (i < lines.length) {
            if (lines[i].match(/^\d+\.\s+/)) {
              const content = lines[i].replace(/^\d+\.\s+/, '');
              html += '<li>' + this.parseInline(content) + '</li>\n';
              i++;
            } else if (lines[i].trim() === '' && i + 1 < lines.length && lines[i + 1].match(/^\d+\.\s+/)) {
              // Skip blank line between numbered items
              i++;
            } else {
              break;
            }
          }
          html += '</ol>\n';
          continue;
        }

        // Empty line
        if (line.trim() === '') { i++; continue; }

        // Image-only line — collect consecutive image lines → carousel or single img
        const imgLineMatch = line.match(/^!\[([^\]]*)\]\(([^)]+)\)\s*$/);
        if (imgLineMatch) {
          const images = [];
          while (i < lines.length && lines[i].match(/^!\[([^\]]*)\]\(([^)]+)\)\s*$/)) {
            const m = lines[i].match(/^!\[([^\]]*)\]\(([^)]+)\)\s*$/);
            images.push({ alt: m[1], src: m[2] });
            i++;
          }
          if (images.length === 1) {
            html += '<p><img src="' + images[0].src + '" alt="' + images[0].alt + '"></p>\n';
          } else {
            // Build carousel
            const slides = images.map((img, idx) =>
              '<div class="inkwell-carousel-slide" data-index="' + idx + '">' +
              '<img src="' + img.src + '" alt="' + this.escapeHtml(img.alt) + '">' +
              '</div>'
            ).join('');
            const dots = images.map((_, idx) =>
              '<button class="inkwell-carousel-dot' + (idx === 0 ? ' active' : '') + '" data-dot="' + idx + '" aria-label="Slide ' + (idx+1) + '"></button>'
            ).join('');
            const md = images.map(img => '![' + img.alt + '](' + img.src + ')').join('\n');
            html +=
              '<div class="inkwell-carousel" contenteditable="false" data-carousel data-count="' + images.length + '" data-current="0" data-md="' + this.escapeAttr(md) + '">' +
                '<div class="inkwell-carousel-track">' + slides + '</div>' +
                '<button class="inkwell-carousel-arrow prev" aria-label="Previous"><span class="inkwell-carousel-arrow-icon">&#8249;</span></button>' +
                '<button class="inkwell-carousel-arrow next" aria-label="Next"><span class="inkwell-carousel-arrow-icon">&#8250;</span></button>' +
                '<div class="inkwell-carousel-dots">' + dots + '</div>' +
                '<div class="inkwell-carousel-counter">1 / ' + images.length + '</div>' +
              '</div>\n';
          }
          continue;
        }

        html += '<p>' + this.parseInline(line) + '</p>\n';
        i++;
      }
      return html;
    },

    parseInline(text) {
      if (!text) return '';
      text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
      text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
      text = text.replace(/_(.+?)_/g, '<em>$1</em>');
      text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

      if (typeof ExtensionRegistry !== 'undefined') {

    parseTableRow(line) {
      return line.replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim());

    escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };

      return text.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/\n/g, '&#10;');
    }
  };

  // ----------------------------------------------------------
  // Markdown Serializer: HTML → Markdown

  const MarkdownSerializer = {

      if (node.nodeType !== Node.ELEMENT_NODE) return '';

      const inner = this.serializeChildren(node);

      switch (tag) {
        case 'p': return inner + '\n\n';
        case 'h1': return '# ' + inner + '\n\n';
        case 'h2': return '## ' + inner + '\n\n';
        case 'h3': return '### ' + inner + '\n\n';
        case 'h4': return '#### ' + inner + '\n\n';
        case 'h5': return '##### ' + inner + '\n\n';
        case 'h6': return '###### ' + inner + '\n\n';
        case 'strong': case 'b': return '**' + inner + '**';
        case 'em': case 'i': return '*' + inner + '*';
        case 'del': case 's': return '~~' + inner + '~~';
        case 'mark': {

            if (out != null) return out;
          }
          return inner;
        }

          if (node.parentNode && node.parentNode.tagName === 'PRE') return inner;
          return '`' + inner + '`';
        case 'pre': {

          if (codeEl) {
            const langMatch = codeEl.className.match(/language-(\w+)/);
            if (langMatch) lang = langMatch[1];
          }
          const code = codeEl ? codeEl.textContent : node.textContent;
          return '```' + lang + '\n' + code + '\n```\n\n';

        case 'blockquote':
          return inner.split('\n').filter(l => l.trim()).map(l => '> ' + l).join('\n') + '\n\n';

          return this.serializeList(node, '-') + '\n';
        case 'ol': return this.serializeList(node, '1.') + '\n';
        case 'li': return inner;
        case 'a': return '[' + inner + '](' + (node.getAttribute('href') || '') + ')';
        case 'img': return '![' + (node.getAttribute('alt') || '') + '](' + (node.getAttribute('src') || '') + ')';

        case 'span': {
