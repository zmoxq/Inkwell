          const bgColor = node.style.backgroundColor;
          if (color)   return `<span style="color:${color}">${inner}</span>`;
          if (bgColor) return `<span style="background-color:${bgColor}">${inner}</span>`;
          return inner;
        }
        case 'div':
          // Phase 3 PR 2: BlockRenderer 节点 → 还原 markdown 源码
          if (node.classList.contains('inkwell-block-renderer')) {
            if (typeof ExtensionRegistry !== 'undefined') {
              const md = ExtensionRegistry.serializeBlockNode(node);
              // serializeBlockNode 返回的是完整 markdown 源码:
              // - fenced renderer 返回围栏(如 ```mermaid\n...\n```)
              // - display-math renderer 返回完整含定界符的 $$\n...\n$$
              // 都是直接可写回 .md 的形式
              return (md || '') + '\n\n';
            }
            return '';
          }
          // Carousel → restore individual image lines
          if (node.hasAttribute('data-carousel')) {
            const md = node.getAttribute('data-md');
            if (md) return md.replace(/&#10;/g, '\n') + '\n\n';
            // Fallback: extract from slides
            const imgs = Array.from(node.querySelectorAll('.inkwell-carousel-slide img'));
            return imgs.map(img => '![' + (img.getAttribute('alt') || '') + '](' + (img.getAttribute('src') || '') + ')').join('\n') + '\n\n';
          }
          return inner + '\n';
        default: return inner;
      }
    },

    serializeChildren(node) {
      let md = '';
      for (let i = 0; i < node.childNodes.length; i++) md += this.serializeNode(node.childNodes[i]);
      return md;
    },

    serializeList(ul, marker) {
      let md = '';
      ul.querySelectorAll(':scope > li').forEach((li, idx) => {
        const prefix = marker === '1.' ? (idx + 1) + '. ' : marker + ' ';
        md += prefix + this.serializeChildren(li).trim() + '\n';
      });
      return md;
    },

    serializeTaskList(ul) {
      let md = '';
      ul.querySelectorAll(':scope > li').forEach(li => {
        const checked = li.getAttribute('data-checked') === 'true' ||
                        (li.querySelector('input[type="checkbox"]') || {}).checked;
        const text = li.querySelector('span') ? li.querySelector('span').textContent : li.textContent;
        md += '- [' + (checked ? 'x' : ' ') + '] ' + text.trim() + '\n';
      });
      return md;
    },

    serializeTable(table) {
      let md = '';
      const thead = table.querySelector('thead');
      const tbody = table.querySelector('tbody');
      if (thead) {
        const headerRow = thead.querySelector('tr');
        if (headerRow) {
          const cells = Array.from(headerRow.querySelectorAll('th, td'));
          md += '| ' + cells.map(c => c.textContent.trim()).join(' | ') + ' |\n';
          // Alignment markers (default to center since our CSS default is center)
          md += '| ' + cells.map(c => {
            const align = c.style.textAlign || 'center';
            if (align === 'center') return ':---:';
            if (align === 'right') return '---:';
            return '---';
          }).join(' | ') + ' |\n';
        }
      }
      if (tbody) {
        tbody.querySelectorAll('tr').forEach(row => {
          const cells = Array.from(row.querySelectorAll('td, th'));
          md += '| ' + cells.map(c => c.textContent.trim() || ' ').join(' | ') + ' |\n';
        });
      }
      return md;
    }
  };

  // ----------------------------------------------------------
  // Live Converter: Real-time Markdown → HTML conversion
  // Converts markdown syntax as you type, Typora-style.
  // ----------------------------------------------------------
  const LiveConverter = {
    editor: null,

    init(editor) {
      this.editor = editor;
    },

    // Called on every input event. Checks the current block for
    // markdown patterns and converts them to rendered HTML.
    onInput(e) {
      // Don't process during composition (IME input)
      if (e && e.isComposing) return;

      const sel = window.getSelection();
      if (!sel.rangeCount) return;

      const range = sel.getRangeAt(0);
      const block = this.getParentBlock(range.startContainer);
      if (!block) return;

      // Don't convert inside code blocks
      if (block.tagName === 'PRE' || block.closest('pre')) return;

      // Check for block-level conversions first (on Enter)
      // These are handled in onEnter() instead

      // Check for inline conversions in current text node
      this.convertInlinePatterns(block);
    },

    // Called when Enter is pressed. Checks if the current line
    // starts with a block-level markdown pattern.
    onEnter(e) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return false;

      const range = sel.getRangeAt(0);
      const block = this.getParentBlock(range.startContainer);
      if (!block || block.tagName === 'PRE' || block.closest('pre')) return false;

      // Only process <p> elements (not already converted blocks)
      if (block.tagName !== 'P' && block.tagName !== 'DIV') return false;

      const text = block.textContent;

      // --- Heading: # ## ### #### ##### ######
      const headingMatch = text.match(/^(#{1,6})\s+(.*)$/);
      if (headingMatch) {
        e.preventDefault();
        const level = headingMatch[1].length;
        const content = headingMatch[2];
        const heading = document.createElement('h' + level);
        heading.textContent = content || '\u200B';
        block.parentNode.replaceChild(heading, block);
        // Add empty paragraph after heading
        const p = document.createElement('p');
        p.innerHTML = '<br>';
        heading.parentNode.insertBefore(p, heading.nextSibling);
        this.setCursorAt(p, 0);
        this.editor.onContentChange();
        return true;
      }

      // --- Horizontal rule: --- or *** or ___
      if (/^(---|___|(\*\*\*))$/.test(text.trim())) {
        e.preventDefault();
        const hr = document.createElement('hr');
        const p = document.createElement('p');
        p.innerHTML = '<br>';
        block.parentNode.replaceChild(hr, block);
        hr.parentNode.insertBefore(p, hr.nextSibling);
        this.setCursorAt(p, 0);
        this.editor.onContentChange();
        return true;
      }

      // --- Fenced code block: ```
      // 注：用户实时输入 ```mermaid 等会先生成 <pre><code>。
      //     reload 后才会被 BlockRenderer 接管。
      //     "实时切换 BlockRenderer" 是 typora 风格 edit-mode 议题，留 future work。
      //     PR 3 KaTeX display math ($$...$$) 同样不在 LiveConverter 接入,
      //     用户敲完整段后保存/重载才能看到渲染。这是有意识的妥协,
      //     等未来 LiveConvert PR 一次性给所有 BlockRenderer 设计统一 edit-mode。
      //     详见 PHASE_3_ARCHITECTURE.md 附录 D.7。
      if (/^```/.test(text.trim())) {
        e.preventDefault();
        const lang = text.trim().slice(3).trim();
        const pre = document.createElement('pre');
        const code = document.createElement('code');
        if (lang) {
          code.className = 'language-' + lang;
          pre.setAttribute('data-language', lang);
        }
        code.textContent = '\n';
        pre.appendChild(code);
        block.parentNode.replaceChild(pre, block);
        this.setCursorAt(code, 0);
        this.editor.onContentChange();
        return true;
      }

      // --- Blockquote: >
      if (/^>\s/.test(text)) {
        e.preventDefault();
        const content = text.replace(/^>\s?/, '');
        const bq = document.createElement('blockquote');
        const inner = document.createElement('p');
        inner.textContent = content || '\u200B';
        bq.appendChild(inner);
        block.parentNode.replaceChild(bq, block);
        // Add empty paragraph after
        const p = document.createElement('p');
        p.innerHTML = '<br>';
        bq.parentNode.insertBefore(p, bq.nextSibling);
        this.setCursorAt(p, 0);
        this.editor.onContentChange();
        return true;
      }

      // --- Task list: - [ ] or - [x]
      const taskMatch = text.match(/^[-*]\s+\[([ xX])\]\s*(.*)/);
      if (taskMatch) {
        e.preventDefault();
        const checked = taskMatch[1].toLowerCase() === 'x';
        const content = taskMatch[2];
        const ul = document.createElement('ul');
        ul.setAttribute('data-type', 'taskList');
        const li = document.createElement('li');
        li.setAttribute('data-type', 'taskItem');
        li.setAttribute('data-checked', String(checked));
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = checked;
        cb.addEventListener('change', () => {
          li.setAttribute('data-checked', String(cb.checked));
          this.editor.onContentChange();
        });
        const span = document.createElement('span');
        span.textContent = content || '\u200B';
        li.appendChild(cb);
        li.appendChild(span);
        ul.appendChild(li);
        block.parentNode.replaceChild(ul, block);
        this.setCursorAtEnd(span);
        this.editor.onContentChange();
        return true;
      }

      // --- Unordered list: - or * or +
      const ulMatch = text.match(/^([-*+])\s+(.*)$/);
      if (ulMatch) {
        e.preventDefault();
        const content = ulMatch[2];
        const ul = document.createElement('ul');
        const li = document.createElement('li');
        li.textContent = content || '\u200B';
        ul.appendChild(li);
        block.parentNode.replaceChild(ul, block);
        this.setCursorAtEnd(li);
        this.editor.onContentChange();
        return true;
      }

      // --- Ordered list: 1.
      const olMatch = text.match(/^(\d+)\.\s+(.*)$/);
      if (olMatch) {
        e.preventDefault();
        const content = olMatch[2];
        const ol = document.createElement('ol');
        const li = document.createElement('li');
        li.textContent = content || '\u200B';
        ol.appendChild(li);
        block.parentNode.replaceChild(ol, block);
        this.setCursorAtEnd(li);
        this.editor.onContentChange();
        return true;
      }

      return false;
    },

    // Scan a block element for inline markdown patterns and convert them.
    convertInlinePatterns(block) {
      const walker = document.createTreeWalker(block, NodeFilter.SHOW_TEXT, null);
      let textNode;

      while (textNode = walker.nextNode()) {
        // Skip text inside already-formatted elements
        const parent = textNode.parentNode;
        if (parent.tagName === 'CODE' || parent.tagName === 'PRE' ||
            parent.tagName === 'A' || parent.tagName === 'STRONG' ||
            parent.tagName === 'EM' || parent.tagName === 'DEL' ||
            parent.tagName === 'B' || parent.tagName === 'I' ||
            parent.tagName === 'S' || parent.tagName === 'MARK') continue;

        const text = textNode.textContent;
        let converted = false;

        // Order matters — check longer/more specific patterns first

        // Bold+Italic: ***text***
        converted = converted || this.tryConvertInline(textNode, /\*\*\*(.+?)\*\*\*/, (match, content) => {
          const strong = document.createElement('strong');
          const em = document.createElement('em');
          em.textContent = content;
          strong.appendChild(em);
          return strong;
        });
        if (converted) break;

        // Bold: **text**
        converted = this.tryConvertInline(textNode, /\*\*(.+?)\*\*/, (match, content) => {
          const el = document.createElement('strong');
          el.textContent = content;
          return el;
        });
        if (converted) break;

        // Bold: __text__
        converted = this.tryConvertInline(textNode, /__(.+?)__/, (match, content) => {
          const el = document.createElement('strong');
          el.textContent = content;
          return el;
        });
        if (converted) break;

        // Italic: *text*  (but not ** which is bold)
        converted = this.tryConvertInline(textNode, /(?<!\*)\*([^*]+?)\*(?!\*)/, (match, content) => {
          const el = document.createElement('em');
          el.textContent = content;
          return el;
        });
        if (converted) break;

        // Italic: _text_  (but not __ which is bold)
        converted = this.tryConvertInline(textNode, /(?<!_)_([^_]+?)_(?!_)/, (match, content) => {
          const el = document.createElement('em');
          el.textContent = content;
          return el;
        });
        if (converted) break;

        // Strikethrough: ~~text~~
        converted = this.tryConvertInline(textNode, /~~(.+?)~~/, (match, content) => {
          const el = document.createElement('del');
          el.textContent = content;
          return el;
        });
        if (converted) break;

        // Highlight: ==text== — PR 1 迁移到 InlineRegistry
        // 注：当前只有 highlight-mark 一个 inline 注册，此循环只跑一次。
        // 未来注册更多 inline 时（如 ^^sup^^），它们会自动被这里消费。
        if (typeof ExtensionRegistry !== 'undefined') {
          const inlineList = ExtensionRegistry.listInlineForLiveConvert();
          for (const ext of inlineList) {
            converted = this.tryConvertInline(textNode, ext.pattern, ext.createElement);
            if (converted) break;
          }
          if (converted) break;
        }

        // Inline code: `text`
        converted = this.tryConvertInline(textNode, /`([^`]+?)`/, (match, content) => {
          const el = document.createElement('code');
          el.textContent = content;
          return el;
        });
        if (converted) break;

        // Link: [text](url)
        converted = this.tryConvertInline(textNode, /\[([^\]]+)\]\(([^)]+)\)/, (match, text, url) => {
          const el = document.createElement('a');
          el.href = url;
          el.textContent = text;
          el.setAttribute('target', '_blank');
          return el;
        });
        if (converted) break;

        // Image: ![alt](url)
        converted = this.tryConvertInline(textNode, /!\[([^\]]*)\]\(([^)]+)\)/, (match, alt, url) => {
          const el = document.createElement('img');
          el.src = url;
          el.alt = alt;
          return el;
        });
        if (converted) break;
      }
    },

    // Try to find and convert a pattern in a text node.
    // Returns true if a conversion was made.
    tryConvertInline(textNode, regex, createEl) {
      const text = textNode.textContent;
      const match = regex.exec(text);
      if (!match) return false;

      // Don't convert if cursor is inside the match (user is still typing)
      const sel = window.getSelection();
      if (sel.rangeCount) {
        const cursorNode = sel.getRangeAt(0).startContainer;
        const cursorOffset = sel.getRangeAt(0).startOffset;
        if (cursorNode === textNode) {
          const matchEnd = match.index + match[0].length;
          // Only convert if cursor is at or past the end of the match
          if (cursorOffset < matchEnd) return false;
        }
      }

      // Split text node: before | element | after
      const before = text.substring(0, match.index);
      const after = text.substring(match.index + match[0].length);

      const newEl = createEl(match[0], ...match.slice(1));
      const parent = textNode.parentNode;

      // Build fragment: [beforeText, newElement, afterText]
      const frag = document.createDocumentFragment();
      if (before) frag.appendChild(document.createTextNode(before));
      frag.appendChild(newEl);
      const afterNode = document.createTextNode(after || '\u200B');
      frag.appendChild(afterNode);

      parent.replaceChild(frag, textNode);

      // Place cursor after the converted element
      const range = document.createRange();
      range.setStart(afterNode, after ? 0 : 1);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);

      this.editor.onContentChange();
      return true;
    },

    // Get the nearest block-level parent of a node
    getParentBlock(node) {
      const blockTags = ['P', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6',
                         'LI', 'BLOCKQUOTE', 'PRE', 'DIV', 'TD', 'TH'];
      while (node && node !== this.editor.element) {
        if (node.nodeType === Node.ELEMENT_NODE && blockTags.includes(node.tagName)) {
          return node;
        }
        node = node.parentNode;
      }
      return null;
    },

    setCursorAt(node, offset) {
      const sel = window.getSelection();
      const range = document.createRange();
      if (node.childNodes.length > 0 && offset === 0) {
        range.setStart(node.childNodes[0] || node, 0);
      } else {
        range.setStart(node, offset);
      }
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    },

    setCursorAtEnd(node) {
      const sel = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(node);
      range.collapse(false);
      sel.removeAllRanges();
      sel.addRange(range);
    }
  };

  // ----------------------------------------------------------
  // Carousel Manager: image carousel interaction
  // ----------------------------------------------------------
  const CarouselManager = {
    init(editor) {
      // Use event delegation on the editor element
      editor.element.addEventListener('click', (e) => this.onClick(e));
      editor.element.addEventListener('keydown', (e) => this.onKeyDown(e));
    },

    onClick(e) {
      // Arrow buttons
      const arrow = e.target.closest('.inkwell-carousel-arrow');
      if (arrow) {
        e.preventDefault();
        const carousel = arrow.closest('.inkwell-carousel');
        if (!carousel) return;
        const delta = arrow.classList.contains('prev') ? -1 : 1;
        this.go(carousel, delta);
        return;
      }
      // Dot buttons
      const dot = e.target.closest('.inkwell-carousel-dot');
      if (dot) {
        e.preventDefault();
        const carousel = dot.closest('.inkwell-carousel');
        if (!carousel) return;
        const idx = parseInt(dot.getAttribute('data-dot'));
        this.goTo(carousel, idx);
        return;
      }
    },

    onKeyDown(e) {
      // Allow left/right arrow keys when a carousel is focused
      if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      let node = sel.getRangeAt(0).startContainer;
      while (node) {
        if (node.classList && node.classList.contains('inkwell-carousel')) {
          e.preventDefault();
          this.go(node, e.key === 'ArrowLeft' ? -1 : 1);
          return;
        }
        node = node.parentNode;
      }
    },

    go(carousel, delta) {
      const count = parseInt(carousel.getAttribute('data-count'));
      const current = parseInt(carousel.getAttribute('data-current'));
      const next = Math.max(0, Math.min(count - 1, current + delta));
      this.goTo(carousel, next);
    },

    goTo(carousel, idx) {
      const count = parseInt(carousel.getAttribute('data-count'));
      idx = Math.max(0, Math.min(count - 1, idx));
      carousel.setAttribute('data-current', idx);

      // Move track
      const track = carousel.querySelector('.inkwell-carousel-track');
      if (track) track.style.transform = 'translateX(-' + (idx * 100) + '%)';

      // Update dots
      carousel.querySelectorAll('.inkwell-carousel-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === idx);
      });

      // Update counter
      const counter = carousel.querySelector('.inkwell-carousel-counter');
      if (counter) counter.textContent = (idx + 1) + ' / ' + count;

      // Update arrow disabled state
      const prev = carousel.querySelector('.inkwell-carousel-arrow.prev');
      const next = carousel.querySelector('.inkwell-carousel-arrow.next');
      if (prev) prev.disabled = idx === 0;
      if (next) next.disabled = idx === count - 1;
    },

    // Called after loadMarkdown to initialize all carousels
    initAll(container) {
      container.querySelectorAll('[data-carousel]').forEach(carousel => {
        this.goTo(carousel, 0);
      });
    }
  };

  // ----------------------------------------------------------
  // Carousel Dialog: insert-carousel popup UI
  // ----------------------------------------------------------
  const CarouselDialog = {
    images: [],
    _pendingLocal: false,
    _insertAfterNode: null,

    open(editor) {
      this.images = [];
      this._pendingLocal = false;
      const sel = window.getSelection();
      if (sel && sel.rangeCount) {
        let node = sel.getRangeAt(0).startContainer;
        if (node.nodeType === Node.TEXT_NODE) node = node.parentNode;
        while (node && node.parentNode !== editor.element) node = node.parentNode;
        this._insertAfterNode = node || null;
      } else {
        this._insertAfterNode = null;
      }
      this._render();
    },

    receiveLocalImage(src) {
      if (!this._pendingLocal) return;
      this._pendingLocal = false;
      this.images.push({ src, alt: '' });
      this._render();
    },

    _render() {
      const overlay = document.getElementById('inkwell-carousel-dialog');
      overlay.style.display = 'flex';
      overlay.className = 'inkwell-dialog-overlay';
      const imgs = this.images;
      const listHtml = imgs.length === 0
        ? '<div class="inkwell-img-empty">No images yet — add some below.</div>'
        : imgs.map((img, i) => `
          <div class="inkwell-img-item" data-idx="${i}">
            <img class="inkwell-img-thumb" src="${this._esc(img.src)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="">
            <div class="inkwell-img-thumb-placeholder" style="display:none">🖼</div>
            <div class="inkwell-img-info">
              <div class="inkwell-img-url" title="${this._esc(img.src)}">${this._esc(this._shortUrl(img.src))}</div>
              <input class="inkwell-img-alt-input" type="text" placeholder="Alt text (optional)" value="${this._esc(img.alt)}" data-alt-idx="${i}">
            </div>
            <div class="inkwell-img-actions">
              ${i > 0 ? `<button class="inkwell-img-btn" data-move-up="${i}">↑</button>` : '<span style="width:24px"></span>'}
              ${i < imgs.length - 1 ? `<button class="inkwell-img-btn" data-move-down="${i}">↓</button>` : '<span style="width:24px"></span>'}
              <button class="inkwell-img-btn remove" data-remove="${i}">✕</button>
            </div>
          </div>`).join('');

      overlay.innerHTML = `
        <div class="inkwell-dialog">
          <div class="inkwell-dialog-header">
            <span class="inkwell-dialog-title">🖼 Insert Image Carousel</span>
            <button class="inkwell-dialog-close" id="ikw-dlg-close">×</button>
          </div>
          <div class="inkwell-dialog-body">
            <div class="inkwell-img-list">${listHtml}</div>
            <div class="inkwell-add-controls">
              <button class="inkwell-add-btn" id="ikw-add-local">📁 Add Local Image</button>
              <button class="inkwell-add-btn" id="ikw-show-url">🔗 Add by URL</button>
            </div>
            <div id="ikw-url-row" class="inkwell-url-row" style="display:none">
              <input class="inkwell-url-input" id="ikw-url-input" type="url" placeholder="https://example.com/image.jpg">
              <button class="inkwell-url-add" id="ikw-url-confirm">Add</button>
            </div>
          </div>
          <div class="inkwell-dialog-footer">
            <button class="inkwell-dialog-cancel" id="ikw-dlg-cancel">Cancel</button>
            <button class="inkwell-dialog-insert" id="ikw-dlg-insert" ${imgs.length < 1 ? 'disabled' : ''}>
              ${imgs.length < 2 ? 'Insert Image' : 'Insert Carousel (' + imgs.length + ' images)'}
            </button>
          </div>
        </div>`;

      this._bindEvents(overlay);
    },

    _bindEvents(overlay) {
      overlay.querySelector('#ikw-dlg-close').onclick = () => this.close();
      overlay.querySelector('#ikw-dlg-cancel').onclick = () => this.close();
      overlay.onclick = (e) => { if (e.target === overlay) this.close(); };

      overlay.querySelector('#ikw-add-local').onclick = () => {
        this._pendingLocal = true;
        try {
          window.webkit.messageHandlers.inkwell.postMessage(
            JSON.stringify({ type: 'requestImageInput', data: { carouselMode: true } })
          );
        } catch(e) { this._pendingLocal = false; }
      };

      const urlRow = overlay.querySelector('#ikw-url-row');
      overlay.querySelector('#ikw-show-url').onclick = () => {
        urlRow.style.display = urlRow.style.display === 'none' ? 'flex' : 'none';
        if (urlRow.style.display === 'flex') overlay.querySelector('#ikw-url-input').focus();
      };

      const urlInput = overlay.querySelector('#ikw-url-input');
      const doAddUrl = () => {
        const val = urlInput.value.trim();
        if (!val) return;
        this.images.push({ src: val, alt: '' });
        urlInput.value = '';
        this._render();
      };
      overlay.querySelector('#ikw-url-confirm').onclick = doAddUrl;
      urlInput.onkeydown = (e) => { if (e.key === 'Enter') doAddUrl(); };

      overlay.querySelectorAll('[data-alt-idx]').forEach(inp => {
        inp.oninput = () => { this.images[parseInt(inp.getAttribute('data-alt-idx'))].alt = inp.value; };
      });
      overlay.querySelectorAll('[data-move-up]').forEach(btn => {
        btn.onclick = () => {
          const i = parseInt(btn.getAttribute('data-move-up'));
          [this.images[i-1], this.images[i]] = [this.images[i], this.images[i-1]];

    _doInsert() {

  const TableManager = {
    editor: null,
    activeTable: null,
    toolbar: null,
    resizing: null,

    init(editor) {
      this.editor = editor;
      // Listen for clicks to detect table focus
      editor.element.addEventListener('click', (e) => this.onClick(e));
      // Listen for keydown inside tables
      editor.element.addEventListener('keydown', (e) => this.onKeyDown(e));
      // Dismiss toolbar on click outside
      document.addEventListener('click', (e) => {
        if (this.toolbar && !this.toolbar.contains(e.target) && !this.getTableFromEvent(e)) {
          this.hideToolbar();
        }
      });
    },

    // --- Event Handlers ---

    onClick(e) {
      const table = this.getTableFromEvent(e);
      if (table) {
        this.activeTable = table;
        this.showToolbar(table);
        this.setupResizeHandles(table);

        // Sort on header click
        const th = e.target.closest('th');
        if (th && !e.target.classList.contains('inkwell-col-resize')) {
          this.sortByColumn(table, th);
        }
      }
    },

    onKeyDown(e) {
      const cell = this.getCurrentCell();
      if (!cell) return;
      const table = cell.closest('table');
      if (!table) return;

      // Tab: move to next cell
      if (e.key === 'Tab') {
        e.preventDefault();
        e.stopPropagation();
        if (e.shiftKey) {
          this.moveToPrevCell(cell, table);
        } else {
          this.moveToNextCell(cell, table);
        }
        return;
      }

      // Enter inside table cell: prevent new paragraph, move to cell below
      if (e.key === 'Enter' && !e.shiftKey) {
        const isInTable = cell.closest('table');
        if (isInTable) {
          e.preventDefault();
          this.moveToCellBelow(cell, table);
          return;
        }
      }

      // Escape: deselect table, move cursor after table
      if (e.key === 'Escape') {
        this.hideToolbar();
        const p = document.createElement('p');
        p.innerHTML = '<br>';
        table.parentNode.insertBefore(p, table.nextSibling);
        const range = document.createRange();
        range.setStart(p, 0);
        range.collapse(true);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    },

    // --- Navigation ---

    getCurrentCell() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return null;
      let node = sel.getRangeAt(0).startContainer;
      while (node && node !== this.editor.element) {
        if (node.tagName === 'TD' || node.tagName === 'TH') return node;
        node = node.parentNode;
      }
      return null;
    },

    moveToNextCell(cell, table) {
      const cells = Array.from(table.querySelectorAll('th, td'));
      const idx = cells.indexOf(cell);
      if (idx < cells.length - 1) {
        this.focusCell(cells[idx + 1]);
      } else {
        // At last cell — add new row
        this.addRow(table, 'below');
        const newCells = Array.from(table.querySelectorAll('td'));
        const lastRow = table.querySelector('tbody tr:last-child');
        if (lastRow) this.focusCell(lastRow.querySelector('td'));
      }
    },

    moveToPrevCell(cell, table) {
      const cells = Array.from(table.querySelectorAll('th, td'));
      const idx = cells.indexOf(cell);
      if (idx > 0) this.focusCell(cells[idx - 1]);
    },

    moveToCellBelow(cell, table) {
      const row = cell.closest('tr');
      const cellIdx = Array.from(row.children).indexOf(cell);
      const nextRow = row.nextElementSibling || (row.closest('thead') ? table.querySelector('tbody tr') : null);
      if (nextRow) {
        const target = nextRow.children[cellIdx];
        if (target) this.focusCell(target);
      }

    focusCell(cell) {
      const range = document.createRange();

      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);

    },

    // --- Floating Toolbar ---

    showToolbar(table) {
      this.hideToolbar();
      const tb = document.createElement('div');
      tb.className = 'inkwell-table-toolbar';
      tb.contentEditable = 'false';

      const btns = [
        { label: '+ Row ↑', action: () => this.addRow(table, 'above') },
        { label: '+ Row ↓', action: () => this.addRow(table, 'below') },
        { sep: true },
        { label: '+ Col ←', action: () => this.addCol(table, 'before') },
        { label: '+ Col →', action: () => this.addCol(table, 'after') },
        { sep: true },
        { label: '⊖ Row', action: () => this.deleteRow(table) },
        { label: '⊖ Col', action: () => this.deleteCol(table) },
        { sep: true },
        { label: '⇤', title: 'Align Left', action: () => this.alignCol(table, 'left') },
        { label: '⇔', title: 'Align Center', action: () => this.alignCol(table, 'center') },
        { label: '⇥', title: 'Align Right', action: () => this.alignCol(table, 'right') },
      ];

      btns.forEach(b => {
        if (b.sep) {
          const sep = document.createElement('div');
          sep.className = 'separator';
          tb.appendChild(sep);
          return;
        }
        const btn = document.createElement('button');
        btn.textContent = b.label;
        if (b.title) btn.title = b.title;
        btn.addEventListener('mousedown', (e) => {
          e.preventDefault();
          e.stopPropagation();
          b.action();
          this.editor.onContentChange();
        });
        tb.appendChild(btn);

      // Append to editor-container (outside contentEditable) for proper rendering
      const container = document.querySelector('.editor-container');

      // Position above table, relative to container
      const tableRect = table.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      tb.style.left = Math.max(0, tableRect.left - containerRect.left) + 'px';
      tb.style.top = (tableRect.top - containerRect.top - 38) + 'px';

      this.toolbar = tb;
    },

    hideToolbar() {
      if (this.toolbar) {
        this.toolbar.remove();
        this.toolbar = null;
      }
      this.activeTable = null;
    },

    // --- Add / Delete Rows & Columns ---

    addRow(table, position) {
      const cell = this.getCurrentCell();
      const tbody = table.querySelector('tbody') || table;
      const colCount = (table.querySelector('tr') || {}).children?.length || 3;
      const newRow = document.createElement('tr');
      for (let i = 0; i < colCount; i++) {
        const td = document.createElement('td');
        td.innerHTML = '&nbsp;';
        newRow.appendChild(td);
      }

      if (position === 'above' && cell) {
        const row = cell.closest('tr');
        if (row && row.closest('tbody')) {
          row.parentNode.insertBefore(newRow, row);
        } else {
          // Above header — insert as first tbody row
          const firstTbodyRow = tbody.querySelector('tr');
          if (firstTbodyRow) tbody.insertBefore(newRow, firstTbodyRow);
          else tbody.appendChild(newRow);
        }
      } else {
        if (cell) {
          const row = cell.closest('tr');
          if (row && row.closest('tbody')) {
            row.parentNode.insertBefore(newRow, row.nextSibling);
          } else {
            // After header row — insert as first tbody row
            const firstTbodyRow = tbody.querySelector('tr');
            if (firstTbodyRow) tbody.insertBefore(newRow, firstTbodyRow);
            else tbody.appendChild(newRow);
          }
        } else {
          tbody.appendChild(newRow);
        }
      }
      this.focusCell(newRow.querySelector('td'));
    },

    deleteRow(table) {
      const cell = this.getCurrentCell();
      if (!cell) return;
      const row = cell.closest('tr');
      if (!row) return;
      // Don't delete header row
      if (row.closest('thead')) return;
      const tbody = table.querySelector('tbody');
      if (tbody && tbody.querySelectorAll('tr').length <= 1) return; // keep at least 1 row
      const prevRow = row.previousElementSibling || row.nextElementSibling;
      row.remove();
      if (prevRow) this.focusCell(prevRow.querySelector('td, th'));
    },

    addCol(table, position) {
      const cell = this.getCurrentCell();
      let colIdx = 0;
      if (cell) {
        colIdx = Array.from(cell.closest('tr').children).indexOf(cell);
      }
      const insertIdx = position === 'after' ? colIdx + 1 : colIdx;

      table.querySelectorAll('tr').forEach(row => {
        const newCell = document.createElement(row.closest('thead') ? 'th' : 'td');
        newCell.innerHTML = row.closest('thead') ? 'Header' : '&nbsp;';
        const ref = row.children[insertIdx];
        if (ref) row.insertBefore(newCell, ref);
        else row.appendChild(newCell);
      });
      this.setupResizeHandles(table);
    },

    deleteCol(table) {
      const cell = this.getCurrentCell();
      if (!cell) return;
      const colIdx = Array.from(cell.closest('tr').children).indexOf(cell);
      const colCount = table.querySelector('tr').children.length;
      if (colCount <= 1) return; // keep at least 1 column

      table.querySelectorAll('tr').forEach(row => {
        if (row.children[colIdx]) row.children[colIdx].remove();
      });
      this.setupResizeHandles(table);
    },

    // --- Column Alignment ---

    alignCol(table, alignment) {
      const cell = this.getCurrentCell();
      if (!cell) return;
      const colIdx = Array.from(cell.closest('tr').children).indexOf(cell);

      table.querySelectorAll('tr').forEach(row => {
        const c = row.children[colIdx];
        if (c) {

          if (alignment !== 'left') c.classList.add('align-' + alignment);
          c.style.textAlign = alignment;
        }

    // --- Column Sorting ---

    sortByColumn(table, th) {
      const thead = table.querySelector('thead');
      const tbody = table.querySelector('tbody');
      if (!thead || !tbody) return;

      const colIdx = Array.from(th.closest('tr').children).indexOf(th);
      const currentSort = th.dataset.sort || '';

      // Cycle: none → asc → desc → none
      let newSort;
      if (currentSort === '') newSort = 'asc';
      else if (currentSort === 'asc') newSort = 'desc';
      else newSort = '';

      // Clear all sort indicators
      thead.querySelectorAll('th').forEach(h => delete h.dataset.sort);
      if (newSort) th.dataset.sort = newSort;

      if (!newSort) return; // reset to original order — skip

      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.sort((a, b) => {
        const aText = (a.children[colIdx]?.textContent || '').trim();
        const bText = (b.children[colIdx]?.textContent || '').trim();
        // Try numeric sort first
        const aNum = parseFloat(aText);
        const bNum = parseFloat(bText);
        if (!isNaN(aNum) && !isNaN(bNum)) {
          return newSort === 'asc' ? aNum - bNum : bNum - aNum;
        }
        // String sort
        const cmp = aText.localeCompare(bText, undefined, { sensitivity: 'base' });
        return newSort === 'asc' ? cmp : -cmp;
      });

      rows.forEach(r => tbody.appendChild(r));
      this.editor.onContentChange();
    },

    // --- Column Resize ---

    setupResizeHandles(table) {

      table.querySelectorAll('.inkwell-col-resize').forEach(h => h.remove());

      const headerCells = table.querySelectorAll('thead th');
      headerCells.forEach((th, idx) => {
        if (idx === headerCells.length - 1) return; // no handle on last column
        const handle = document.createElement('div');
        handle.className = 'inkwell-col-resize';
        handle.contentEditable = 'false';
        th.style.position = 'relative';
        th.appendChild(handle);

        handle.addEventListener('mousedown', (e) => {
          e.preventDefault();
          e.stopPropagation();
          this.startResize(e, table, idx);
        });
      });
    },

    startResize(e, table, colIdx) {
      const startX = e.clientX;
      const headerCells = table.querySelectorAll('thead th');
      const startWidth = headerCells[colIdx].offsetWidth;
      const handle = headerCells[colIdx].querySelector('.inkwell-col-resize');
      if (handle) handle.classList.add('active');

      const onMouseMove = (e) => {
        const diff = e.clientX - startX;
        const newWidth = Math.max(40, startWidth + diff);
        // Apply width to all cells in this column
        table.querySelectorAll('tr').forEach(row => {
          const cell = row.children[colIdx];
          if (cell) cell.style.width = newWidth + 'px';
        });
      };

      const onMouseUp = () => {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        if (handle) handle.classList.remove('active');
        this.editor.onContentChange();
      };

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    },

    // --- Helpers ---

    getTableFromEvent(e) {
      let node = e.target;
      while (node && node !== this.editor.element) {
        if (node.tagName === 'TABLE') return node;
        node = node.parentNode;
      }
      return null;
    }
  };

  // ----------------------------------------------------------
  // Drag & Drop Block Sorting
  // ----------------------------------------------------------
  const DragSort = {
    editor: null,
    draggedBlock: null,
    indicator: null,
    insertBefore: null, // the element before which we'll insert

    init(editor) {
      this.editor = editor;

      // Create drop indicator line
      this.indicator = document.createElement('div');
      this.indicator.className = 'inkwell-drag-indicator';
      this.indicator.style.display = 'none';
      document.querySelector('.editor-container').appendChild(this.indicator);

      // Use event delegation on the editor
      this.editor.element.addEventListener('mousedown', (e) => {
        const handle = e.target.closest('.inkwell-drag-handle');
        if (!handle) return;
        e.preventDefault();
        this._startDrag(handle.parentElement, e);
      });
    },

    refresh() {
      // Add drag handles to top-level blocks (skip hr)
      const children = this.editor.element.children;
      for (let i = 0; i < children.length; i++) {
        const block = children[i];
        if (block.nodeType !== Node.ELEMENT_NODE) continue;
        if (block.querySelector('.inkwell-drag-handle')) continue;
        if (block.tagName === 'HR') continue;
        const handle = document.createElement('span');
        handle.className = 'inkwell-drag-handle';
        handle.setAttribute('contenteditable', 'false');
        handle.textContent = '⠿';
        // For headings, insert after fold toggle (if present)
        const foldToggle = block.querySelector('.inkwell-fold-toggle');
        if (foldToggle) {
          foldToggle.after(handle);
        } else {
          block.insertBefore(handle, block.firstChild);
        }
      }
      // Remove orphaned handles
      this.editor.element.querySelectorAll('.inkwell-drag-handle').forEach(h => {
        if (!h.parentElement || h.parentElement === this.editor.element) h.remove();
      });
    },

    _startDrag(block, startEvent) {
      this.draggedBlock = block;
      block.classList.add('inkwell-dragging');

      const editorRect = this.editor.element.getBoundingClientRect();
      const blocks = Array.from(this.editor.element.children).filter(
        el => el.nodeType === Node.ELEMENT_NODE && el !== this.indicator
      );

      const onMouseMove = (e) => {
        e.preventDefault();
        this.indicator.style.display = 'block';

        const mouseY = e.clientY;
        let closestBlock = null;
        let closestDist = Infinity;
        let insertBeforeEl = null;

        for (const b of blocks) {
          if (b === this.draggedBlock) continue;
          const rect = b.getBoundingClientRect();
          const midY = rect.top + rect.height / 2;
          const dist = Math.abs(mouseY - midY);
          if (dist < closestDist) {
            closestDist = dist;
            closestBlock = b;
            insertBeforeEl = mouseY < midY ? b : b.nextElementSibling;
          }
        }

        this.insertBefore = insertBeforeEl;

        // Position indicator
        if (insertBeforeEl && insertBeforeEl.getBoundingClientRect) {
          const r = insertBeforeEl.getBoundingClientRect();
          this.indicator.style.top = (r.top - editorRect.top + this.editor.element.scrollTop - 1) + 'px';
        } else {
          // Insert at end
          const lastBlock = blocks[blocks.length - 1];
          if (lastBlock) {
            const r = lastBlock.getBoundingClientRect();
            this.indicator.style.top = (r.bottom - editorRect.top + this.editor.element.scrollTop + 1) + 'px';
          }
        }
        this.indicator.style.left = '0';
        this.indicator.style.right = '0';
        this.indicator.style.position = 'absolute';
      };

      const onMouseUp = (e) => {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        this.indicator.style.display = 'none';
        block.classList.remove('inkwell-dragging');

        if (this.insertBefore && this.insertBefore !== this.draggedBlock &&
            this.insertBefore !== this.draggedBlock.nextElementSibling) {
          this.editor.element.insertBefore(this.draggedBlock, this.insertBefore);
        } else if (!this.insertBefore && this.draggedBlock !== this.editor.element.lastElementChild) {
          this.editor.element.appendChild(this.draggedBlock);
        }

        this.draggedBlock = null;
        this.insertBefore = null;
        this.editor.onContentChange();
      };

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    }
  };

  // ----------------------------------------------------------
  // Outline (Floating Panel)
  // ----------------------------------------------------------
  const TableOfContents = {
    editor: null,
    btnEl: null,
    panelEl: null,
    isOpen: false,
    debounceTimer: null,

    init(editor) {
      this.editor = editor;
      this.panelEl = document.getElementById('inkwell-toc-panel');

      // Close on outside click
      document.addEventListener('mousedown', (e) => {
        if (this.isOpen && !this.panelEl.contains(e.target)) {
          this.close();
          // Notify Swift so toolbar button state stays in sync
          this.editor.postMessage('tocToggled', { isOpen: false });
        }
      });

      // Highlight active heading on scroll
      window.addEventListener('scroll', () => {
        if (this.isOpen) this._highlightActive();
      }, { passive: true });
    },

    toggle() {
      if (this.isOpen) this.close();
      else this.open();
    },

    open() {
      this.isOpen = true;
      this.refresh();
      this.panelEl.classList.add('visible');
      this._highlightActive();
    },

    close() {
      this.isOpen = false;
      this.panelEl.classList.remove('visible');
    },

    // Rebuild TOC entries — debounced for content changes
    scheduleRefresh() {
